<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Planning Pro 2026</title>
<style>
:root{
  --bg:#f0f4f8;--card:#fff;--border:#dde3ec;--text:#1a202c;--sub:#718096;
  --accent:#3b82f6;--radius:12px;--header:#fff;
}
.dark{
  --bg:#0f172a;--card:#1e293b;--border:#334155;--text:#f1f5f9;--sub:#94a3b8;--header:#1e293b;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

.tabs{display:flex;background:var(–header);border-bottom:1px solid var(–border);position:sticky;top:0;z-index:200}
.tab{flex:1;padding:12px 4px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;color:var(–sub);border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:var(–accent);border-color:var(–accent)}

.topbar{background:var(–header);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(–border)}
.topbar h1{font-size:16px;font-weight:700}
.hbtns{display:flex;gap:8px}
.btn{background:var(–accent);color:#fff;border:none;border-radius:8px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer}
.btn.ghost{background:transparent;color:var(–text);border:1px solid var(–border)}
.btn.green{background:#16a34a}

.page{display:none;padding-bottom:60px}
.page.active{display:block}

.soldes{display:flex;gap:10px;padding:12px 14px;flex-wrap:wrap}
.solde-card{border-radius:var(–radius);padding:10px 12px;flex:1;min-width:140px}
.solde-card h3{font-size:11px;font-weight:700;margin-bottom:6px;line-height:1.3}
.solde-row{display:flex;align-items:center;gap:7px}
.solde-val{font-size:22px;font-weight:800}
.solde-sub{font-size:11px;margin-top:3px;opacity:.85}
.s10{background:#fefce8;color:#713f12}.s21{background:#fdf2f8;color:#701a75}
.dark .s10{background:#422006;color:#fef08a}.dark .s21{background:#4a044e;color:#f5d0fe}
.spin{background:rgba(0,0,0,.12);border:none;border-radius:6px;width:26px;height:26px;font-size:16px;font-weight:700;cursor:pointer;color:inherit;display:flex;align-items:center;justify-content:center}

.legend{display:flex;flex-wrap:wrap;gap:6px;padding:2px 14px 12px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px}
.leg-dot{width:13px;height:13px;border-radius:3px;border:1px solid rgba(0,0,0,.15);flex-shrink:0}

.mnav{display:flex;align-items:center;gap:6px;padding:0 14px 8px}
.mnav button{background:var(–card);border:1px solid var(–border);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;color:var(–text)}
.mnav button:disabled{opacity:.3;cursor:default}
.mlabel{font-size:17px;font-weight:700;flex:1;text-align:center}
.mstats{font-size:11px;color:var(–sub);padding:0 14px 8px;line-height:1.8;min-height:18px}

.cal{padding:0 14px}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dh{text-align:center;font-size:10px;font-weight:700;color:var(–sub);padding:3px 0}
.dc{border-radius:8px;border:1.5px solid var(–border);padding:5px 3px;text-align:center;cursor:pointer;transition:transform .1s;min-height:50px;position:relative;user-select:none;background:var(–card)}
.dc:active{transform:scale(.91)}
.dc.sel{border:2.5px solid #1d4ed8!important;box-shadow:0 0 0 2px #93c5fd}
.dark .dc.sel{border-color:#60a5fa!important;box-shadow:0 0 0 2px #1e40af}
.dn{font-size:14px;font-weight:700;line-height:1}
.dd{font-size:10px;line-height:1.4}
.dc.we{opacity:.35}
.ev-dot{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);display:flex;gap:2px}
.ev-dot span{width:5px;height:5px;border-radius:50%;display:block}

.picker{background:var(–card);border:1px solid var(–border);border-radius:var(–radius);margin:10px 14px 0;padding:13px}
.picker h4{font-size:13px;font-weight:700;margin-bottom:10px}
.pg{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px}
.tb{border-radius:8px;border:2px solid transparent;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer}
.tb.active{border-color:#000!important}.dark .tb.active{border-color:#fff!important}
.picker-sep{border:none;border-top:1px solid var(–border);margin:10px 0}
.ev-list{margin-top:8px}
.ev-item{background:var(–bg);border:1px solid var(–border);border-radius:8px;padding:8px 10px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start}
.ev-item-info{flex:1}
.ev-title{font-size:13px;font-weight:700}
.ev-meta{font-size:11px;color:var(–sub);margin-top:2px}
.ev-del{background:none;border:none;color:#ef4444;font-size:16px;cursor:pointer;padding:0 2px;line-height:1}
.ev-form{display:flex;flex-direction:column;gap:7px;margin-top:8px}
.ev-form input,.ev-form select{background:var(–bg);border:1px solid var(–border);border-radius:8px;padding:7px 10px;color:var(–text);font-size:13px;font-family:inherit;outline:none;width:100%}
.ev-form-row{display:flex;gap:7px}
.ev-form-row input,.ev-form-row select{flex:1}
.cat-pro{color:#3b82f6}.cat-perso{color:#a855f7}

.notes-wrap{padding:14px}
.notes-wrap h2{font-size:15px;font-weight:700;margin-bottom:10px}
.notes-area{background:var(–card);border:1px solid var(–border);border-radius:var(–radius);padding:12px;width:100%;min-height:300px;color:var(–text);font-size:14px;font-family:inherit;resize:vertical;outline:none;line-height:1.6}
.notes-saved{font-size:12px;color:#16a34a;margin-top:6px;min-height:18px}

.annual{padding:14px}
.annual h2{font-size:15px;font-weight:700;margin-bottom:10px}
.ag{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@media(max-width:360px){.ag{grid-template-columns:repeat(2,1fr)}}
.mm{background:var(–card);border:1.5px solid var(–border);border-radius:8px;padding:7px;cursor:pointer}
.mm.active{border-color:var(–accent);border-width:2px}
.mm-name{font-size:11px;font-weight:700;margin-bottom:4px}
.mm-dots{display:flex;flex-wrap:wrap;gap:1.5px}
.md{width:7px;height:7px;border-radius:2px}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(–card);border-radius:16px 16px 0 0;padding:20px 16px 34px;width:100%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-btns{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}
</style>

</head>
<body>

<div class="topbar">
  <h1>📅 Planning Pro 2026</h1>
  <div class="hbtns">
    <button class="btn ghost" id="darkBtn" onclick="toggleDark()">🌙</button>
    <button class="btn" id="saveBtn" onclick="saveData()">Sauvegarder</button>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showPage('cal')">📅 Calendrier</div>
  <div class="tab" onclick="showPage('annual')">🗓 Annuel</div>
  <div class="tab" onclick="showPage('notes')">📝 Notes</div>
</div>

<div class="page active" id="page-cal">
  <div class="soldes">
    <div class="solde-card s10">
      <h3>Code 10 — Repos / Temps de travail</h3>
      <div class="solde-row">
        <button class="spin" onclick="adj('s10',-1)">−</button>
        <span class="solde-val" id="v10">130h</span>
        <button class="spin" onclick="adj('s10',1)">+</button>
      </div>
      <div class="solde-sub">Posés : <strong id="c10">0</strong> j</div>
    </div>
    <div class="solde-card s21">
      <h3>Code 21 — Repos / Congés</h3>
      <div class="solde-row">
        <button class="spin" onclick="adj('s21',-1)">−</button>
        <span class="solde-val" id="v21">11h</span>
        <button class="spin" onclick="adj('s21',1)">+</button>
      </div>
      <div class="solde-sub">Posés : <strong id="c21">0</strong> j</div>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="mnav">
    <button onclick="changeMonth(-1)" id="prevBtn">◀</button>
    <span class="mlabel" id="moisLabel"></span>
    <button onclick="changeMonth(1)" id="nextBtn">▶</button>
  </div>
  <div class="mstats" id="moisStats"></div>
  <div class="cal"><div class="cg" id="calGrid"></div></div>
  <div id="picker"></div>
</div>

<div class="page" id="page-annual">
  <div class="annual">
    <h2>Vue annuelle 2026</h2>
    <div class="ag" id="annualGrid"></div>
  </div>
</div>

<div class="page" id="page-notes">
  <div class="notes-wrap">
    <h2>📝 Bloc-notes</h2>
    <textarea class="notes-area" id="notesArea" placeholder="Notes libres…" oninput="notesChanged()"></textarea>
    <div class="notes-saved" id="notesSaved"></div>
    <button class="btn" style="margin-top:8px" onclick="saveNotes()">Sauvegarder les notes</button>
  </div>
</div>

<div class="overlay" id="evModal" style="display:none" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Ajouter un événement</h3>
    <div class="ev-form">
      <input type="text" id="evTitre" placeholder="Titre *" maxlength="60">
      <div class="ev-form-row">
        <input type="time" id="evHeure">
        <select id="evCat">
          <option value="pro">💼 Pro</option>
          <option value="perso">🏠 Perso</option>
        </select>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn ghost" onclick="hideModal()">Annuler</button>
      <button class="btn" onclick="saveEvent()">Ajouter</button>
    </div>
  </div>
</div>

<script>
const TYPES={
  "":        {label:"Travail",              color:"transparent", border:"var(--border)", text:"var(--text)"},
  astreinte: {label:"Astreinte",            color:"#ef4444",     border:"#ef4444",       text:"#fff"},
  rj_demi:   {label:"RJ ½ journée",         color:"#22c55e",     border:"#22c55e",       text:"#fff"},
  rj_jour:   {label:"RJ journée",           color:"#22c55e",     border:"#22c55e",       text:"#fff"},
  wd:        {label:"WD",                   color:"#3b82f6",     border:"#3b82f6",       text:"#fff"},
  ferie:     {label:"Jour Férié",           color:"#f97316",     border:"#f97316",       text:"#fff"},
  rtt10:     {label:"Code 10 — Repos/TT",   color:"#eab308",     border:"#eab308",       text:"#333"},
  rtt21:     {label:"Code 21 — Repos/Congés",color:"#d946ef",    border:"#d946ef",       text:"#fff"},
};
const TKEYS=Object.keys(TYPES);
const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DOWS=["L","M","M","J","V","S","D"];

// ── DONNÉES PRÉ-REMPLIES ──────────────────────────────────────────
// Lecture stricte de la capture : seules les cases colorées sont listées.
// Tout le reste reste blanc (Travail normal).
const PREFILLED={
  astreinte:[
    // Janvier
    [0,10],[0,17],[0,22],
    // Février
    [1,8],[1,13],
    // Mars
    [2,8],[2,9],
    // Avril
    [3,6],[3,16],[3,17],[3,18],
    // Mai
    [4,2],[4,3],[4,8],[4,17],[4,30],[4,31],
    // Juin
    [5,5],[5,11],[5,21],
    // Juillet
    [6,6],[6,11],[6,27],[6,28],
    // Août
    [7,3],[7,14],[7,21],[7,22],[7,23],
    // Septembre
    [8,17],[8,18],[8,19],
    // Octobre
    [9,18],[9,19],[9,21],
    // Novembre
    [10,1],[10,17],[10,18],
    // Décembre
    [11,6],[11,11],[11,12],
  ],
  rj_demi:[
    // Janvier
    [0,3],[0,23],
    // Février
    [1,13],[1,23],
    // Mars
    [2,13],[2,23],
    // Avril
    [3,13],[3,14],[3,15],
    // Mai
    [4,5],[4,6],
    // Juin
    [5,5],[5,13],[5,26],
    // Juillet
    [6,4],[6,14],[6,19],
    // Août
    [7,4],[7,25],
    // Septembre
    [8,4],[8,20],[8,25],
    // Octobre
    [9,16],[9,20],[9,25],[9,30],
    // Novembre
    [10,2],[10,20],[10,23],
    // Décembre
    [11,2],[11,25],
  ],
  rj_jour:[
    // Janvier
    [0,16],[0,26],
    // Février
    [1,17],[1,26],
    // Mars
    [2,7],[2,19],[2,26],
    // Avril
    [3,20],
    // Mai
    [4,15],[4,18],[4,26],
    // Juin
    [5,8],[5,15],[5,29],
    // Juillet
    [6,13],[6,20],
    // Août
    [7,20],
    // Septembre
    [8,7],[8,28],
    // Octobre
    [9,8],[9,10],[9,28],
    // Novembre
    [10,12],[10,15],[10,20],
    // Décembre
    [11,4],[11,11],[11,28],
  ],
  wd:[
    // Janvier
    [0,1],[0,2],[0,5],[0,6],[0,7],[0,8],[0,9],[0,12],[0,13],[0,14],[0,15],[0,19],[0,20],[0,21],[0,27],[0,28],[0,29],[0,30],
    // Février
    [1,2],[1,3],[1,4],[1,5],[1,6],[1,9],[1,10],[1,11],[1,12],[1,16],[1,17],[1,18],[1,19],[1,20],[1,24],[1,25],[1,26],[1,27],
    // Mars
    [2,2],[2,3],[2,4],[2,5],[2,6],[2,10],[2,11],[2,12],[2,16],[2,17],[2,18],[2,20],[2,24],[2,25],[2,27],[2,30],[2,31],
    // Avril
    [3,1],[3,2],[3,3],[3,7],[3,8],[3,9],[3,22],[3,23],[3,24],[3,27],[3,28],[3,29],[3,30],
    // Mai
    [4,4],[4,7],[4,11],[4,12],[4,13],[4,14],[4,19],[4,20],[4,21],[4,22],[4,25],[4,26],[4,27],[4,28],[4,29],
    // Juin
    [5,1],[5,2],[5,3],[5,4],[5,9],[5,10],[5,16],[5,17],[5,18],[5,19],[5,22],[5,23],[5,24],[5,25],[5,30],
    // Juillet
    [6,1],[6,2],[6,3],[6,7],[6,8],[6,9],[6,10],[6,15],[6,16],[6,17],[6,21],[6,22],[6,23],[6,24],[6,29],[6,30],[6,31],
    // Août
    [7,6],[7,7],[7,10],[7,11],[7,12],[7,13],[7,17],[7,18],[7,19],[7,24],[7,26],[7,27],[7,28],[7,31],
    // Septembre
    [8,1],[8,2],[8,3],[8,8],[8,9],[8,10],[8,11],[8,14],[8,15],[8,16],[8,21],[8,22],[8,23],[8,24],[8,29],[8,30],
    // Octobre
    [9,1],[9,2],[9,5],[9,6],[9,7],[9,9],[9,12],[9,13],[9,14],[9,15],[9,22],[9,23],[9,26],[9,27],[9,29],[9,30],
    // Novembre
    [10,3],[10,4],[10,5],[10,6],[10,9],[10,10],[10,13],[10,16],[10,19],[10,24],[10,25],[10,26],[10,27],[10,30],
    // Décembre
    [11,1],[11,3],[11,7],[11,8],[11,9],[11,10],[11,14],[11,15],[11,16],[11,17],[11,18],[11,21],[11,22],[11,23],[11,24],[11,29],[11,30],[11,31],
  ],
  ferie:[
    [0,1],   // 1er jan
    [3,6],   // Lundi Pâques
    [4,1],   // Fête du travail
    [4,8],   // Victoire 45
    [4,29],  // Ascension
    [5,8],   // Lundi Pentecôte (approximatif)
    [6,14],  // Fête nationale
    [7,15],  // Assomption
    [10,1],  // Toussaint
    [10,11], // Armistice
    [11,25], // Noël
  ],
  rtt10:[
    [2,15],[2,16],[2,17],[2,18],[2,19],
    [3,15],[3,16],[3,17],[3,18],
  ],
};

// ── STATE ─────────────────────────────────────────────────────────
let S={data:{},s10:130,s21:11,dark:false,events:{},notes:""};
let viewMonth=new Date().getMonth();
let editing=null;
let modalDay=null;

function dim(m){return new Date(2026,m+1,0).getDate()}
function dowi(m,d){const w=new Date(2026,m,d).getDay();return w===0?6:w-1}
function offset(m){const w=new Date(2026,m,1).getDay();return w===0?6:w-1}

function buildInitial(){
  const d={};
  for(let m=0;m<12;m++)for(let i=1;i<=dim(m);i++)d[`${m}-${i}`]="";
  Object.entries(PREFILLED).forEach(([t,arr])=>arr.forEach(([m,i])=>{d[`${m}-${i}`]=t}));
  return d;
}

function loadData(){
  try{
    const r=localStorage.getItem("planning2026v3");
    if(r){const p=JSON.parse(r);Object.assign(S,p);}
    else S.data=buildInitial();
  }catch{S.data=buildInitial();}
}

function saveData(){
  localStorage.setItem("planning2026v3",JSON.stringify(S));
  const b=document.getElementById("saveBtn");
  b.textContent="✓ Sauvegardé";b.classList.add("green");
  setTimeout(()=>{b.textContent="Sauvegarder";b.classList.remove("green")},2000);
}

function toggleDark(){
  S.dark=!S.dark;
  document.body.classList.toggle("dark",S.dark);
  document.getElementById("darkBtn").textContent=S.dark?"☀️":"🌙";
}

function showPage(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("page-"+id).classList.add("active");
  const idx={cal:0,annual:1,notes:2}[id];
  document.querySelectorAll(".tab")[idx].classList.add("active");
  if(id==="annual")renderAnnual();
  if(id==="notes")document.getElementById("notesArea").value=S.notes||"";
}

function adj(k,d){S[k]=Math.max(0,S[k]+d);renderSoldes()}

function countTypes(m){
  const r={};TKEYS.forEach(k=>r[k]=0);
  Object.entries(S.data).forEach(([k,v])=>{
    if(m===undefined||k.startsWith(m+"-"))r[v]=(r[v]||0)+1;
  });return r;
}

function renderSoldes(){
  document.getElementById("v10").textContent=S.s10+"h";
  document.getElementById("v21").textContent=S.s21+"h";
  const c=countTypes();
  document.getElementById("c10").textContent=c.rtt10||0;
  document.getElementById("c21").textContent=c.rtt21||0;
}

function renderLegend(){
  document.getElementById("legend").innerHTML=
    Object.entries(TYPES).filter(([k])=>k!=="").map(([k,v])=>
      `<div class="leg"><div class="leg-dot" style="background:${v.color==="transparent"?"var(--card)":v.color};border-color:${v.border}"></div><span>${v.label}</span></div>`
    ).join("");
}

function renderMonth(){
  document.getElementById("moisLabel").textContent=MONTHS[viewMonth];
  document.getElementById("prevBtn").disabled=viewMonth===0;
  document.getElementById("nextBtn").disabled=viewMonth===11;
  const days=dim(viewMonth);
  const statsArr=Object.entries(TYPES).filter(([k])=>k!=="").map(([k,v])=>{
    const n=Array.from({length:days},(_,i)=>i+1).filter(d=>S.data[`${viewMonth}-${d}`]===k).length;
    return n>0?`<span style="color:${v.color==="transparent"?"var(--text)":v.color};font-weight:700">${v.label}: ${n}</span>`:null;
  }).filter(Boolean);
  document.getElementById("moisStats").innerHTML=statsArr.join(" &nbsp;·&nbsp; ")||"&nbsp;";

  const grid=document.getElementById("calGrid");
  grid.innerHTML=DOWS.map(d=>`<div class="dh">${d}</div>`).join("");
  for(let i=0;i<offset(viewMonth);i++)grid.innerHTML+=`<div></div>`;
  for(let d=1;d<=days;d++){
    const key=`${viewMonth}-${d}`;
    const t=S.data[key]||"";
    const info=TYPES[t]||TYPES[""];
    const di=dowi(viewMonth,d);
    const isWE=(di===5||di===6);
    const isSel=(editing&&editing.m===viewMonth&&editing.d===d);
    const evs=(S.events[key]||[]);
    const evDots=evs.length?`<div class="ev-dot">${evs.slice(0,3).map(e=>`<span style="background:${e.cat==='pro'?'#3b82f6':'#a855f7'}"></span>`).join("")}</div>`:"";
    grid.innerHTML+=`<div class="dc${(!t&&isWE)?" we":""}${isSel?" sel":""}"
      style="background:${info.color};color:${info.text};border-color:${info.border}"
      onclick="selectDay(${viewMonth},${d})">
      <div class="dn">${d}</div><div class="dd">${DOWS[di]}</div>${evDots}
    </div>`;
  }
}

function changeMonth(delta){
  viewMonth=Math.min(11,Math.max(0,viewMonth+delta));
  editing=null;renderMonth();renderPicker();
}

function selectDay(m,d){
  editing=(editing&&editing.m===m&&editing.d===d)?null:{m,d};
  renderMonth();renderPicker();
}

function renderPicker(){
  const el=document.getElementById("picker");
  if(!editing){el.innerHTML="";return}
  const key=`${editing.m}-${editing.d}`;
  const cur=S.data[key]||"";
  const evs=S.events[key]||[];
  const evList=evs.length
    ?evs.map((e,i)=>`<div class="ev-item">
        <div class="ev-item-info">
          <div class="ev-title">${e.heure?'<span style="opacity:.7;font-size:11px">'+e.heure+'</span> ':''}${e.titre}</div>
          <div class="ev-meta"><span class="${e.cat==='pro'?'cat-pro':'cat-perso'}">${e.cat==='pro'?'💼 Pro':'🏠 Perso'}</span></div>
        </div>
        <button class="ev-del" onclick="delEvent('${key}',${i})">✕</button>
      </div>`).join("")
    :`<div style="font-size:12px;color:var(--sub);padding:4px 0">Aucun événement</div>`;

  el.innerHTML=`<div class="picker">
    <h4>${editing.d} ${MONTHS[editing.m]}</h4>
    <div class="pg">${Object.entries(TYPES).map(([k,v])=>`
      <button class="tb${cur===k?" active":""}"
        style="background:${v.color==="transparent"?"var(--card)":v.color};color:${v.text};border-color:${v.border}"
        onclick="setDay(${editing.m},${editing.d},'${k}')">${v.label}</button>
    `).join("")}</div>
    <hr class="picker-sep">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-size:12px;font-weight:700">Événements</span>
      <button class="btn" style="padding:4px 10px;font-size:12px" onclick="openModal('${key}')">+ Ajouter</button>
    </div>
    <div class="ev-list">${evList}</div>
  </div>`;
}

function setDay(m,d,type){
  S.data[`${m}-${d}`]=type;
  renderMonth();renderPicker();renderSoldes();
}

function openModal(key){
  modalDay=key;
  document.getElementById("evTitre").value="";
  document.getElementById("evHeure").value="";
  document.getElementById("evCat").value="pro";
  document.getElementById("evModal").style.display="flex";
  setTimeout(()=>document.getElementById("evTitre").focus(),100);
}
function hideModal(){document.getElementById("evModal").style.display="none";modalDay=null}
function closeModal(e){if(e.target===document.getElementById("evModal"))hideModal()}
function saveEvent(){
  const titre=document.getElementById("evTitre").value.trim();
  if(!titre)return;
  if(!S.events[modalDay])S.events[modalDay]=[];
  S.events[modalDay].push({
    titre,
    heure:document.getElementById("evHeure").value,
    cat:document.getElementById("evCat").value,
  });
  hideModal();renderMonth();renderPicker();
}
function delEvent(key,idx){
  S.events[key].splice(idx,1);
  renderMonth();renderPicker();
}

function notesChanged(){document.getElementById("notesSaved").textContent=""}
function saveNotes(){
  S.notes=document.getElementById("notesArea").value;
  saveData();
  document.getElementById("notesSaved").textContent="✓ Notes sauvegardées";
  setTimeout(()=>document.getElementById("notesSaved").textContent="",2000);
}

function renderAnnual(){
  const grid=document.getElementById("annualGrid");
  grid.innerHTML=MONTHS.map((name,mi)=>{
    const days=dim(mi);
    const dots=Array.from({length:days},(_,i)=>i+1).map(d=>{
      const t=S.data[`${mi}-${d}`]||"";
      const c=t===""?"#e2e8f0":TYPES[t]?.color||"#e2e8f0";
      return `<div class="md" style="background:${c}"></div>`;
    }).join("");
    return `<div class="mm${mi===viewMonth?" active":""}" onclick="goMonth(${mi})">
      <div class="mm-name">${name}</div>
      <div class="mm-dots">${dots}</div>
    </div>`;
  }).join("");
}

function goMonth(m){
  viewMonth=m;editing=null;
  showPage("cal");renderMonth();renderPicker();
  window.scrollTo({top:0,behavior:"smooth"});
}

loadData();
document.body.classList.toggle("dark",S.dark);
document.getElementById("darkBtn").textContent=S.dark?"☀️":"🌙";
renderLegend();renderSoldes();renderMonth();renderPicker();renderAnnual();
</script>

</body>
</html>
