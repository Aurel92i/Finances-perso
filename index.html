<style>

body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;margin-bottom:24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.header h1{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.header .date{color:var(--text2);font-size:13px;font-family:'Space Mono',monospace}
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--surface2)}.tab.active{background:var(--accent);color:#fff}

@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.app{padding:12px}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:10px;font-weight:500}
.card-value{font-family:'Space Mono',monospace;font-size:26px;font-weight:700}
.card-sub{font-size:12px;color:var(--text2);margin-top:6px}.card-icon{font-size:20px;float:right;margin-top:-4px}
.positive{color:var(--green)}.negative{color:var(--red)}.warning{color:var(--orange)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.chart-card h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px;padding-left:2px}
.expense-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:10px;background:var(--surface2);margin-bottom:6px;transition:background .15s;flex-wrap:wrap;gap:4px}

.expense-row .amt{font-family:'Space Mono',monospace;font-size:14px;font-weight:700}

.expense-row .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:var(--red-bg);color:var(--red)}.badge-green{background:var(--green-bg);color:var(--green)}.badge-orange{background:var(--orange-bg);color:var(--orange)}

function parseCSV(text){
  const lines=text.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return{rows:[],err:'Fichier vide'};
  const h=lines[0],sep=h.includes(';')?';':h.includes(',')?',':'\t';
  const cols=h.split(sep).map(c=>c.trim().replace(/^"|"$/g,'').toLowerCase());
  const iD=cols.findIndex(c=>c==='dateop'||c==='date'||c==='dateval');
  const iL=cols.findIndex(c=>c==='label'||c.includes('libell'));
  const iC=cols.findIndex(c=>c==='category'&&!c.includes('parent'));
  const iCP=cols.findIndex(c=>c==='categoryparent');
  const iA=cols.findIndex(c=>c==='amount'||c==='montant');
  if(iD===-1||iA===-1)return{rows:[],err:'Colonnes date/amount introuvables. Trouvé: '+cols.join(', ')};
  const rows=[];
  for(let i=1;i<lines.length;i++){try{
    const p=splitL(lines[i],sep),date=(p[iD]||'').replace(/^"|"$/g,'').trim();
    let lbl=(p[iL]||'').replace(/^"|"$/g,'').trim();
    const rC=iC!==-1?(p[iC]||'').replace(/^"|"$/g,'').trim():'';
    const rCP=iCP!==-1?(p[iCP]||'').replace(/^"|"$/g,'').trim():'';
    const amt=parseFloat((p[iA]||'').replace(/^"|"$/g,'').replace(/\s/g,'').replace(',','.'));
    if(!date||isNaN(amt))continue;
    let cat=rCP||PM[rC]||rC||'Non catégorisé';if(!CC[cat])cat='Non catégorisé';
    lbl=lbl.replace(/CARTE \d{2}\/\d{2}\/\d{2}\s*/i,'').replace(/CB\*\d+/gi,'').replace(/PRLV SEPA\s*/i,'').replace(/VIR INST\s*/i,'').trim().slice(0,40)||'Opération';
    rows.push({date,label:lbl,categoryParent:cat,amount:amt,month:+date.split('-')[1]});
  }catch(e){}}
  return{rows};
}
function splitL(line,sep){const p=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;c+=ch}else if(ch===sep&&!q){p.push(c);c=''}else c+=ch}p.push(c);return p}

  const expCount=d.filter(x=>x.amount<0).length,incCount=d.filter(x=>x.amount>0).length;
  const cols=['#6c5ce7','#00cec9','#fd79a8','#fdcb6e','#74b9ff','#55efc4','#e17055','#a29bfe'];
  el.innerHTML=`<div class="chart-card" style="margin-bottom:16px"><h3>\u{1F4CB} Opérations (${expCount} dépenses${incCount?' + '+incCount+' entrées':''})</h3><input type="text" placeholder="Rechercher\u2026" oninput="fTx(this.value)" style="max-width:400px;margin-bottom:12px"><div class="tx-list" id="txL">${d.map(d=>`<div class="tx-item" data-s="${(d.label+' '+d.categoryParent).toLowerCase()}"><span class="tx-date">${d.date.slice(5)}</span><span class="tx-label" title="${d.label}">${d.label}</span><span class="tx-cat">${d.categoryParent.slice(0,18)}</span><span class="tx-amt ${d.amount<0?'negative':'positive'}">${d.amount>0?'+':''}${fmt(abs(d.amount))}</span></div>`).join('')}</div></div>
  <div class="chart-card"><h3>\u{1F4C8} Cumulées/mois</h3><canvas id="cuC" height="300"></canvas></div>`;
  const ds=ms.map((m,i)=>{const md=allTx().filter(d=>d.month===m&&d.amount<0).sort((a,b)=>a.date.localeCompare(b.date));let cu=0;const bd={};md.forEach(d=>{cu+=abs(d.amount);bd[parseInt(d.date.slice(8))]=Math.round(cu)});return{label:MN[m]||'M'+m,data:Object.entries(bd).map(([x,y])=>({x:+x,y})),borderColor:cols[i%cols.length],backgroundColor:cols[i%cols.length]+'20',fill:true,tension:.3,pointRadius:2,borderWidth:2}});
  ch.cu=new Chart(document.getElementById('cuC'),{type:'line',data:{datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888a8',font:{size:11,family:'DM Sans'}}},tooltip:{callbacks:{label:c=>`${c.dataset.label} J${c.raw.x}: ${fmt(c.raw.y)}`}}},scales:{x:{type:'linear',title:{display:true,text:'Jour',color:'#8888a8'},grid:{color:'#2a2a3d'},ticks:{color:'#8888a8'},min:1,max:31},y:{grid:{color:'#2a2a3d'},ticks:{color:'#8888a8',callback:v=>fS(v)}}}}});
}

function rBud(el){
  const mc=S.mo===0?gM().length:1,avg=abs(gF().filter(d=>d.amount<0).reduce((s,d)=>s+d.amount,0))/mc;
  const extraInc=gF().filter(d=>d.amount>0).reduce((s,d)=>s+d.amount,0)/mc;
  const totalMonthlyInc=S.sal+extraInc;
  const tM=totalMonthlyInc*12*(S.tax/100)/12,sT=S.sMode==='monthly'?S.sGoal:S.sGoal/12,av=totalMonthlyInc-tM-sT,df=av-avg;
  el.innerHTML=`<div class="grid grid-2" style="margin-bottom:16px">
    <div class="chart-card"><h3>\u{1F4B5} Revenus & Impôts</h3>
      <div class="form-row" style="margin-bottom:16px"><div class="form-group"><label>Salaire net</label><input type="number" value="${S.sal}" onchange="S.sal=+this.value;save();render()"></div><div class="form-group"><label>Taux marginal (%)</label><input type="number" value="${S.tax}" min="0" max="45" onchange="S.tax=+this.value;save();render()"></div></div>
      <div class="expense-row" style="background:var(--surface3)"><span class="cat">Revenus mensuels</span><span class="amt positive">${fmt(totalMonthlyInc)}</span></div>
      <div class="expense-row" style="background:var(--surface3)"><span class="cat">Annuel net</span><span class="amt">${fmt(totalMonthlyInc*12)}</span></div>
      <div class="expense-row" style="background:var(--red-bg)"><span class="cat">\u{1F3DB}\uFE0F Impôt / an</span><span class="amt negative">${fmt(totalMonthlyInc*12*S.tax/100)}</span></div>
      <div class="expense-row" style="background:var(--orange-bg)"><span class="cat">\u{1F4B0} Réserver / mois</span><span class="amt warning" style="font-size:18px">${fmt(tM)}</span></div>
    </div>
    <div class="chart-card"><h3>\u{1F3AF} Épargne</h3>
      <div class="form-row" style="margin-bottom:16px"><div class="form-group"><label>Objectif</label><input type="number" value="${S.sGoal}" onchange="S.sGoal=+this.value;save();render()"></div><div class="form-group"><label>Format</label><div class="toggle-group"><button class="toggle-btn ${S.sMode==='monthly'?'active':''}" onclick="S.sMode='monthly';save();render()">Mensuel</button><button class="toggle-btn ${S.sMode==='annual'?'active':''}" onclick="S.sMode='annual';save();render()">Annuel</button></div></div></div>
      <div class="expense-row" style="background:var(--green-bg)"><span class="cat">Cible / mois</span><span class="amt positive" style="font-size:18px">${fmt(sT)}</span></div>
      <div class="expense-row" style="background:var(--surface3)"><span class="cat">Disponible</span><span class="amt ${av>0?'positive':'negative'}">${fmt(av)}</span></div>
      <div style="margin-top:16px"><div style="font-size:12px;color:var(--text2);margin-bottom:6px">Réel vs budget</div><div class="savings-bar-container"><div class="savings-bar-fill" style="width:${Math.min(100,avg/Math.max(av,1)*100).toFixed(0)}%;${avg>av?'background:linear-gradient(90deg,var(--red),var(--orange))':''}"></div><div class="savings-bar-label">${fmt(avg)} / ${fmt(av)}</div></div></div>
    </div>
  </div>
  <div class="chart-card" style="margin-bottom:16px"><h3>\u{1F9EE} Répartition</h3><canvas id="buC" height="200"></canvas></div>
  ${df<0?`<div class="alert-box"><span class="icon">\u26A0\uFE0F</span><div class="msg"><strong>Dépassement ${fmt(abs(df))}/mois</strong></div></div>`:`<div class="alert-box success"><span class="icon">\u2705</span><div class="msg"><strong>Marge ${fmt(df)}/mois</strong></div></div>`}`;
  ch.bu=new Chart(document.getElementById('buC'),{type:'bar',data:{labels:['Tes revenus'],datasets:[{label:'Impôts',data:[tM],backgroundColor:'#ff6b6b80',borderRadius:4},{label:'Épargne',data:[sT],backgroundColor:'#00cec980',borderRadius:4},{label:'Budget',data:[Math.max(0,av)],backgroundColor:'#6c5ce780',borderRadius:4}]},options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8888a8',font:{size:11,family:'DM Sans'}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fmt(c.raw)}`}}},scales:{x:{stacked:true,grid:{color:'#2a2a3d'},ticks:{color:'#8888a8',callback:v=>fS(v)}},y:{stacked:true,grid:{display:false},ticks:{color:'#8888a8'}}}}});
}

function rImp(el){
  el.innerHTML=`<div class="chart-card" style="margin-bottom:16px"><h3>\u{1F4E5} Importer un relevé bancaire</h3>
    <p style="color:var(--text2);font-size:13px;margin-bottom:8px;line-height:1.6">Glisse ton CSV BoursoBank ici ou clique pour sélectionner.<br><strong>Tout est analysé localement</strong> dans ton navigateur. Les doublons sont ignorés automatiquement.</p>
    <div class="drop-zone" id="dz"><input type="file" accept=".csv,.tsv,.txt" onchange="hF(event)"><div class="dz-icon">\u{1F4C4}</div><div class="dz-title">Dépose ton fichier CSV ici</div><div class="dz-sub">ou clique pour parcourir \u00b7 Format BoursoBank (.csv)</div></div>
    <div id="ipv" class="hidden" style="margin-top:20px"></div></div>
  ${S.log.length?`<div class="chart-card"><h3 style="display:flex;justify-content:space-between;align-items:center">\u{1F4DD} Historique<button class="danger" onclick="S.log=[];save();render()" style="font-size:11px;padding:6px 12px">Effacer</button></h3><div style="background:var(--surface2);border-radius:10px;padding:16px;max-height:200px;overflow-y:auto">${S.log.slice().reverse().map(l=>`<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="font-size:16px">${l.ok?'\u2705':'\u274C'}</span><span style="flex:1;color:var(--text2)"><strong style="color:var(--text)">${l.f}</strong> \u2014 ${l.d}<br>${l.ok?l.a+' ajoutées, '+l.s+' doublons':l.e}</span></div>`).join('')}</div></div>`:''}
  <div class="chart-card" style="margin-top:16px"><h3>\u2139\uFE0F Format accepté</h3><div style="color:var(--text2);font-size:13px;line-height:1.8">Colonnes: <code style="background:var(--surface3);padding:2px 8px;border-radius:4px;font-family:'Space Mono',monospace;font-size:11px">dateOp ; label ; category ; categoryParent ; amount</code><br>Séparateurs: ; , ou tab. Montants avec virgule ou point.</div></div>`;
  const dz=document.getElementById('dz');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)pF(e.dataTransfer.files[0])});
}
window.hF=e=>{if(e.target.files.length)pF(e.target.files[0])};
function pF(file){
  if(!file.name.match(/\.(csv|tsv|txt)$/i))return toast('\u274C','Format non supporté');
  const reader=new FileReader();
  reader.onload=e=>{
    const res=parseCSV(e.target.result);
    if(res.err){toast('\u274C',res.err);S.log.push({f:file.name,d:new Date().toLocaleDateString('fr-FR'),ok:false,e:res.err});save();render();return}
    const{unique,added,skipped}=dedup(res.rows),pv=document.getElementById('ipv');
    pv.classList.remove('hidden');
    const tA=abs(unique.filter(r=>r.amount<0).reduce((s,r)=>s+r.amount,0)),ms=[...new Set(unique.map(r=>r.month))].sort();
    pv.innerHTML=`<div class="alert-box success" style="margin-bottom:12px"><span class="icon">\u2705</span><div class="msg"><strong>${file.name}</strong><br>${res.rows.length} opérations \u00b7 <strong>${added} nouvelles</strong> \u00b7 ${skipped} doublons${ms.length?' \u00b7 Mois: '+ms.map(m=>MN[m]||m).join(', '):''}${tA?' \u00b7 Total: '+fmt(tA):''}</div></div>
    ${added>0?`<div class="preview-container"><table class="preview-table"><thead><tr><th>Date</th><th>Libellé</th><th>Catégorie</th><th>Montant</th></tr></thead><tbody>${unique.slice(0,20).map(r=>`<tr><td style="font-family:'Space Mono',monospace;font-size:11px">${r.date}</td><td>${r.label}</td><td style="color:${CC[r.categoryParent]||'#636e72'}">${r.categoryParent}</td><td style="font-family:'Space Mono',monospace;color:${r.amount<0?'var(--red)':'var(--green)'}">${fmt(r.amount)}</td></tr>`).join('')}${added>20?`<tr><td colspan="4" style="text-align:center;color:var(--text2)">\u2026 et ${added-20} autres</td></tr>`:''}</tbody></table></div>
    <div style="display:flex;gap:12px;margin-top:16px"><button class="primary" id="cfB">\u2705 Confirmer (${added})</button><button class="secondary" id="ccB">Annuler</button></div>`:`<div style="color:var(--text2);padding:16px 0">Tout est déjà importé.</div>`}`;
    if(added>0){
      document.getElementById('cfB').onclick=()=>{S.imported.push(...unique);S.log.push({f:file.name,d:new Date().toLocaleDateString('fr-FR'),ok:true,a:added,s:skipped});save();toast('\u2705',added+' opérations importées !');render()};
      document.getElementById('ccB').onclick=()=>pv.classList.add('hidden');
    }
  };
  reader.readAsText(file,'utf-8');
}

function rAdd(el){
  const manualExp=S.manual.filter(d=>d.amount<0),manualInc=S.inc;
  el.innerHTML=`
  <div class="grid grid-2" style="margin-bottom:16px">
    <div class="chart-card">
      <h3 style="color:var(--red)">\u{1F4C9} Ajouter une dépense</h3>
      <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Dépense ponctuelle non présente dans tes relevés.</p>
      <div class="form-row" style="margin-bottom:12px"><div class="form-group"><label>Libellé</label><input type="text" id="aL" placeholder="Ex: Course Lidl"></div><div class="form-group"><label>Montant (€)</label><input type="number" id="aA" placeholder="25.50" step="0.01"></div></div>
      <div class="form-row" style="margin-bottom:12px"><div class="form-group"><label>Catégorie</label><select id="aC">${Object.keys(CC).map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label>Date</label><input type="date" id="aD" value="${new Date().toISOString().slice(0,10)}"></div></div>
      <button class="primary" onclick="addE()" style="width:100%;background:var(--red)">\u2796 Ajouter la dépense</button>
    </div>
    <div class="chart-card">
      <h3 style="color:var(--green)">\u{1F4C8} Ajouter une entrée d'argent</h3>
      <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Salaire, prime, remboursement, vente, aide…</p>
      <div class="form-row" style="margin-bottom:12px"><div class="form-group"><label>Libellé</label><input type="text" id="iL" placeholder="Ex: Prime trimestrielle"></div><div class="form-group"><label>Montant (€)</label><input type="number" id="iA" placeholder="500.00" step="0.01"></div></div>
      <div class="form-row" style="margin-bottom:12px"><div class="form-group"><label>Type</label><select id="iC">${Object.keys(IC).map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div><div class="form-group"><label>Date</label><input type="date" id="iD" value="${new Date().toISOString().slice(0,10)}"></div></div>
      <button class="primary" onclick="addInc()" style="width:100%;background:var(--green);color:#0a0a0f">\u2795 Ajouter l'entrée</button>
    </div>
  </div>
  ${manualExp.length||manualInc.length?`<div class="grid grid-2">
    ${manualExp.length?`<div class="chart-card"><h3>\u{1F4DD} Dépenses manuelles (${manualExp.length})</h3><div class="tx-list">${S.manual.map((d,i)=>`<div class="tx-item"><span class="tx-date">${d.date.slice(5)}</span><span class="tx-label">${d.label}</span><span class="tx-cat">${d.categoryParent.slice(0,14)}</span><span class="tx-amt negative">${fmt(abs(d.amount))}</span><button onclick="rmM(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;margin-left:8px">\u2715</button></div>`).join('')}</div></div>`:'<div></div>'}
    ${manualInc.length?`<div class="chart-card"><h3>\u{1F4DD} Entrées manuelles (${manualInc.length})</h3><div class="tx-list">${S.inc.map((d,i)=>`<div class="tx-item"><span class="tx-date">${d.date.slice(5)}</span><span class="tx-label">${d.label}</span><span class="tx-cat" style="color:var(--green)">${d.categoryParent.slice(0,14)}</span><span class="tx-amt positive">+${fmt(d.amount)}</span><button onclick="rmInc(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;margin-left:8px">\u2715</button></div>`).join('')}</div></div>`:'<div></div>'}
  </div>`:''}`;
}

window.setT=t=>{S.tab=t;render()};window.setMo=m=>{S.mo=m;render()};
window.addE=()=>{const l=document.getElementById('aL').value.trim(),a=parseFloat(document.getElementById('aA').value),c=document.getElementById('aC').value,d=document.getElementById('aD').value;if(!l||!a)return toast('\u26A0\uFE0F','Remplis libellé et montant');S.manual.push({date:d,label:l,categoryParent:c,amount:-abs(a),month:+d.split('-')[1]});save();toast('\u2705',l+' ajouté');render()};
window.addInc=()=>{const l=document.getElementById('iL').value.trim(),a=parseFloat(document.getElementById('iA').value),c=document.getElementById('iC').value,d=document.getElementById('iD').value;if(!l||!a)return toast('\u26A0\uFE0F','Remplis libellé et montant');S.inc.push({date:d,label:l,categoryParent:c,amount:abs(a),month:+d.split('-')[1]});save();toast('\u2705','+'+fmt(a)+' \u2014 '+l);render()};
window.rmM=i=>{S.manual.splice(i,1);save();render()};
window.rmInc=i=>{S.inc.splice(i,1);save();render()};
window.fTx=v=>{const s=v.toLowerCase();document.querySelectorAll('#txL .tx-item').forEach(el=>{el.style.display=el.dataset.s.includes(s)?'':'none'})};

(async()=>{await load();render()})();

</script>
</body>
</html>
