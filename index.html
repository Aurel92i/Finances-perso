<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Finances</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;--border:#2a2a3d;--text:#e8e8f0;--text2:#8888a8;--text3:#5555708a;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00cec9;--green-bg:#00cec915;--red:#ff6b6b;--red-bg:#ff6b6b15;--orange:#fdcb6e;--orange-bg:#fdcb6e15;--blue:#74b9ff;--pink:#fd79a8;--radius:14px;--shadow:0 4px 24px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.grain{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.app{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:28px 0 20px;margin-bottom:24px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:12px}
.header h1{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}
.header .date{color:var(--text2);font-size:13px;font-family:'Space Mono',monospace}
.tabs{display:flex;gap:6px;margin-bottom:24px;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);overflow-x:auto}
.tab{padding:10px 20px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);transition:all .2s;border:none;background:none;font-family:inherit;white-space:nowrap}
.tab:hover{color:var(--text);background:var(--surface2)}.tab.active{background:var(--accent);color:#fff}
.grid{display:grid;gap:16px}.grid-4{grid-template-columns:repeat(4,1fr)}.grid-2{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(3,1fr)}.grid-1{grid-template-columns:1fr}
@media(max-width:900px){.grid-4,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:768px){
  .grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.grid-4{grid-template-columns:repeat(2,1fr)}
  .app{padding:10px}
  .header{padding:16px 0 12px;margin-bottom:14px;gap:8px}
  .header h1{font-size:18px}
  .tabs{gap:2px;padding:3px}
  .tab{padding:8px 12px;font-size:12px}
  .card{padding:14px}.card-value{font-size:20px}.card-title{font-size:10px;margin-bottom:6px;letter-spacing:1px}.card-sub{font-size:11px}.card-icon{font-size:16px}
  .chart-card{padding:14px}.chart-card h3{font-size:14px;margin-bottom:10px}
  .section-title{font-size:12px;margin:18px 0 10px}
  .expense-row{padding:10px 12px;gap:6px}.expense-row .cat{font-size:13px;min-width:0}.expense-row .amt{font-size:13px}
  .badge{padding:2px 8px;font-size:10px}
  .form-row{gap:8px}.form-group{min-width:0}
  input,select{padding:10px 12px;font-size:14px;border-radius:8px}
  .alert-box{padding:12px 14px;gap:8px}.alert-box .msg{font-size:12px}.alert-box .icon{font-size:16px}
  .month-selector{gap:4px}.month-btn{padding:6px 12px;font-size:12px;border-radius:6px}
  .tx-item{padding:8px 10px;font-size:12px}.tx-item .tx-label{max-width:160px}.tx-item .tx-amt{min-width:65px;font-size:12px}.tx-item .tx-date{min-width:50px;font-size:10px}
  .drop-zone{padding:32px 16px}.drop-zone .dz-icon{font-size:36px}.drop-zone .dz-title{font-size:14px}
  .insight-card{padding:12px}.insight-card .insight-text{font-size:12px}
  .toggle-group{padding:2px}.toggle-btn{padding:6px 12px;font-size:11px}
  .savings-bar-label{font-size:10px}
  .toast{bottom:12px;right:12px;left:12px;padding:12px 16px;font-size:13px}
  .data-count{font-size:11px;padding:3px 10px}
  button.primary{padding:10px 18px;font-size:13px}
  .preview-container{max-height:200px}
}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-1px);box-shadow:var(--shadow)}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);margin-bottom:10px;font-weight:500}
.card-value{font-family:'Space Mono',monospace;font-size:26px;font-weight:700}
.card-sub{font-size:12px;color:var(--text2);margin-top:6px}.card-icon{font-size:20px;float:right;margin-top:-4px}
.positive{color:var(--green)}.negative{color:var(--red)}.warning{color:var(--orange)}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px}
.chart-card h3{font-size:15px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title{font-size:13px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin:28px 0 14px;padding-left:2px}
.expense-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-radius:10px;background:var(--surface2);margin-bottom:6px;transition:background .15s;flex-wrap:wrap;gap:4px}
.expense-row:hover{background:var(--surface3)}.expense-row .cat{font-size:14px;font-weight:500;min-width:160px}
.expense-row .amt{font-family:'Space Mono',monospace;font-size:14px;font-weight:700}
.expense-row .bar-bg{flex:1;height:6px;background:var(--surface3);border-radius:3px;margin:0 16px;min-width:60px}
.expense-row .bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-red{background:var(--red-bg);color:var(--red)}.badge-green{background:var(--green-bg);color:var(--green)}.badge-orange{background:var(--orange-bg);color:var(--orange)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:inherit;font-size:14px;width:100%;transition:border-color .2s}
input:focus,select:focus{outline:none;border-color:var(--accent)}select{cursor:pointer}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:500}
button.primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:12px 24px;cursor:pointer;font-family:inherit;font-size:14px;font-weight:600;transition:all .2s}
button.primary:hover{background:var(--accent2);transform:translateY(-1px)}
button.secondary{background:var(--surface3);color:var(--text);border:1px solid var(--border);border-radius:10px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:500}
button.danger{background:var(--red-bg);color:var(--red);border:1px solid #ff6b6b30;border-radius:10px;padding:10px 20px;cursor:pointer;font-family:inherit;font-size:13px}
.form-row{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}.form-group{flex:1;min-width:140px}
.alert-box{background:var(--red-bg);border:1px solid #ff6b6b30;border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start}
.alert-box.warn{background:var(--orange-bg);border-color:#fdcb6e30}.alert-box.success{background:var(--green-bg);border-color:#00cec930}
.alert-box .icon{font-size:20px;flex-shrink:0}.alert-box .msg{font-size:13px;line-height:1.5}.alert-box .msg strong{font-weight:600}
.toggle-group{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:3px}
.toggle-btn{padding:6px 16px;border-radius:6px;border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:500;background:none;color:var(--text2);transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff}
.tx-list{max-height:400px;overflow-y:auto}.tx-list::-webkit-scrollbar{width:4px}.tx-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.tx-item:last-child{border:none}.tx-item .tx-label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px}
.tx-item .tx-cat{color:var(--text2);font-size:11px;margin-left:12px;min-width:100px}
.tx-item .tx-date{color:var(--text3);font-size:11px;min-width:80px;font-family:'Space Mono',monospace}
.tx-item .tx-amt{font-family:'Space Mono',monospace;font-weight:700;font-size:13px;min-width:80px;text-align:right}
.savings-bar-container{width:100%;height:24px;background:var(--surface3);border-radius:12px;overflow:hidden;position:relative}
.savings-bar-fill{height:100%;border-radius:12px;transition:width .8s ease;background:linear-gradient(90deg,var(--accent),var(--green))}
.savings-bar-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;font-family:'Space Mono',monospace}
.month-selector{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.month-btn{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;transition:all .2s}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.fade-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.insight-card{background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.insight-card .emoji{font-size:18px;margin-bottom:6px}.insight-card .insight-text{font-size:13px;line-height:1.5;color:var(--text2)}
.insight-card .insight-text strong{color:var(--text)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:rgba(108,92,231,0.05)}.drop-zone.drag-over{transform:scale(1.01)}
.drop-zone .dz-icon{font-size:48px;margin-bottom:12px;opacity:.7}.drop-zone:hover .dz-icon{opacity:1}
.drop-zone .dz-title{font-size:16px;font-weight:600;margin-bottom:6px}.drop-zone .dz-sub{font-size:13px;color:var(--text2)}
.drop-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-table{width:100%;border-collapse:collapse;font-size:12px}.preview-table th{text-align:left;padding:8px 10px;background:var(--surface3);color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:.5px;font-size:10px;position:sticky;top:0}
.preview-table td{padding:8px 10px;border-bottom:1px solid var(--border)}.preview-table tr:hover td{background:var(--surface2)}
.preview-container{max-height:300px;overflow-y:auto;border:1px solid var(--border);border-radius:10px}
.toast{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 24px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:10px;font-size:14px;transform:translateY(120%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0)}
.data-count{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;font-size:12px;color:var(--text2);font-family:'Space Mono',monospace}
.data-count .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}.hidden{display:none!important}
.cat-row{cursor:pointer;position:relative}
.cat-row:hover{background:var(--surface3);transform:translateX(2px)}
.cat-row .chevron{color:var(--text3);font-size:18px;font-weight:700;margin-left:4px;transition:color .2s}
.cat-row:hover .chevron{color:var(--accent2)}
.cat-modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-top:16px;animation:slideUp .3s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cat-modal-header{display:flex;justify-content:space-between;align-items:flex-start;padding-left:12px;margin-bottom:16px}
@media(max-width:768px){.cat-modal{padding:14px}.cat-modal-header{margin-bottom:12px}}

/* Nouveaux styles pour la prévision */
.forecast-card{background:linear-gradient(135deg,var(--surface2),var(--surface));border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.forecast-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.forecast-header .month-badge{background:var(--accent);color:#fff;padding:8px 16px;border-radius:20px;font-family:'Space Mono',monospace;font-size:14px;font-weight:600}
.forecast-header .status{font-size:13px;color:var(--text2)}
.forecast-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
@media(max-width:768px){.forecast-grid{grid-template-columns:1fr}}
.forecast-metric{text-align:center;padding:16px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
.forecast-metric .label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:8px}
.forecast-metric .value{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;margin-bottom:4px}
.forecast-metric .delta{font-size:12px;color:var(--text2)}
.suggestion-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:12px}
.suggestion-card .icon{font-size:24px;flex-shrink:0}
.suggestion-card .content{flex:1}
.suggestion-card .title{font-size:14px;font-weight:600;margin-bottom:4px}
.suggestion-card .desc{font-size:12px;color:var(--text2);line-height:1.5}
.suggestion-card .action{font-size:11px;color:var(--accent);margin-top:8px;font-weight:500}
.progress-ring{width:120px;height:120px;margin:0 auto 16px}
.progress-ring-bg{fill:none;stroke:var(--surface3);stroke-width:8}
.progress-ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transform:rotate(-90deg);transform-origin:50% 50%;transition:stroke-dashoffset 0.5s ease}
.progress-ring-fill.warning{stroke:var(--orange)}
.progress-ring-fill.danger{stroke:var(--red)}
.progress-text{font-family:'Space Mono',monospace;font-size:14px;font-weight:600;text-anchor:middle;fill:var(--text)}
.scenario-card{background:var(--surface2);border-radius:12px;padding:16px;margin-bottom:12px;border-left:4px solid var(--accent)}
.scenario-card.optimistic{border-left-color:var(--green)}
.scenario-card.pessimistic{border-left-color:var(--red)}
.scenario-card .scenario-title{font-size:13px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.scenario-card .scenario-value{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;margin-bottom:4px}
.scenario-card .scenario-desc{font-size:12px;color:var(--text2)}
</style>
</head>

function parseCSV(text){
  const lines=text.replace(/^\uFEFF/,'').split('\n').filter(l=>l.trim());
  if(lines.length<2)return{rows:[],err:'Fichier vide'};
  const h=lines[0],sep=h.includes(';')?';':h.includes(',')?',':'\t';
  const cols=h.split(sep).map(c=>c.trim().replace(/^"|"$/g,'').toLowerCase());
  const iD=cols.findIndex(c=>c==='dateop'||c==='date'||c==='dateval');
  const iL=cols.findIndex(c=>c==='label'||c.includes('libell'));
  const iC=cols.findIndex(c=>c==='category'&&!c.includes('parent'));
  const iCP=cols.findIndex(c=>c==='categoryparent');
  const iA=cols.findIndex(c=>c==='amount'||c==='montant');
  if(iD===-1||iA===-1)return{rows:[],err:'Colonnes introuvables: '+cols.join(', ')};
  const rows=[];
  for(let i=1;i<lines.length;i++){try{
    const p=splitL(lines[i],sep),date=(p[iD]||'').replace(/^"|"$/g,'').trim();
    let lbl=(p[iL]||'').replace(/^"|"$/g,'').trim();
    const rC=iC!==-1?(p[iC]||'').replace(/^"|"$/g,'').trim():'';
    const rCP=iCP!==-1?(p[iCP]||'').replace(/^"|"$/g,'').trim():'';
    const amt=parseFloat((p[iA]||'').replace(/^"|"$/g,'').replace(/\s/g,'').replace(',','.'));
    if(!date||isNaN(amt))continue;
    let cat=rCP||PM[rC]||rC||'Non catégorisé';if(!CC[cat])cat='Non catégorisé';
    lbl=lbl.replace(/CARTE \d{2}\/\d{2}\/\d{2}\s*/i,'').replace(/CB\*\d+/gi,'').replace(/PRLV SEPA\s*/i,'').replace(/VIR INST\s*/i,'').trim().slice(0,40)||'Opération';
    rows.push({date,label:lbl,categoryParent:cat,amount:amt,month:+date.split('-')[1]});
  }catch(e){}}
  return{rows};
}
function splitL(line,sep){const p=[];let c='',q=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){q=!q;c+=ch}else if(ch===sep&&!q){p.push(c);c=''}else c+=ch}p.push(c);return p}

function getAvgExpensesByCat(){
  const months=gM();
  if(months.length===0)return{};
  const byMonth={};
  months.forEach(m=>{
    const d=allTx().filter(x=>x.month===m&&x.amount<0);
    byMonth[m]=gCT(d);
  });
  const avg={};
  const catTotals={};
  months.forEach(m=>{
    byMonth[m].forEach(([cat,amt])=>{
      if(!catTotals[cat])catTotals[cat]=[];
      catTotals[cat].push(amt);
    });
  });
  Object.keys(catTotals).forEach(cat=>{
    const vals=catTotals[cat];
    avg[cat]=vals.reduce((a,b)=>a+b,0)/months.length;
  });
  return avg;
}

function getFixedExpenses(){
  const months=gM();
  if(months.length<2)return{};
  const byCat={};
  const allCats=[...new Set(allTx().filter(x=>x.amount<0).map(x=>x.categoryParent))];
  allCats.forEach(cat=>{
    const monthly=[];
    months.forEach(m=>{
      const total=allTx().filter(x=>x.month===m&&x.categoryParent===cat&&x.amount<0).reduce((s,x)=>s+abs(x.amount),0);
      monthly.push(total);
    });
    const variance=Math.max(...monthly)-Math.min(...monthly);
    const avg=monthly.reduce((a,b)=>a+b,0)/monthly.length;
    if(variance/avg<0.15)byCat[cat]=avg;
  });
  return byCat;
}

function generateSuggestions(avgExp, adjusted, budget){
  const suggestions=[];
  const total=Object.values(adjusted).reduce((a,b)=>a+b,0);
  const remaining=budget-total;
  
  // Trouver les catégories les plus élevées
  const sorted=Object.entries(adjusted).sort((a,b)=>b[1]-a[1]);
  const topCat=sorted[0];
  
  if(remaining<0){
    suggestions.push({
      icon:'🚨',
      title:'Alerte dépassement',
      desc:`Tu dépasses ton budget de ${fmt(Math.abs(remaining))}. Il faut impérativement couper dans les dépenses variables.`,
      action:'Réduis les curseurs ci-dessous'
    });
  }else if(remaining<100){
    suggestions.push({
      icon:'⚠️',
      title:'Marge très faible',
      desc:`Il ne te reste que ${fmt(remaining)}. Un imprévu pourrait te mettre dans le rouge.`,
      action:'Prévois une marge de sécurité de 100€ minimum'
    });
  }
  
  if(topCat&&topCat[1]>400){
    suggestions.push({
      icon:'✂️',
      title:`Réduis "${topCat[0]}"`,
      desc:`C'est ta plus grosse dépense (${fmt(topCat[1])}/mois en moyenne). Une réduction de 20% te ferait économiser ${fmt(topCat[1]*0.2)}.`,
      action:`Objectif: passer à ${fmt(topCat[1]*0.8)}`
    });
  }
  
  // Détecter les dépenses superflues
  const loisirs=adjusted['Loisirs et sorties']||0;
  if(loisirs>150){
    suggestions.push({
      icon:'🎯',
      title:'Loisirs à optimiser',
      desc:`Tu dépenses ${fmt(loisirs)} en loisirs. Privilégie les activités gratuites ce mois-ci.`,
      action:'Budget cible: 100€'
    });
  }
  
  const courses=adjusted['Vie quotidienne']||0;
  if(courses>600){
    suggestions.push({
      icon:'🛒',
      title:'Courses alimentaires',
      desc:`Tes courses représentent ${fmt(courses)}. En faisant attention aux promotions et en évitant le gaspillage, tu peux économiser 15%.`,
      action:'Économie potentielle: '+fmt(courses*0.15)
    });
  }
  
  if(suggestions.length===0){
    suggestions.push({
      icon:'✅',
      title:'Tout va bien !',
      desc:`Tu as une marge confortable de ${fmt(remaining)}. Tu peux atteindre ton objectif d'épargne.`,
      action:'Continue sur cette lancée'
    });
  }
  
  return suggestions.map(s=>`
    <div class="suggestion-card">
      <div class="icon">${s.icon}</div>
      <div class="content">
        <div class="title">${s.title}</div>
        <div class="desc">${s.desc}</div>
        <div class="action">${s.action}</div>
      </div>
    </div>
  `).join('');
}

window.resetForecast=function(){
  const avg=getAvgExpensesByCat();
  S.forecast.adjusted={...avg};
  render();
};

window.saveForecast=function(){
  save();
  toast('✅','Prévision sauvegardée !');
};

function rImp(el){
  const m=mob();
  el.innerHTML=`<div class="chart-card" style="margin-bottom:16px"><h3>📥 Importer un relevé</h3>
    <p style="color:var(--text2);font-size:13px;margin-bottom:8px;line-height:1.5">${m?'Sélectionne ton CSV.':'Glisse ton CSV BoursoBank ici.'} <strong>100% local</strong>, doublons ignorés.</p>
    <div class="drop-zone" id="dz"><input type="file" accept=".csv,.tsv,.txt" onchange="hF(event)"><div class="dz-icon">📄</div><div class="dz-title">${m?'Appuie pour choisir':'Dépose ton CSV ici'}</div><div class="dz-sub">Format BoursoBank (.csv)</div></div>
    <div id="ipv" class="hidden" style="margin-top:16px"></div></div>
  ${S.log.length?`<div class="chart-card"><h3 style="display:flex;justify-content:space-between;align-items:center">📝 Historique<button class="danger" onclick="S.log=[];save();render()" style="font-size:11px;padding:6px 12px">Effacer</button></h3><div style="background:var(--surface2);border-radius:10px;padding:12px;max-height:180px;overflow-y:auto">${S.log.slice().reverse().map(l=>`<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><span>${l.ok?'✅':'❌'}</span><span style="flex:1;color:var(--text2)"><strong style="color:var(--text)">${l.f}</strong><br>${l.ok?l.a+' ajoutées':l.e}</span></div>`).join('')}</div></div>`:''}`;
  const dz=document.getElementById('dz');
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files.length)pF(e.dataTransfer.files[0])});
}
window.hF=e=>{if(e.target.files.length)pF(e.target.files[0])};
function pF(file){
  if(!file.name.match(/\.(csv|tsv|txt)$/i))return toast('❌','Format non supporté');
  const reader=new FileReader();
  reader.onload=e=>{
    const res=parseCSV(e.target.result);
    if(res.err){toast('❌',res.err);S.log.push({f:file.name,d:new Date().toLocaleDateString('fr-FR'),ok:false,e:res.err});save();render();return}
    const{unique,added,skipped}=dedup(res.rows),pv=document.getElementById('ipv');
    pv.classList.remove('hidden');
    const tA=abs(unique.filter(r=>r.amount<0).reduce((s,r)=>s+r.amount,0)),ms=[...new Set(unique.map(r=>r.month))].sort();
    pv.innerHTML=`<div class="alert-box success" style="margin-bottom:12px"><span class="icon">✅</span><div class="msg"><strong>${file.name}</strong><br>${res.rows.length} op. · <strong>${added} nouvelles</strong> · ${skipped} doublons${tA?' · '+fmt(tA):''}</div></div>
    ${added>0?`${mob()?'':`<div class="preview-container"><table class="preview-table"><thead><tr><th>Date</th><th>Libellé</th><th>Cat.</th><th>Mt</th></tr></thead><tbody>${unique.slice(0,12).map(r=>`<tr><td style="font-family:'Space Mono',monospace;font-size:11px">${r.date}</td><td>${r.label}</td><td style="color:${CC[r.categoryParent]||'#636e72'};font-size:11px">${r.categoryParent}</td><td style="font-family:'Space Mono',monospace;color:${r.amount<0?'var(--red)':'var(--green)'}">${fmt(r.amount)}</td></tr>`).join('')}</tbody></table></div>`}
    <div style="display:flex;gap:12px;margin-top:16px"><button class="primary" id="cfB">✅ Confirmer (${added})</button><button class="secondary" id="ccB">Annuler</button></div>`:`<div style="color:var(--text2);padding:12px 0">Tout est déjà importé.</div>`}`;
    if(added>0){
      document.getElementById('cfB').onclick=()=>{S.imported.push(...unique);S.log.push({f:file.name,d:new Date().toLocaleDateString('fr-FR'),ok:true,a:added,s:skipped});save();toast('✅',added+' importées !');render()};
      document.getElementById('ccB').onclick=()=>pv.classList.add('hidden');
    }
  };
  reader.readAsText(file,'utf-8');
}

function rAdd(el){
  const me=S.manual,mi=S.inc;
  el.innerHTML=`<div class="grid grid-2" style="margin-bottom:16px">
    <div class="chart-card">
      <h3 style="color:var(--red)">📉 Dépense</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><label>Libellé</label><input type="text" id="aL" placeholder="Ex: Course Lidl"></div>
        <div class="form-row"><div class="form-group"><label>Montant (€)</label><input type="number" id="aA" placeholder="25.50" step="0.01"></div><div class="form-group"><label>Date</label><input type="date" id="aD" value="${new Date().toISOString().slice(0,10)}"></div></div>
        <div><label>Catégorie</label><select id="aC">${Object.keys(CC).map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
        <button class="primary" onclick="addE()" style="width:100%;background:var(--red)">➖ Ajouter</button>
      </div>
    </div>
    <div class="chart-card">
      <h3 style="color:var(--green)">📈 Entrée d'argent</h3>
      <div style="display:flex;flex-direction:column;gap:10px">
        <div><label>Libellé</label><input type="text" id="iL" placeholder="Ex: Prime"></div>
        <div class="form-row"><div class="form-group"><label>Montant (€)</label><input type="number" id="iA" placeholder="500" step="0.01"></div><div class="form-group"><label>Date</label><input type="date" id="iD" value="${new Date().toISOString().slice(0,10)}"></div></div>
        <div><label>Type</label><select id="iC">${Object.keys(IC).map(c=>`<option value="${c}">${c}</option>`).join('')}</select></div>
        <button class="primary" onclick="addInc()" style="width:100%;background:var(--green);color:#0a0a0f">➕ Ajouter</button>
      </div>
    </div>
  </div>
  ${me.length||mi.length?`<div class="grid grid-2">
    ${me.length?`<div class="chart-card"><h3>📝 Dépenses (${me.length})</h3><div class="tx-list">${me.map((d,i)=>`<div class="tx-item"><span class="tx-date">${d.date.slice(5)}</span><span class="tx-label">${d.label}</span><span class="tx-amt negative">${fmt(abs(d.amount))}</span><button onclick="rmM(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;margin-left:4px">✕</button></div>`).join('')}</div></div>`:'<div></div>'}
    ${mi.length?`<div class="chart-card"><h3>📝 Entrées (${mi.length})</h3><div class="tx-list">${mi.map((d,i)=>`<div class="tx-item"><span class="tx-date">${d.date.slice(5)}</span><span class="tx-label">${d.label}</span><span class="tx-amt positive">+${fmt(d.amount)}</span><button onclick="rmInc(${i})" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px;margin-left:4px">✕</button></div>`).join('')}</div></div>`:'<div></div>'}
  </div>`:''}`;
}

window.setT=t=>{S.tab=t;render()};window.setMo=m=>{S.mo=m;render()};
window.showCat=cat=>{
  const d=gF().filter(x=>x.amount<0&&x.categoryParent===cat).sort((a,b)=>b.date<a.date?-1:1);
  const total=abs(d.reduce((s,x)=>s+x.amount,0));
  const col=CC[cat]||'#636e72';
  const mc=S.mo===0?gM().length:1;
  const m=mob();
  const bySupp={};d.forEach(x=>{const k=x.label;bySupp[k]=(bySupp[k]||0)+abs(x.amount)});
  const topSupp=Object.entries(bySupp).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const modal=document.getElementById('catModal');
  modal.classList.remove('hidden');
  modal.innerHTML=`
    <div class="cat-modal-header" style="border-left:4px solid ${col}">
      <div><h3 style="margin:0;font-size:${m?'16px':'18px'}">${cat}</h3>
        <div style="color:var(--text2);font-size:13px;margin-top:4px">${d.length} opérations · ${fmt(total)} total · ${fmt(total/mc)}/mois</div>
      </div>
      <button onclick="closeCat()" style="background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px 8px;line-height:1">✕</button>
    </div>
    ${topSupp.length>1?`<div style="margin-bottom:12px"><div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Top fournisseurs</div>${topSupp.map(([name,amt])=>{const pct=(amt/topSupp[0][1]*100).toFixed(0);return`<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:12px;min-width:${m?'100px':'140px'};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${name}</span><div style="flex:1;height:4px;background:var(--surface3);border-radius:2px"><div style="width:${pct}%;height:100%;background:${col};border-radius:2px"></div></div><span style="font-family:'Space Mono',monospace;font-size:11px;color:var(--text2);min-width:60px;text-align:right">${fmt(amt)}</span></div>`}).join('')}</div>`:''}
    <div style="font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Détail des opérations</div>
    <div class="tx-list" style="max-height:${m?'300px':'400px'}">${d.map(x=>`<div class="tx-item"><span class="tx-date">${x.date.slice(5)}</span><span class="tx-label">${x.label}</span><span class="tx-amt negative">${fmt(abs(x.amount))}</span></div>`).join('')}</div>`;
  modal.scrollIntoView({behavior:'smooth',block:'nearest'});
};
window.closeCat=()=>{document.getElementById('catModal').classList.add('hidden');};
window.addE=()=>{const l=document.getElementById('aL').value.trim(),a=parseFloat(document.getElementById('aA').value),c=document.getElementById('aC').value,d=document.getElementById('aD').value;if(!l||!a)return toast('⚠️','Remplis libellé et montant');S.manual.push({date:d,label:l,categoryParent:c,amount:-abs(a),month:+d.split('-')[1]});save();toast('✅',l+' ajouté');render()};
window.addInc=()=>{const l=document.getElementById('iL').value.trim(),a=parseFloat(document.getElementById('iA').value),c=document.getElementById('iC').value,d=document.getElementById('iD').value;if(!l||!a)return toast('⚠️','Remplis libellé et montant');S.inc.push({date:d,label:l,categoryParent:c,amount:abs(a),month:+d.split('-')[1]});save();toast('✅','+'+fmt(a)+' — '+l);render()};
window.rmM=i=>{S.manual.splice(i,1);save();render()};
window.rmInc=i=>{S.inc.splice(i,1);save();render()};
window.fTx=v=>{const s=v.toLowerCase();document.querySelectorAll('#txL .tx-item').forEach(el=>{el.style.display=el.dataset.s.includes(s)?'':'none'})};
(async()=>{await load();render()})();
</script>
</body>
</html>
