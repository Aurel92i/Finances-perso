/* ── FIXED CHARGES DETECTION ── */
function detectFixed(){
  const mks=gMks();if(mks.length<2)return[];
  const bySup={};
  S.tx.filter(t=>t.amount<0).forEach(t=>{
    const sup=t.supplier.toLowerCase();if(!sup)return;
    const mk=mkOf(t);
    if(!bySup[sup])bySup[sup]={months:{},cat:t.categoryParent,label:t.label};
    if(!bySup[sup].months[mk])bySup[sup].months[mk]=0;
    bySup[sup].months[mk]+=Math.abs(t.amount);
  });
  const fixed=[];
  // Build manRec lookup: supplier -> amount (user's chosen amount takes priority)
  const manRecMap={};
  S.manRec.forEach(r=>{manRecMap[r.supplier||r.label.toLowerCase()]=r});
  Object.entries(bySup).forEach(([sup,d])=>{
    if(S.fixedSup[sup]===false)return;
    const mc=Object.keys(d.months).length;
    const amts=Object.values(d.months);
    const avg=amts.reduce((a,b)=>a+b,0)/mc;
    const maxDev=Math.max(...amts.map(a=>Math.abs(a-avg)/Math.max(avg,1)));
    const isFixed=S.fixedSup[sup]===true||
      (mc>=Math.min(mks.length,2)&&maxDev<0.15&&FIXED_CATS.has(d.cat));
    if(isFixed){
      // If user explicitly set this as recurring, use their chosen amount
      const mr=manRecMap[sup];
      const displayAmt=mr?Math.abs(mr.amount):avg;
      const displayLabel=mr?mr.label:d.label.split('|')[0].trim().split(' CARTE')[0].split(' PRLV')[0].trim();
      fixed.push({supplier:sup,label:displayLabel,cat:d.cat,avg:displayAmt,months:mc,forced:S.fixedSup[sup]===true,manual:!!mr});
    }
  });
  // Add manual recurring NOT already in auto-detected list
  const autoSups=new Set(fixed.map(f=>f.supplier));
  S.manRec.forEach(r=>{
    const rs=r.supplier||r.label.toLowerCase();
    if(!autoSups.has(rs)){
      fixed.push({supplier:rs,label:r.label,cat:r.cat,avg:Math.abs(r.amount),months:0,forced:true,manual:true});
    }
  });
  return fixed.sort((a,b)=>b.avg-a.avg);
}

function vD(mks){
  const tx=txM(S.mk),nb=S.mk==='all'?mks.length:1;
  const av=S.mk==='all'?mks.reduce((s,m)=>s+net(m),0):net(S.mk);

  // Fixed charges
  const fixed=detectFixed();
  const fixedTotal=fixed.reduce((s,f)=>s+f.avg,0);
  const fixedSups=new Set(fixed.map(f=>f.supplier));
  
  // Split expenses: variable = not from fixed charge suppliers
  const allExp=tx.filter(t=>t.amount<0);
  const totalExp=allExp.reduce((s,t)=>s+Math.abs(t.amount),0);
  const varExp=allExp.filter(t=>!fixedSups.has(t.supplier.toLowerCase())).reduce((s,t)=>s+Math.abs(t.amount),0);
  
  // Solde = net salary - fixed charges - variable expenses

  <div class="card"><div class="ch"><span class="ct">Reste du mois</span><span style="font-size:18px">${bal>=0?'📈':'🚨'}</span></div><div class="cv ${bal>=0?'pos':'neg'}">${fmt(bal)}</div><div class="csub">sur ${fmt(av)} net${ded.length?' <span style="opacity:.6">('+ded.join(' · ')+')</span>':''} − ${fmt(fixedTotal*nb)} charges</div></div></div>`;
  
  // FIXED CHARGES CARD
  if(fixed.length||S._editFix){
    const editing=S._editFix;
    h+=`<div class="card" style="border-left:3px solid var(--al)"><div class="ch"><span class="ct">🔒 Charges fixes mensuelles</span><div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--m);font-size:20px;font-weight:700;color:var(--no)">${fmt(fixedTotal)}</span><button class="bi" onclick="S._editFix=!S._editFix;S._editFixIdx=null;render()" style="${editing?'background:var(--accent);color:#fff':''}">✎</button></div></div>
    <div style="font-size:12px;color:var(--ts);margin-bottom:12px">${fixed.length} charge${fixed.length>1?'s':''} · <span style="color:var(--ok)">${fmt((S.mk==='all'?net(mks[0]):net(S.mk))-fixedTotal)}</span> restant après charges</div>`;
    fixed.forEach((f,idx)=>{
      const isEditing=editing&&S._editFixIdx===idx;
      if(isEditing){
        h+=`<div class="fix-item" style="flex-wrap:wrap;gap:8px;padding:12px 14px">
          <span class="fix-icon">${IC[f.cat]||'📦'}</span>
          <input type="text" id="fix-ed-label" value="${f.label}" style="flex:1;min-width:120px;padding:6px 10px;font-size:13px">
          <input type="number" id="fix-ed-amt" value="${f.avg.toFixed(2)}" step="0.01" style="width:100px;padding:6px 10px;font-size:13px;text-align:right">
          <div style="display:flex;gap:4px;width:100%;justify-content:flex-end;margin-top:4px">
            <button class="bi ok" onclick="saveFixEdit(${idx})" style="width:28px;height:28px;font-size:12px">✓</button>
            <button class="bi" onclick="removeFixCharge('${esc(f.supplier)}')" style="width:28px;height:28px;font-size:12px;background:var(--nob);color:var(--no)">🗑</button>

      } else if(editing){
        h+=`<div class="fix-item" onclick="S._editFixIdx=${idx};render()"><span class="fix-icon">${IC[f.cat]||'📦'}</span><span class="fix-label">${f.label}${f.manual?'<span class="fix-tag">Manuel</span>':''}</span><span class="fix-amt">${fmt(f.avg)}</span><span style="font-size:11px;color:var(--al);margin-left:6px;flex-shrink:0">✎</span></div>`;

    h+=`</div></div>`}

    h+=`</div></div>`;

function vT(mks){

function removeFixCharge(sup){
  if(!confirm('Retirer cette charge fixe ?'))return;
  S.fixedSup[sup]=false;S.manRec=S.manRec.filter(r=>r.supplier!==sup);
  S._editFixIdx=null;save();render();toast('🗑️','Charge supprimée');
}
function saveFixEdit(idx){
  const fixed=detectFixed();
  const f=fixed[idx];if(!f)return;
  const newLabel=document.getElementById('fix-ed-label').value.trim();
  const newAmt=parseFloat(document.getElementById('fix-ed-amt').value);
  if(!newLabel){toast('⚠️','Libellé requis');return}
  if(isNaN(newAmt)||newAmt<=0){toast('⚠️','Montant invalide');return}
  // Update or create manRec entry for this supplier
  const existing=S.manRec.find(r=>r.supplier===f.supplier);
  if(existing){
    existing.label=newLabel;
    existing.amount=-newAmt;
  }else{
    S.manRec.push({label:newLabel,amount:-newAmt,cat:f.cat,supplier:f.supplier});
  }
  S.fixedSup[f.supplier]=true;
  S._editFixIdx=null;save();render();toast('✅','Charge modifiée');
}

  const label=document.getElementById('fix-add-label').value.trim();

function setRecur(id,rec){
  const tx=S.tx.find(t=>t.id===id);if(!tx)return;
  const supL=tx.supplier.toLowerCase();
  if(rec){
    S.fixedSup[supL]=true;
    if(!S.manRec.some(r=>r.supplier===supL)){
      // Check if already auto-detected - if so, just confirm without adding to manRec
      const existing=detectFixed().find(f=>f.supplier===supL);
      if(existing){
        save();toast('✅','Confirmé comme charge fixe');
      } else {
        S.manRec.push({label:tx.label.split('|')[0].trim().split(' CARTE')[0].split(' PRLV')[0].trim(),amount:tx.amount,cat:tx.categoryParent,supplier:supL});
        save();toast('🔄','Ajouté aux charges fixes');
      }
    } else { save();toast('✅','Déjà dans les charges fixes'); }
  }else{
    delete S.fixedSup[supL];
    S.manRec=S.manRec.filter(r=>r.supplier!==supL);
    save();toast('⚡','Retiré des charges fixes');
  }

}

    const tKey=(t._origLabel||t.label).toLowerCase();

}
function delTx(id){

const BANKS={

    parse:r=>{const deb=pAmt(r[2]),cre=pAmt(r[3]);return{date:pDt(r[0]),label:q(r[1]),category:'',catP:gCP(q(r[1])),supplier:gS(q(r[1])),amount:cre||(-Math.abs(deb))||0}}},
  sg:{name:'Société Générale',detect:h=>h.includes('Sous-catégorie')||(/Date.*Date de valeur.*Libellé/i.test(h)&&h.includes('Montant')),

  bnp:{name:'BNP Paribas',detect:h=>/Date op/i.test(h)&&/Montant/i.test(h),

  lbp:{name:'La Banque Postale',detect:h=>/^Date;Libell/i.test(h)&&/Montant/i.test(h),
    parse:r=>({date:pDt(r[0]),label:q(r[1]),category:'',catP:gCP(q(r[1])),supplier:gS(q(r[1])),amount:pAmt(r[2])})},
  lcl:{name:'LCL',detect:h=>/^Date;Libell.*Débit;Crédit/i.test(h),
    parse:r=>{const deb=pAmt(r[2]),cre=pAmt(r[3]);return{date:pDt(r[0]),label:q(r[1]),category:'',catP:gCP(q(r[1])),supplier:gS(q(r[1])),amount:cre||(-Math.abs(deb))||0}}},
  fortuneo:{name:'Fortuneo',detect:h=>/Date op.*Date valeur.*Libell.*Débit.*Crédit/i.test(h),
    parse:r=>{const deb=pAmt(r[3]),cre=pAmt(r[4]);return{date:pDt(r[0]),label:q(r[2]),category:'',catP:gCP(q(r[2])),supplier:gS(q(r[2])),amount:cre||(-Math.abs(deb))||0}}},

    parse:r=>{const deb=pAmt(r[2]),cre=pAmt(r[3]);return{date:pDt(r[0]),label:q(r[4]),category:'',catP:gCP(q(r[4])),supplier:gS(q(r[4])),amount:cre||(-Math.abs(deb))||0}}},
  n26:{name:'N26',detect:h=>/Payee/i.test(h)&&/Amount.*EUR/i.test(h),sep:',',
    parse:r=>({date:pDt(r[0]),label:q(r[1]),category:'',catP:gCP(q(r[1])),supplier:gS(q(r[1])),amount:pAmt(r[5])})},
  revolut:{name:'Revolut',detect:h=>/^Type[,;]Product/i.test(h),sep:',',
    parse:r=>({date:pDt(r[2]),label:q(r[4]),category:'',catP:gCP(q(r[4])),supplier:gS(q(r[4])),amount:pAmt(r[5])})}
};
function q(s){return(s||'').replace(/^"|"$/g,'').trim()}
function pAmt(s){if(!s)return NaN;return parseFloat(q(s).replace(/\s/g,'').replace(',','.'))}
function pDt(s){s=q(s);if(!s)return'';if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);const m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);if(m)return m[3]+'-'+m[2]+'-'+m[1];const m2=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{2})/);if(m2)return(+m2[3]>50?'19':'20')+m2[3]+'-'+m2[2]+'-'+m2[1];return''}
const CR=[[/loyer|hlm|foyer|bailleur/i,'Logement'],[/edf|engie|gaz|energie|électricité/i,'Logement'],[/sfr|free|orange|bouygues|sosh|prixtel/i,'Abonnements & téléphonie'],[/canal\+|canal plus|netflix|disney|spotify|deezer|amazon prime|apple\.com|microsoft.*subscri|notion|openai|claude|anthropic|canva|hostinger/i,'Abonnements & téléphonie'],[/leclerc|carrefour|lidl|aldi|intermarché|super u|casino|monoprix|franprix|auchan|grand frais|picard|boulang|alimentation|el baraka|rivex|marché/i,'Vie quotidienne'],[/pharmacie|médecin|docteur|mutuelle|santé|labo|dentist/i,'Santé'],[/assurance|maif|maaf|macif|matmut|allianz|axa|active assur|acm iard/i,'Auto & Moto'],[/carburant|essence|total energies|shell|bp|leclerc dac/i,'Auto & Moto'],[/norauto|feu vert|midas|controle tech|pace lavage/i,'Auto & Moto'],[/sncf|ouigo|keolis|ratp|navigo|uber|taxi|bolt|blabla/i,'Voyages & Transports'],[/restaurant|pizza|burger|sushi|kebab|brasserie|café|bar|mcdo|kfc/i,'Loisirs et sorties'],[/cinéma|théâtre|concert|spectacle|fnac|fdj|jeux/i,'Loisirs et sorties'],[/virement|vir inst|vir sepa/i,'Virements émis'],[/retrait|dab/i,'Retraits cash'],[/chèque|chq\./i,'Chèques'],[/crédit|cofidis|floa|cetelem|sofinco|consumer finance/i,'Emprunts (hors immobilier)'],[/don|solidarité|helloasso|sif\b/i,'Cadeaux et solidarité'],[/amazon|action|gifi|brico|ikea|la poste|boulanger\b/i,'Vie quotidienne'],[/domiserve/i,'Autres dépenses']];
function gCP(l){const lo=l.toLowerCase();for(const[re,c]of CR){if(re.test(lo))return c}return'Non catégorisé'}
function gS(l){return l.replace(/CARTE \d{2}\/\d{2}\/\d{2,4}/i,'').replace(/CB\*\d+/ig,'').replace(/PRLV SEPA/i,'').replace(/VIR (INST|SEPA)/i,'').replace(/\|.*/,'').replace(/\d{2}\/\d{2}\/\d{2,4}/g,'').replace(/\s+/g,' ').trim().toLowerCase().slice(0,40)}
function detectBk(t){const h=t.trim().split('\n')[0].replace(/^\uFEFF/,'');for(const[id,b]of Object.entries(BANKS)){if(b.detect(h))return id}return null}
let _lastBk=null;
function pCSV(text){
  const lines=text.trim().replace(/^\uFEFF/,'').split('\n');if(lines.length<2)return[];
  const bk=detectBk(text);_lastBk=bk;
  if(!bk)return pCSVG(lines);
  const bank=BANKS[bk],sep=bank.sep||';',out=[];
  for(let i=1;i<lines.length;i++){const row=splitL(lines[i],sep);if(row.length<3)continue;
    try{const p=bank.parse(row);if(!p.date||!/^\d{4}-\d{2}-\d{2}$/.test(p.date)||isNaN(p.amount))continue;
      out.push({id:Date.now()+i+Math.random(),date:p.date,dateVal:p.date,label:p.label||'Sans libellé',category:p.category||p.label,categoryParent:p.catP||'Non catégorisé',supplier:p.supplier||'',amount:p.amount})}catch(e){}}
  return out;
}
function pCSVG(lines){
  const sep=lines[0].includes('\t')?'\t':lines[0].split(';').length>lines[0].split(',').length?';':',';
  const hdr=splitL(lines[0],sep).map(h=>q(h).toLowerCase());
  let dc=-1,lc=-1,ac=-1,dbc=-1,crc=-1;
  hdr.forEach((h,i)=>{if(dc<0&&/^date/.test(h))dc=i;if(lc<0&&/(libellé|label|description|payee)/i.test(h))lc=i;if(ac<0&&/(montant|amount)/i.test(h))ac=i;if(dbc<0&&/(débit|debit)/i.test(h))dbc=i;if(crc<0&&/(crédit|credit)/i.test(h))crc=i});
  if(dc<0)dc=0;if(lc<0)lc=1;if(ac<0&&dbc<0)ac=hdr.length-1;
  _lastBk='generic';const out=[];
  for(let i=1;i<lines.length;i++){const row=splitL(lines[i],sep);if(row.length<3)continue;
    const date=pDt(q(row[dc]));if(!date)continue;const label=q(row[lc])||'Sans libellé';
    let amt=NaN;if(ac>=0)amt=pAmt(row[ac]);
    if(isNaN(amt)&&dbc>=0){const db=pAmt(row[dbc]),cr=crc>=0?pAmt(row[crc]):NaN;amt=!isNaN(cr)&&cr>0?cr:!isNaN(db)?-Math.abs(db):NaN}
    if(isNaN(amt))continue;
    out.push({id:Date.now()+i+Math.random(),date,dateVal:date,label,category:label,categoryParent:gCP(label),supplier:gS(label),amount:amt})}

}
function splitL(line,sep){const row=[];let inQ=false,f='';for(let j=0;j<line.length;j++){const c=line[j];if(c==='"')inQ=!inQ;else if(c===sep&&!inQ){row.push(f);f=''}else f+=c}row.push(f);return row}
function oF(e){const files=e.target.files;if(!files.length)return;let t=0,d=0;
  // Purge manual ponctual tx (not recurring) to avoid dupes with CSV data
  const recSups=new Set(S.manRec.map(r=>r.supplier));
  const before=S.tx.length;
  S.tx=S.tx.filter(tx=>!tx.manual||recSups.has(tx.supplier.toLowerCase()));
  const purged=before-S.tx.length;
  const delSet=new Set(S.delKeys||[]);
  const ps=Array.from(files).map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>{const n=pCSV(ev.target.result);const k=new Set(S.tx.map(t=>`${t.date}|${(t._origLabel||t.label).toLowerCase()}|${t.amount}`));const u=n.filter(t=>{const tk=`${t.date}|${t.label.toLowerCase()}|${t.amount}`;return!k.has(tk)&&!delSet.has(tk)});S.tx.push(...u);aOv();t+=u.length;d+=n.length-u.length;r()};rd.readAsText(f)}));
  Promise.all(ps).then(()=>{
    aOv();
    if(!S.setup){
      const p=document.getElementById('ob-preview');
      if(p){const mks=[...new Set(S.tx.map(mkOf))].sort();
        p.innerHTML=`<div class="al" style="background:var(--okb);border-color:rgba(52,217,180,0.25);color:var(--ok)">✅ ${S.tx.length} opérations sur ${mks.length} mois${_lastBk&&BANKS[_lastBk]?' · '+BANKS[_lastBk].name:''}</div>`}
    } else {save();render();const msg=`${t} importées`+(purged?` · ${purged} manuelles nettoyées`:'');toast('✅',msg);if(t>0)setTab('transactions')}
  })}
function rAll(){if(!confirm('Effacer toutes les données ?'))return;localStorage.removeItem('fp5');clearCloud();S.tx=[];S.fAdj={};S.savOn=false;S.taxOn=false;S.savT=200;S.taxR=0;S.defSal=0;S.salByMonth={};S.catOv={...DEFO};S.fixedSup={};S.manRec=[];S.labelOv={};S.delKeys=[];aOv();S.mk='all';save();render();toast('🗑️','Reset OK')}

/* ── EVENTS ── */
document.addEventListener('dragover',e=>{const z=document.getElementById('dz');if(z){e.preventDefault();z.classList.add('dg')}});
document.addEventListener('dragleave',e=>{const z=document.getElementById('dz');if(z)z.classList.remove('dg')});
document.addEventListener('drop',e=>{e.preventDefault();const z=document.getElementById('dz');if(z)z.classList.remove('dg');if(e.dataTransfer.files.length){const files=e.dataTransfer.files;let t=0,d=0;
  const recSups2=new Set(S.manRec.map(r=>r.supplier));S.tx=S.tx.filter(tx=>!tx.manual||recSups2.has(tx.supplier.toLowerCase()));
  const delSet2=new Set(S.delKeys||[]);
  const ps=Array.from(files).map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>{const n=pCSV(ev.target.result);const k=new Set(S.tx.map(t=>`${t.date}|${(t._origLabel||t.label).toLowerCase()}|${t.amount}`));const u=n.filter(t=>{const tk=`${t.date}|${t.label.toLowerCase()}|${t.amount}`;return!k.has(tk)&&!delSet2.has(tk)});S.tx.push(...u);aOv();t+=u.length;d+=n.length-u.length;r()};rd.readAsText(f)}));
  Promise.all(ps).then(()=>{aOv();
    if(!S.setup){const p=document.getElementById('ob-preview');if(p){const mks=[...new Set(S.tx.map(mkOf))].sort();p.innerHTML=`<div class="al" style="background:var(--okb);border-color:rgba(52,217,180,0.25);color:var(--ok)">✅ ${S.tx.length} opérations sur ${mks.length} mois</div>`}}
    else{save();render();toast('✅',`${t} importées`)}})}});
['m-cat','m-re','m-add','m-auth'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('click',e=>{if(e.target.id===id)cm(id)})});
document.addEventListener('keydown',e=>{if(e.key==='Escape')['m-cat','m-re','m-add','m-auth'].forEach(cm)});

/* ── INIT ── */
load();initAuth();

</script></body></html>
