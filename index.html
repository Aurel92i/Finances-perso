<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mes Finances</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;--border:#2a2a3d;--text:#e8e8f0;--text2:#8888a8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00cec9;--green-bg:#00cec915;--red:#ff6b6b;--red-bg:#ff6b6b15;--orange:#fdcb6e;--orange-bg:#fdcb6e15;--radius:16px;--shadow:0 4px 24px rgba(0,0,0,0.4)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.app{max-width:1400px;margin:0 auto;padding:16px;padding-bottom:100px}
.header{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:var(--text2);font-size:12px;font-family:'Space Mono',monospace}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:12px 8px;border-radius:12px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .2s;border:none;background:var(--surface);font-family:inherit;text-align:center;white-space:nowrap;border:1px solid var(--border)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(108,92,231,0.3)}
.grid{display:grid;gap:12px}.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:380px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.card:active{transform:scale(0.98)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600}
.card-value{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;margin:4px 0}
.card-delta{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px}
.big-number{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;text-align:center;padding:20px 0}
.positive{color:var(--green)}.negative{color:var(--red)}.warning{color:var(--orange)}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:8px}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;transition:all .2s}
.list-item:active{background:var(--surface2);transform:scale(0.98)}
.list-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.list-content{flex:1;min-width:0}
.list-title{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:12px;color:var(--text2)}
.list-amount{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;flex-shrink:0;text-align:right}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-red{background:var(--red-bg);color:var(--red);border-color:var(--red)}.badge-green{background:var(--green-bg);color:var(--green);border-color:var(--green)}.badge-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:inherit;font-size:16px;width:100%;transition:all .2s;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent);background:var(--surface3)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.form-group{margin-bottom:16px}
.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}
.btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.alert-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.alert-box.danger{background:var(--red-bg);border-color:var(--red)}
.alert-box.warning{background:var(--orange-bg);border-color:var(--orange)}
.alert-box.success{background:var(--green-bg);border-color:var(--green)}
.alert-icon{font-size:24px;flex-shrink:0}
.alert-content{flex:1}
.alert-title{font-weight:700;margin-bottom:2px;font-size:14px}
.alert-text{font-size:13px;color:var(--text2);line-height:1.4}
.month-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-btn{padding:10px 20px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;white-space:nowrap;transition:all .2s}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.toggle-group{display:flex;background:var(--surface2);border-radius:10px;padding:4px;border:1px solid var(--border)}
.toggle-btn{flex:1;padding:10px 16px;border-radius:8px;border:none;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;background:transparent;color:var(--text2);transition:all .2s}
.toggle-btn.active{background:var(--accent);color:#fff}
.progress-container{margin:20px 0}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.progress-bar{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;position:relative;border:1px solid var(--border)}
.progress-fill{height:100%;border-radius:6px;transition:width 0.5s ease;background:linear-gradient(90deg,var(--accent),var(--green))}
.progress-fill.warning{background:linear-gradient(90deg,var(--orange),var(--red))}
.progress-fill.danger{background:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-item{text-align:center;padding:12px 8px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.stat-value{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;display:block;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.suggestion-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;border-left:4px solid var(--accent)}
.suggestion-card.warning{border-left-color:var(--orange)}
.suggestion-card.danger{border-left-color:var(--red)}
.suggestion-card.success{border-left-color:var(--green)}
.suggestion-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.suggestion-icon{font-size:24px}
.suggestion-title{font-weight:700;font-size:15px}
.suggestion-text{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:8px}
.suggestion-action{font-size:12px;color:var(--accent);font-weight:600}
.slider-container{margin:16px 0;padding:16px;background:var(--surface2);border-radius:12px;border:1px solid var(--border)}
.slider-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.slider-title{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.slider-dot{width:12px;height:12px;border-radius:50%;display:inline-block}
.slider-value{font-family:'Space Mono',monospace;font-size:16px;font-weight:700}
input[type=range]{width:100%;height:6px;-webkit-appearance:none;background:var(--surface3);border-radius:3px;outline:none;padding:0;margin:12px 0}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--text);cursor:pointer;border:3px solid var(--surface);box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.range-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px}
.tx-list{max-height:500px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}
.tx-item:last-child{border-bottom:none;border-radius:0 0 var(--radius) var(--radius)}
.tx-item:first-child{border-radius:var(--radius) var(--radius) 0 0}
.tx-date{color:var(--text2);font-size:12px;font-family:'Space Mono',monospace;min-width:50px}
.tx-info{flex:1;min-width:0;margin:0 12px}
.tx-label{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-bottom:2px}
.tx-cat{font-size:11px;color:var(--text2)}
.tx-amount{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;min-width:80px;text-align:right}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.empty-text{font-size:15px;line-height:1.6}
.hidden{display:none!important}
.fade-in{animation:fadeIn 0.3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:24px;left:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;align-items:center;gap:12px;font-size:14px;z-index:1000;transform:translateY(200%);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.toast.show{transform:translateY(0)}
.toast-icon{font-size:20px}
/* Desktop only */
@media(min-width:769px){
.app{padding:24px}
.grid-4{grid-template-columns:repeat(4,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-2{grid-template-columns:repeat(2,1fr)}
.chart-container{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:24px}
}
</style>
</head>

let S={tab:'dashboard',mo:3,sal:2300,tax:11,sGoal:200,sMode:'monthly',manual:[],imported:[],forecast:{month:4,salary:2300,adjusted:{}}};

function allTx(){return[...SEED.map(r=>({date:r.d,label:r.l,categoryParent:r.c,amount:r.a,month:+r.d.split('-')[1]})),...S.imported,...S.manual]}
function gM(){return[...new Set(allTx().map(d=>d.month))].sort((a,b)=>a-b)}
function gF(){const a=allTx();return S.mo===0?a:a.filter(d=>d.month===S.mo)}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function abs(n){return Math.abs(n)}
function toast(ic,msg){const t=document.getElementById('toast');t.querySelector('.toast-icon').textContent=ic;t.querySelector('#toast-msg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}
function save(){localStorage.setItem('fin-data',JSON.stringify(S))}
function load(){try{const d=JSON.parse(localStorage.getItem('fin-data'));if(d)Object.assign(S,d)}catch(e){}}

function getCatTotals(){
  const d=gF().filter(x=>x.amount<0);
  const t={};
  d.forEach(x=>{t[x.categoryParent]=(t[x.categoryParent]||0)+abs(x.amount)});
  return Object.entries(t).sort((a,b)=>b[1]-a[1]);
}

function getAvgByCat(){
  const months=gM();
  if(months.length===0)return{};
  const totals={};
  months.forEach(m=>{
    const monthData=allTx().filter(x=>x.month===m&&x.amount<0);
    const cats={};
    monthData.forEach(x=>{cats[x.categoryParent]=(cats[x.categoryParent]||0)+abs(x.amount)});
    Object.entries(cats).forEach(([cat,amt])=>{
      if(!totals[cat])totals[cat]=[];
      totals[cat].push(amt);
    });
  });
  const avg={};
  Object.entries(totals).forEach(([cat,vals])=>{
    avg[cat]=vals.reduce((a,b)=>a+b,0)/months.length;
  });
  return avg;
}

function render(){
  const app=document.getElementById('app');
  const ms=gM();
  const isMobile=window.innerWidth<769;
  
  let html=`<div class="header">
    <div class="header-top">
      <h1>💰 MES FINANCES</h1>
      <span class="badge">${allTx().length} opérations</span>
    </div>
    <div class="subtitle">${ms.length} mois d'historique · Salaire: ${fmt(S.sal)}</div>
  </div>
  
  <div class="tabs">
    <button class="tab ${S.tab=='dashboard'?'active':''}" onclick="S.tab='dashboard';render()">📊 Vue</button>
    <button class="tab ${S.tab=='forecast'?'active':''}" onclick="S.tab='forecast';render()">👀⏳ Prévoir</button>
    <button class="tab ${S.tab=='add'?'active':''}" onclick="S.tab='add';render()">➕ Ajouter</button>
    <button class="tab ${S.tab=='details'?'active':''}" onclick="S.tab='details';render()">📋 Liste</button>
  </div>
  
  <div id="content" class="fade-in">`;
  
  if(S.tab=='dashboard')html+=renderDashboard();
  else if(S.tab=='forecast')html+=renderForecast();
  else if(S.tab=='add')html+=renderAdd();
  else if(S.tab=='details')html+=renderDetails();
  
  html+=`</div>`;
  app.innerHTML=html;
}

function renderDashboard(){
  const d=gF();
  const expenses=d.filter(x=>x.amount<0);
  const income=d.filter(x=>x.amount>0);
  const totalExp=expenses.reduce((s,x)=>s+abs(x.amount),0);
  const totalInc=income.reduce((s,x)=>s+x.amount,0)+(S.mo===0?S.sal*gM().length:S.sal);
  const balance=totalInc-totalExp;
  const cats=getCatTotals();
  
  let html=`<div class="grid grid-2">
    <div class="card">
      <div class="card-header"><span class="card-label">Revenus</span><span class="positive">📈</span></div>
      <div class="card-value positive">${fmt(totalInc)}</div>
      <div class="card-delta">ce mois</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-label">Dépenses</span><span class="negative">📉</span></div>
      <div class="card-value negative">${fmt(totalExp)}</div>
      <div class="card-delta">${expenses.length} transactions</div>
    </div>
  </div>
  
  <div class="card" style="margin-top:12px;text-align:center;padding:24px;background:linear-gradient(135deg,var(--surface),var(--surface2))">
    <div class="card-label" style="margin-bottom:8px">SOLDE</div>
    <div class="big-number ${balance>=0?'positive':'negative'}" style="font-size:36px">${fmt(balance)}</div>
    <div class="badge ${balance>=0?'badge-green':'badge-red'}" style="margin-top:8px;display:inline-flex">
      ${balance>=0?'✅ Budget respecté':'🚨 Dépassement'}
    </div>
  </div>`;
  
  if(cats.length>0){
    html+=`<div class="section-title">Top catégories</div>`;
    cats.slice(0,5).forEach(([cat,amt])=>{
      const pct=Math.round((amt/totalExp)*100);
      html+=`<div class="list-item" onclick="S.tab='details';S.filterCat='${cat}';render()">
        <div class="list-icon" style="background:${CC[cat]||'#636e72'}20;color:${CC[cat]||'#636e72'}">${ICONS[cat]||'📦'}</div>
        <div class="list-content">
          <div class="list-title">${cat}</div>
          <div class="list-sub">${pct}% du total</div>
        </div>
        <div class="list-amount negative">${fmt(amt)}</div>
      </div>`;
    });
  }
  
  return html;
}

function renderForecast(){
  const avg=getAvgByCat();
  const totalAvg=Object.values(avg).reduce((a,b)=>a+b,0);
  const nextMonth=Math.max(...gM())+1;
  const monthName=MN[nextMonth]||'Mois '+nextMonth;
  
  if(!S.forecast.adjusted||Object.keys(S.forecast.adjusted).length===0){
    S.forecast={month:nextMonth,salary:S.sal,adjusted:{...avg}};
  }
  
  const f=S.forecast;
  const taxAmount=f.salary*(S.tax/100);
  const saveAmount=S.sMode==='monthly'?S.sGoal:S.sGoal/12;
  const available=f.salary-taxAmount-saveAmount;
  const projected=Object.values(f.adjusted).reduce((a,b)=>a+b,0);
  const remaining=available-projected;
  const usedPct=Math.min(100,(projected/available)*100);
  
  let html=`<div class="card" style="margin-bottom:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border:none">
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:13px;opacity:0.9;margin-bottom:4px">PRÉVISION</div>
      <div style="font-family:'Space Mono',monospace;font-size:28px;font-weight:700">${monthName} 2026</div>
    </div>
  </div>
  
  <div class="grid grid-2" style="margin-bottom:16px">
    <div class="card" style="padding:12px">
      <div class="card-label">Salaire prévu</div>
      <input type="number" value="${f.salary}" onchange="S.forecast.salary=+this.value;render()" style="margin-top:8px;font-size:18px;padding:12px;text-align:center;font-weight:700">
    </div>
    <div class="card" style="padding:12px;background:${remaining>=0?'var(--green-bg)':'var(--red-bg)'};border-color:${remaining>=0?'var(--green)':'var(--red)'}">
      <div class="card-label" style="${remaining>=0?'color:var(--green)':'color:var(--red)'}">Reste prévisionnel</div>
      <div class="card-value ${remaining>=0?'positive':'negative'}" style="font-size:28px;margin-top:4px">${fmt(remaining)}</div>
    </div>
  </div>
  
  <div class="card" style="margin-bottom:16px">
    <div class="progress-container" style="margin:0">
      <div class="progress-header">
        <span>Utilisation du budget</span>
        <span style="font-family:'Space Mono',monospace">${usedPct.toFixed(0)}%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill ${usedPct>90?'danger':usedPct>75?'warning':''}" style="width:${usedPct}%"></div>
      </div>
      <div class="stat-grid" style="margin-top:12px;margin-bottom:0">
        <div class="stat-item"><span class="stat-value">${fmt(available)}</span><span class="stat-label">Dispo</span></div>
        <div class="stat-item"><span class="stat-value negative">${fmt(projected)}</span><span class="stat-label">Prévu</span></div>
        <div class="stat-item"><span class="stat-value ${remaining>=0?'positive':'negative'}">${fmt(remaining)}</span><span class="stat-label">Reste</span></div>
      </div>
    </div>
  </div>`;
  
  // Alertes et suggestions
  if(remaining<0){
    html+=`<div class="alert-box danger">
      <div class="alert-icon">🚨</div>
      <div class="alert-content">
        <div class="alert-title">Dépassement de ${fmt(abs(remaining))}</div>
        <div class="alert-text">Tu dépasses ton budget de ${fmt(abs(remaining))}. Réduis les dépenses variables ci-dessous.</div>
      </div>
    </div>`;
  }else if(remaining<100){
    html+=`<div class="alert-box warning">
      <div class="alert-icon">⚠️</div>
      <div class="alert-content">
        <div class="alert-title">Marge très faible</div>
        <div class="alert-text">Il ne te reste que ${fmt(remaining)}. Prévois une marge de sécurité.</div>
      </div>
    </div>`;
  }
  
  // Scénarios
  const fixedCats=['Logement','Emprunts (hors immobilier)','Abonnements & téléphonie','Santé'];
  const fixedTotal=Object.entries(f.adjusted).filter(([c])=>fixedCats.includes(c)).reduce((s,[,a])=>s+a,0);
  const varTotal=projected-fixedTotal;
  
  html+=`<div class="section-title">Scénarios</div>
  <div class="grid grid-2" style="margin-bottom:16px">
    <div class="card" style="background:var(--green-bg);border-color:var(--green);padding:16px">
      <div style="font-size:12px;color:var(--green);font-weight:600;margin-bottom:4px">🌟 OPTIMISTE</div>
      <div style="font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--green)">+${fmt(available-fixedTotal-(varTotal*0.7))}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">-30% variables</div>
    </div>
    <div class="card" style="background:var(--red-bg);border-color:var(--red);padding:16px">
      <div style="font-size:12px;color:var(--red);font-weight:600;margin-bottom:4px">⚠️ PESSIMISTE</div>
      <div style="font-family:'Space Mono',monospace;font-size:20px;font-weight:700;color:var(--red)">${fmt(available-fixedTotal-(varTotal*1.2))}</div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">+20% variables</div>
    </div>
  </div>`;
  
  // Sliders par catégorie
  html+=`<div class="section-title">Ajuster les dépenses</div>`;
  Object.entries(f.adjusted).sort((a,b)=>b[1]-a[1]).forEach(([cat,current])=>{
    const avgVal=avg[cat]||current;
    const isFixed=fixedCats.includes(cat);
    const color=CC[cat]||'#636e72';
    html+=`<div class="slider-container" style="${isFixed?'opacity:0.7':''}">
      <div class="slider-header">
        <div class="slider-title">
          <span class="slider-dot" style="background:${color}"></span>
          ${cat} ${isFixed?'🔒':''}
        </div>
        <div class="slider-value" style="color:${color}">${fmt(current)}</div>
      </div>
      <input type="range" min="0" max="${avgVal*2.5}" value="${current}" step="5" 
        ${isFixed?'disabled':`oninput="S.forecast.adjusted['${cat}']=+this.value;render()"`}
        style="accent-color:${color}">
      <div class="range-labels">
        <span>0€</span>
        <span>Moy: ${fmt(avgVal)}</span>
        <span>${fmt(avgVal*2.5)}</span>
      </div>
    </div>`;
  });
  
  html+=`<button class="btn btn-primary" onclick="saveForecast()" style="margin-top:8px">💾 Sauvegarder cette prévision</button>`;
  
  return html;
}

function renderAdd(){
  return `<div class="card" style="margin-bottom:16px;border-left:4px solid var(--red)">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--red)">➖ Nouvelle dépense</div>
    <div class="form-group">
      <label>Libellé</label>
      <input type="text" id="expLabel" placeholder="Ex: Courses Lidl" style="font-size:16px">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Montant (€)</label>
        <input type="number" id="expAmt" placeholder="25.00" step="0.01" style="font-size:18px;font-weight:700">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="expDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <select id="expCat" style="font-size:16px">
        ${Object.keys(CC).map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    <button class="btn btn-danger" onclick="addExpense()">Ajouter la dépense</button>
  </div>
  
  <div class="card" style="border-left:4px solid var(--green)">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--green)">➕ Revenu exceptionnel</div>
    <div class="form-group">
      <label>Libellé</label>
      <input type="text" id="incLabel" placeholder="Ex: Prime, Remboursement..." style="font-size:16px">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Montant (€)</label>
        <input type="number" id="incAmt" placeholder="500.00" step="0.01" style="font-size:18px;font-weight:700;color:var(--green)">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="incDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>
    <button class="btn btn-success" onclick="addIncome()">Ajouter le revenu</button>
  </div>`;
}

function renderDetails(){
  let d=gF().sort((a,b)=>b.date.localeCompare(a.date));
  if(S.filterCat)d=d.filter(x=>x.categoryParent===S.filterCat);
  
  let html=`<div style="margin-bottom:16px;display:flex;gap:8px;overflow-x:auto;padding:4px 0">
    <button class="month-btn ${S.mo===0?'active':''}" onclick="S.mo=0;S.filterCat=null;render()">Tout</button>
    ${gM().map(m=>`<button class="month-btn ${S.mo===m?'active':''}" onclick="S.mo=${m};S.filterCat=null;render()">${MN[m]}</button>`).join('')}
  </div>`;
  
  if(S.filterCat){
    html+=`<div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span class="badge" style="background:${CC[S.filterCat]||'#636e72'}20;color:${CC[S.filterCat]||'#636e72'};border-color:${CC[S.filterCat]||'#636e72'}">
        ${ICONS[S.filterCat]||'📦'} ${S.filterCat}
      </span>
      <button class="btn btn-secondary" style="padding:4px 12px;font-size:12px" onclick="S.filterCat=null;render()">✕ Retirer filtre</button>
    </div>`;
  }
  
  if(d.length===0){
    html+=`<div class="empty-state">
      <div class="empty-icon">📭</div>
      <div class="empty-text">Aucune transaction pour cette période</div>
    </div>`;
  }else{
    html+=`<div class="tx-list">`;
    d.forEach(x=>{
      const isExp=x.amount<0;
      html+=`<div class="tx-item">
        <div class="tx-date">${x.date.slice(5)}</div>
        <div class="tx-info">
          <span class="tx-label">${x.label}</span>
          <span class="tx-cat">${ICONS[x.categoryParent]||''} ${x.categoryParent}</span>
        </div>
        <div class="tx-amount ${isExp?'negative':'positive'}">${isExp?'':'+'}${fmt(abs(x.amount))}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  
  const manualCount=S.manual.length;
  if(manualCount>0){
    html+=`<div style="margin-top:24px;text-align:center">
      <button class="btn btn-secondary" onclick="S.manual=[];save();render()" style="font-size:13px;padding:12px 24px">
        🗑️ Effacer mes ${manualCount} ajouts manuels
      </button>
    </div>`;
  }
  
  return html;
}

function addExpense(){
  const l=document.getElementById('expLabel').value.trim();
  const a=parseFloat(document.getElementById('expAmt').value);
  const d=document.getElementById('expDate').value;
  const c=document.getElementById('expCat').value;
  if(!l||!a){toast('⚠️','Remplis tous les champs');return}
  S.manual.push({date:d,label:l,categoryParent:c,amount:-abs(a),month:+d.split('-')[1]});
  save();
  toast('✅','Dépense ajoutée');
  S.tab='dashboard';
  render();
}

function addIncome(){
  const l=document.getElementById('incLabel').value.trim();
  const a=parseFloat(document.getElementById('incAmt').value);
  const d=document.getElementById('incDate').value;
  if(!l||!a){toast('⚠️','Remplis tous les champs');return}
  S.manual.push({date:d,label:l,categoryParent:'Revenu',amount:abs(a),month:+d.split('-')[1]});
  save();
  toast('✅','Revenu ajouté');
  S.tab='dashboard';
  render();
}

function saveForecast(){
  save();
  toast('✅','Prévision sauvegardée');
}

// Init
load();
render();
</script>
</body>
</html>
