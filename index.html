const MN=["","Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const TABS=[{id:'dashboard',l:'📊 Vue'},{id:'forecast',l:'📅 Prévoir'},{id:'transactions',l:'📋 Opérations'},{id:'import',l:'📥 Import'},{id:'settings',l:'⚙️'}];
const AC=Object.keys(COL).sort();
const DEFO={"hlm les foyers":"Logement"};
// Categories that are typically fixed charges
const FIXED_CATS=new Set(["Logement","Abonnements & téléphonie","Santé","Emprunts (hors immobilier)","Auto & Moto","Services financiers & professionnels"]);

let S={tab:'dashboard',mk:'all',tx:[],sal:2300,savT:200,savOn:false,taxR:0,taxOn:false,fAdj:{},fEd:null,catOv:{},
  fixedSup:{}, // supplier -> true/false user override
  manRec:[]    // [{label,amount,cat,supplier}] manually added recurring
};

function mkOf(t){return t.date.slice(0,7)}
function mkL(mk){const[y,m]=mk.split('-');return MN[+m]+' '+y}
function mkS(mk){const[y,m]=mk.split('-');const ms=gMks();const ys=new Set(ms.map(k=>k.split('-')[0]));return ys.size>1?MN[+m]+' '+y:MN[+m]}
function gMks(){return[...new Set(S.tx.map(mkOf))].sort()}
function txM(mk){return mk==='all'?S.tx:S.tx.filter(t=>mkOf(t)===mk)}
function nxtMk(mk){const[y,m]=mk.split('-').map(Number);return(m===12?y+1:y)+'-'+String(m===12?1:m+1).padStart(2,'0')}
function stx(r){return r.map((r,i)=>({id:i,date:r[0],dateVal:r[1],label:r[2],category:r[3],categoryParent:r[4],supplier:r[5],amount:r[6]}))}
function aOv(){S.tx.forEach(t=>{const s=t.supplier.toLowerCase();if(S.catOv[s])t.categoryParent=S.catOv[s]})}
function save(){localStorage.setItem('fp5',JSON.stringify({tx:S.tx,sal:S.sal,savT:S.savT,savOn:S.savOn,taxR:S.taxR,taxOn:S.taxOn,fAdj:S.fAdj,catOv:S.catOv,fixedSup:S.fixedSup,manRec:S.manRec}))}
function load(){try{const d=JSON.parse(localStorage.getItem('fp5'));if(d&&d.tx&&d.tx.length){Object.assign(S,{tx:d.tx,sal:d.sal??2300,savT:d.savT??200,savOn:d.savOn??false,taxR:d.taxR??0,taxOn:d.taxOn??false,fAdj:d.fAdj??{},catOv:d.catOv??{...DEFO},fixedSup:d.fixedSup??{},manRec:d.manRec??[]});aOv();return}}catch(e){}
  S.tx=stx(SR);S.catOv={...DEFO};aOv();
}
function cSt(mk){const tx=txM(mk).filter(t=>t.amount<0);const o={};tx.forEach(t=>{const c=t.categoryParent;if(!o[c])o[c]={total:0,count:0,txs:[]};o[c].total+=Math.abs(t.amount);o[c].count++;o[c].txs.push(t)});return o}
function cAvg(){const ms=gMks();if(!ms.length)return{};const s={};ms.forEach(mk=>{const st=cSt(mk);Object.entries(st).forEach(([c,d])=>{s[c]=(s[c]||0)+d.total})});const a={};Object.keys(s).forEach(c=>a[c]=s[c]/ms.length);return a}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function fmtD(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n)}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function net(s){let n=s||S.sal;if(S.taxOn&&S.taxR>0)n-=n*(S.taxR/100);if(S.savOn&&S.savT>0)n-=S.savT;return n}
function toast(i,m){const el=document.getElementById('toast');document.getElementById('ti').textContent=i;document.getElementById('tm').textContent=m;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),3000)}
function setTab(id){S.tab=id;rNav();render()}
function setMk(mk){S.mk=mk;render()}
function rNav(){document.getElementById('nav').innerHTML=TABS.map(t=>`<button class="nb ${S.tab===t.id?'a':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('')}

/* ── FIXED CHARGES DETECTION ── */
function detectFixed(){
  const mks=gMks();if(mks.length<2)return[];
  const bySup={};
  S.tx.filter(t=>t.amount<0).forEach(t=>{
    const sup=t.supplier.toLowerCase();if(!sup)return;
    const mk=mkOf(t);
    if(!bySup[sup])bySup[sup]={months:{},cat:t.categoryParent,label:t.label};
    if(!bySup[sup].months[mk])bySup[sup].months[mk]=0;
    bySup[sup].months[mk]+=Math.abs(t.amount);
  });
  const fixed=[];
  Object.entries(bySup).forEach(([sup,d])=>{
    if(S.fixedSup[sup]===false)return;
    const mc=Object.keys(d.months).length;
    const amts=Object.values(d.months);
    const avg=amts.reduce((a,b)=>a+b,0)/mc;
    const maxDev=Math.max(...amts.map(a=>Math.abs(a-avg)/Math.max(avg,1)));
    const isFixed=S.fixedSup[sup]===true||
      (mc>=Math.min(mks.length,2)&&maxDev<0.15&&FIXED_CATS.has(d.cat));
    if(isFixed){
      fixed.push({supplier:sup,label:d.label.split('|')[0].trim().split(' CARTE')[0].split(' PRLV')[0].trim(),cat:d.cat,avg,months:mc,forced:S.fixedSup[sup]===true});
    }
  });
  // Add manual recurring
  S.manRec.forEach(r=>{
    fixed.push({supplier:r.supplier||r.label.toLowerCase(),label:r.label,cat:r.cat,avg:Math.abs(r.amount),months:0,forced:true,manual:true});
  });
  return fixed.sort((a,b)=>b.avg-a.avg);
}

function vMk(){if(S.mk!=='all'&&!gMks().includes(S.mk)){const m=gMks();S.mk=m.length?m[m.length-1]:'all'}}
function render(){
  vMk();const el=document.getElementById('co'),mks=gMks();
  document.getElementById('sb').textContent=`${S.tx.length} opérations · ${mks.length} mois`;
  document.getElementById('fab').style.display=['transactions','dashboard'].includes(S.tab)?'flex':'none';
  switch(S.tab){case'dashboard':el.innerHTML=vD(mks);break;case'forecast':el.innerHTML=vF();break;case'transactions':el.innerHTML=vT(mks);break;case'import':el.innerHTML=vI();break;case'settings':el.innerHTML=vS();break}
}

function mChips(mks){return`<div class="ms"><button class="mc ${S.mk==='all'?'a':''}" onclick="setMk('all')">Tout</button>${mks.map(mk=>`<button class="mc ${S.mk===mk?'a':''}" onclick="setMk('${mk}')">${mkS(mk)}</button>`).join('')}</div>`}

/* ══ DASHBOARD ══ */
function vD(mks){
  const tx=txM(S.mk),exp=tx.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0),nb=S.mk==='all'?mks.length:1,av=net()*nb,bal=av-exp;
  const st=cSt(S.mk),sorted=Object.entries(st).sort((a,b)=>b[1].total-a[1].total);
  const ded=[];if(S.taxOn&&S.taxR>0)ded.push(`Impôt ${S.taxR}%`);if(S.savOn&&S.savT>0)ded.push(`Épargne ${fmt(S.savT)}`);
  
  // Fixed charges - only show active ones (excluded disappear naturally)
  const fixed=detectFixed();
  const fixedTotal=fixed.reduce((s,f)=>s+f.avg,0);
  
  let h=mChips(mks);
  h+=`<div class="g2"><div class="card"><div class="ch"><span class="ct">Dépenses</span><span style="font-size:18px">📉</span></div><div class="cv neg">${fmt(exp)}</div><div class="csub">${tx.filter(t=>t.amount<0).length} transactions</div></div>
  <div class="card"><div class="ch"><span class="ct">Solde estimé</span><span style="font-size:18px">${bal>=0?'📈':'🚨'}</span></div><div class="cv ${bal>=0?'pos':'neg'}">${fmt(bal)}</div><div class="csub">sur ${fmt(av)} dispo${ded.length?' <span style="opacity:.6">('+ded.join(' · ')+')</span>':''}</div></div></div>`;
  
  // FIXED CHARGES CARD
  if(fixed.length){
    const editing=S._editFix;
    h+=`<div class="card" style="border-left:3px solid var(--al)"><div class="ch"><span class="ct">🔒 Charges fixes mensuelles</span><div style="display:flex;align-items:center;gap:10px"><span style="font-family:var(--m);font-size:20px;font-weight:700;color:var(--no)">${fmt(fixedTotal)}</span><button class="bi" onclick="S._editFix=!S._editFix;render()" style="${editing?'background:var(--accent);color:#fff':''}">✎</button></div></div>
    <div style="font-size:12px;color:var(--ts);margin-bottom:12px">${fixed.length} charges · <span style="color:var(--ok)">${fmt(net()-fixedTotal)}</span> restant après charges${editing?' · <span style="color:var(--al)">Décochez pour retirer</span>':''}</div>`;
    fixed.forEach(f=>{
      if(editing){
        h+=`<div class="fix-item" onclick="removeFix('${esc(f.supplier)}')"><span class="fix-toggle on">✓</span><span class="fix-icon">${IC[f.cat]||'📦'}</span><span class="fix-label">${f.label}${f.manual?'<span class="fix-tag">Manuel</span>':''}</span><span class="fix-amt">${fmt(f.avg)}</span></div>`;
      } else {
        h+=`<div class="fix-item" style="cursor:default"><span class="fix-icon">${IC[f.cat]||'📦'}</span><span class="fix-label">${f.label}${f.manual?'<span class="fix-tag">Manuel</span>':''}</span><span class="fix-amt">${fmt(f.avg)}</span></div>`;
      }
    });
    h+=`</div>`;
  }
  
  if(S.savOn||S.taxOn){h+=`<div class="card" style="padding:14px 18px"><div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;font-family:var(--m)">`;
    if(S.taxOn&&S.taxR>0)h+=`<div style="display:flex;align-items:center;gap:6px"><span style="color:var(--warn)">⚡</span> Impôt : <strong style="color:var(--warn)">${fmt(S.sal*(S.taxR/100)*nb)}</strong></div>`;
    if(S.savOn&&S.savT>0)h+=`<div style="display:flex;align-items:center;gap:6px"><span style="color:var(--ok)">💎</span> Épargne : <strong style="color:var(--ok)">${fmt(S.savT*nb)}</strong></div>`;
    h+=`</div></div>`}
  
  h+=`<div class="st">Répartition ${S.mk==='all'?'globale':mkS(S.mk)}</div>`;
  sorted.forEach(([cat,data])=>{const pct=exp>0?(data.total/exp*100):0,col=COL[cat]||'#6b7080',ic=IC[cat]||'📦';
    h+=`<div class="cc" onclick="showCD('${esc(cat)}')" style="--cat-color:${col}"><div class="h"><div class="n"><span style="font-size:18px">${ic}</span><span>${cat}</span><span class="cnt">${data.count}</span></div><div class="amt" style="color:${col}">${fmt(data.total)}</div></div><div class="bar"><div class="fill" style="width:${pct}%;background:${col}"></div></div><div class="ft"><span>${pct.toFixed(1)}%</span><span class="arr">Détail →</span></div></div>`});
  return h;
}

/* ══ FORECAST ══ */
function vF(){
  const avg=cAvg(),mks=gMks(),last=mks.length?mks[mks.length-1]:'2026-03',nk=nxtMk(last),nl=mkL(nk);
  if(!Object.keys(S.fAdj).length)S.fAdj={...avg};
  const proj=Object.values(S.fAdj).reduce((a,b)=>a+b,0),av=net(),rem=av-proj,pct=av>0?(proj/av)*100:0;
  const fx=['Logement','Emprunts (hors immobilier)','Abonnements & téléphonie','Santé'];
  let h=`<div class="card" style="background:linear-gradient(135deg,#6c5ce7,#5b4cd8);border:none;text-align:center"><div style="font-size:12px;opacity:.85;letter-spacing:1px;text-transform:uppercase">Prévision</div><div style="font-family:var(--m);font-size:26px;font-weight:700;margin:6px 0">${nl}</div><div style="font-size:13px;opacity:.8">Basé sur ${mks.length} mois</div></div>
  <div class="g2" style="margin-top:14px"><div class="card"><div class="ct">Budget prévu</div><div class="cv">${fmt(proj)}</div></div>
  <div class="card" style="${rem<0?'border-color:rgba(240,108,108,.4)':rem<200?'border-color:rgba(240,195,78,.4)':'border-color:rgba(52,217,180,.4)'}"><div class="ct" style="color:${rem<0?'var(--no)':rem<200?'var(--warn)':'var(--ok)'}">Reste</div><div class="cv" style="color:${rem<0?'var(--no)':rem<200?'var(--warn)':'var(--ok)'}">${fmt(rem)}</div></div></div>
  <div class="card"><div class="ph"><span>Budget utilisé</span><span style="font-family:var(--m)">${pct.toFixed(1)}%</span></div><div class="pb"><div class="pf ${pct>95?'d':pct>80?'w':'s'}" style="width:${Math.min(pct,100)}%"></div></div></div>
  <div class="g3"><div class="sc op" onclick="aScen(0.8)"><div class="sl" style="color:var(--ok)">Optimiste</div><div class="sv" style="color:var(--ok)">${fmt(av-proj*0.8)}</div><div class="ss">-20%</div></div>
  <div class="sc ne" onclick="aScen(1)"><div class="sl" style="color:var(--al)">Réaliste</div><div class="sv">${fmt(rem)}</div><div class="ss">Moyennes</div></div>
  <div class="sc pe" onclick="aScen(1.2)"><div class="sl" style="color:var(--no)">Pessimiste</div><div class="sv" style="color:var(--no)">${fmt(av-proj*1.2)}</div><div class="ss">+20%</div></div></div>
  <div class="st">Par catégorie</div>`;
  Object.entries(S.fAdj).sort((a,b)=>b[1]-a[1]).forEach(([cat,val])=>{const isF=fx.includes(cat),avgV=avg[cat]||val,col=COL[cat]||'#6b7080',ed=S.fEd===cat;
    h+=`<div class="fr"><div class="fh"><div class="fc"><span class="fd" style="background:${col}"></span><span>${cat}${isF?' 🔒':''}</span></div><div class="faw">`;
    if(ed){h+=`<input type="number" class="fa ed" value="${val.toFixed(2)}" id="fedit" step="0.01" onkeydown="if(event.key==='Enter')cFE('${esc(cat)}');if(event.key==='Escape')xFE()"><button class="bi ok" onclick="cFE('${esc(cat)}')">✓</button><button class="bi ko" onclick="xFE()">✕</button>`}
    else{h+=`<span class="fa" style="color:${col}" onclick="sFE('${esc(cat)}')">${fmt(val)}</span>`;if(!isF)h+=`<button class="bi" onclick="sFE('${esc(cat)}')">✎</button>`}
    h+=`</div></div>`;
    if(!isF&&!ed){const mx=Math.max(avgV*3,val*1.5,100),diff=avgV>0?((val/avgV-1)*100):0;
      h+=`<input type="range" class="fsl" min="0" max="${mx.toFixed(0)}" value="${val.toFixed(0)}" step="5" style="--cat-color:${col}" oninput="uFA('${esc(cat)}',this.value)"><div class="fhi"><span>Moy: ${fmt(avgV)}</span><span>${diff>1?'↑ +'+diff.toFixed(0)+'%':diff<-1?'↓ '+diff.toFixed(0)+'%':'→ Moy'}</span></div>`}
    h+=`</div>`});
  h+=`<div style="display:flex;gap:12px;margin-top:16px"><button class="btn bs" onclick="rFC()" style="flex:1">🔄 Reset</button><button class="btn bp" onclick="sFC()" style="flex:1">💾 Sauver</button></div>`;
  return h;
}

/* ══ TRANSACTIONS ══ */
function vT(mks){
  const tx=txM(S.mk).sort((a,b)=>b.date.localeCompare(a.date));

/* ══ SETTINGS ══ */
function vS(){

  const rk=Object.keys(S.catOv),fixed=detectFixed();
  let h=`<div class="card"><div class="ct" style="margin-bottom:20px">⚙️ Paramètres</div>
  <div class="fg"><label>Revenu mensuel net</label><input type="number" value="${S.sal}" onchange="S.sal=parseFloat(this.value)||0;save();render()" style="font-size:18px"></div>

  <div class="dc ${S.taxOn?'en':''}"><div class="tr ${S.taxOn?'a':''}" onclick="tTax()"><div><div class="trl">⚡ Prélèvement à la source</div><div class="trs">Taux d'imposition</div></div><div class="tsw"></div></div>${S.taxOn?`<div style="padding:12px 16px 4px"><div class="di"><input type="number" value="${S.taxR}" min="0" max="50" step="0.1" onchange="S.taxR=parseFloat(this.value)||0;save();render()"><span class="u">%</span></div></div>`:''}</div>
  <div class="st" style="margin-top:24px">Récapitulatif</div>
  <div class="card" style="background:rgba(255,255,255,0.02);margin-bottom:0"><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px"><span>Revenu brut</span><span style="font-family:var(--m);font-weight:600">${fmt(g)}</span></div>`;
  if(S.taxOn&&S.taxR>0)h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--warn)"><span>− Impôt (${S.taxR}%)</span><span style="font-family:var(--m);font-weight:600">-${fmt(ta)}</span></div>`;
  if(S.savOn&&S.savT>0)h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--ok)"><span>− Épargne</span><span style="font-family:var(--m);font-weight:600">-${fmt(sa)}</span></div>`;
  const fixedT=fixed.reduce((s,f)=>s+f.avg,0);
  h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--no)"><span>− Charges fixes</span><span style="font-family:var(--m);font-weight:600">-${fmt(fixedT)}</span></div>`;
  h+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;font-size:16px;font-weight:700"><span>Budget libre</span><span style="font-family:var(--m);color:${n-fixedT>=0?'var(--ok)':'var(--no)'}">${fmt(n-fixedT)}</span></div></div>
  <div class="al ai" style="margin-top:16px">💾 Sauvegarde automatique</div></div>`;

  // Category rules
  h+=`<div class="card" style="margin-top:14px"><div class="ct" style="margin-bottom:14px">🏷️ Règles de catégorisation (${rk.length})</div>`;
  if(rk.length){rk.sort().forEach(s=>{h+=`<div class="ri"><span class="rs">${s}</span><span class="ra">→</span><span class="rc">${IC[S.catOv[s]]||'📦'} ${S.catOv[s]}</span><button class="rd" onclick="dRule('${esc(s)}')">✕</button></div>`})}
  else{h+=`<div style="text-align:center;padding:16px;color:var(--tm);font-size:13px">Aucune règle</div>`}
  h+=`</div>`;

  // Manual recurring
  h+=`<div class="card" style="margin-top:14px"><div class="ct" style="margin-bottom:14px">🔄 Charges récurrentes manuelles (${S.manRec.length})</div>
  <p style="color:var(--ts);font-size:13px;margin-bottom:14px">Ajoutez ici les charges fixes qui n'apparaissent pas encore dans vos CSV.</p>`;
  if(S.manRec.length){S.manRec.forEach((r,i)=>{h+=`<div class="ri"><span class="rs">${IC[r.cat]||'📦'} ${r.label}</span><span class="ra">${fmt(Math.abs(r.amount))}/mois</span><button class="rd" onclick="dManRec(${i})">✕</button></div>`})}

  return h;
}

/* ── ACTIONS ── */
function tSav(){S.savOn=!S.savOn;save();render();toast(S.savOn?'💎':'⭕',S.savOn?'Épargne ON':'Épargne OFF')}
function tTax(){S.taxOn=!S.taxOn;save();render();toast(S.taxOn?'⚡':'⭕',S.taxOn?'Impôt ON':'Impôt OFF')}
function removeFix(sup){S.fixedSup[sup]=false;S._editFix=false;save();render();toast('🔓','Charge retirée')}
function sFE(c){S.fEd=c;render();requestAnimationFrame(()=>{const i=document.getElementById('fedit');if(i){i.focus();i.select()}})}
function cFE(c){const i=document.getElementById('fedit'),v=parseFloat(i.value);if(!isNaN(v)&&v>=0){S.fAdj[c]=v;S.fEd=null;save();render();toast('✅','OK')}}
function xFE(){S.fEd=null;render()}
function uFA(c,v){S.fAdj[c]=parseFloat(v);render()}
function aScen(f){const avg=cAvg(),fx=['Logement','Emprunts (hors immobilier)'];Object.keys(S.fAdj).forEach(c=>{if(!fx.includes(c))S.fAdj[c]=(avg[c]||0)*f});render();toast('✅',f<1?'Optimiste':f>1?'Pessimiste':'Réaliste')}
function rFC(){S.fAdj={...cAvg()};render();toast('🔄','Reset')}
function sFC(){save();toast('💾','Sauvé')}
function dManRec(i){S.manRec.splice(i,1);save();render();toast('🗑️','Supprimé')}

/* ── CATEGORY DETAIL ── */
function showCD(cat){
  const b=document.getElementById('m-cat-b'),col=COL[cat]||'#6b7080';
  document.getElementById('m-cat-t').innerHTML=`<span style="margin-right:8px">${IC[cat]||'📦'}</span>${cat}`;
  let tx=S.mk==='all'?S.tx.filter(t=>t.categoryParent===cat&&t.amount<0):S.tx.filter(t=>t.categoryParent===cat&&t.amount<0&&mkOf(t)===S.mk);
  tx.sort((a,b)=>b.date.localeCompare(a.date));
  const total=tx.reduce((s,t)=>s+Math.abs(t.amount),0);
  const byMk={};tx.forEach(t=>{const k=mkOf(t);byMk[k]=(byMk[k]||0)+Math.abs(t.amount)});
  let h=`<div style="margin-bottom:20px"><div style="font-family:var(--m);font-size:30px;font-weight:700;color:${col}">${fmt(total)}</div><div style="font-size:13px;color:var(--ts);margin-top:4px">${tx.length} transactions · ${Object.keys(byMk).length} mois</div></div>`;
  if(Object.keys(byMk).length>1){h+=`<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.8px">Par mois</div>`;
    Object.entries(byMk).sort((a,b)=>a[0].localeCompare(b[0])).forEach(([mk,a])=>{h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>${mkL(mk)}</span><span style="font-family:var(--m);font-weight:600">${fmt(a)}</span></div>`});h+=`<div style="margin-bottom:20px"></div>`}
  h+=`<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--ts);text-transform:uppercase;letter-spacing:.8px">Opérations</div>`;
  tx.forEach(t=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--surface);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)"><div style="min-width:0;flex:1;margin-right:12px"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.label}</div><div style="font-size:11px;color:var(--tm);font-family:var(--m)">${t.date} · ${t.category}</div></div><div style="font-family:var(--m);font-weight:700;color:var(--no);flex-shrink:0;font-size:13px">${fmtD(Math.abs(t.amount))}</div></div>`});
  b.innerHTML=h;document.getElementById('m-cat').classList.add('a');
}

/* ── REASSIGN ── */
function oRe(id){
  const tx=S.tx.find(t=>t.id===id);if(!tx)return;
  const b=document.getElementById('m-re-b'),sup=tx.supplier,supL=sup?sup.toLowerCase():'',same=sup?S.tx.filter(t=>t.supplier.toLowerCase()===supL):[];
  const isRec=S.fixedSup[supL]===true||S.manRec.some(r=>r.supplier===supL);
  let h=`<div style="margin-bottom:16px;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)">
    <div style="font-weight:600;font-size:14px;margin-bottom:4px">${tx.label}</div>
    <div style="font-size:12px;color:var(--tm);font-family:var(--m)">${tx.date} · ${fmtD(Math.abs(tx.amount))}</div>
    <div style="font-size:12px;color:var(--ts);margin-top:4px">Catégorie: <strong>${tx.categoryParent}</strong></div>
    ${sup?`<div style="font-size:11px;color:var(--tm);margin-top:4px">"${sup}" → ${same.length} opérations</div>`:''}
  </div>
  <div style="font-weight:700;font-size:12px;color:var(--tm);text-transform:uppercase;margin-bottom:10px;letter-spacing:.8px">Type de dépense</div>
  <div style="display:flex;gap:8px;margin-bottom:20px">
    <div onclick="setRecur(${id},false)" style="flex:1;padding:14px;border-radius:var(--rs);border:1px solid ${isRec?'var(--border)':'var(--accent)'};background:${isRec?'transparent':'rgba(124,108,240,0.08)'};cursor:pointer;text-align:center;transition:all .2s">
      <div style="font-size:20px;margin-bottom:4px">⚡</div>
      <div style="font-weight:600;font-size:13px;color:${isRec?'var(--ts)':'var(--text)'}">Ponctuel</div>
    </div>
    <div onclick="setRecur(${id},true)" style="flex:1;padding:14px;border-radius:var(--rs);border:1px solid ${isRec?'var(--accent)':'var(--border)'};background:${isRec?'rgba(124,108,240,0.08)':'transparent'};cursor:pointer;text-align:center;transition:all .2s">
      <div style="font-size:20px;margin-bottom:4px">🔄</div>
      <div style="font-weight:600;font-size:13px;color:${isRec?'var(--text)':'var(--ts)'}">Récurrent</div>
      <div style="font-size:10px;color:var(--tm);margin-top:2px">→ Charge fixe</div>
    </div>
  </div>
  <div style="font-weight:700;font-size:12px;color:var(--tm);text-transform:uppercase;margin-bottom:10px;letter-spacing:.8px">Catégorie</div>`;
  AC.forEach(cat=>{const col=COL[cat]||'#6b7080',ic=IC[cat]||'📦',act=cat===tx.categoryParent;
    h+=`<div onclick="dRe(${id},'${esc(cat)}')" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid ${act?'var(--accent)':'var(--border)'};background:${act?'rgba(124,108,240,0.08)':'transparent'};transition:all .15s" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='${act?'rgba(124,108,240,0.08)':'transparent'}'"><span style="font-size:16px">${ic}</span><span style="font-weight:600;font-size:13px;flex:1">${cat}</span><span style="width:10px;height:10px;border-radius:50%;background:${col}"></span></div>`});
  if(sup)h+=`<div class="al aw" style="margin-top:14px">⚡ S'applique aux <strong>${same.length}</strong> opérations de "${sup}"</div>`;
  b.innerHTML=h;document.getElementById('m-re').classList.add('a');
}
function setRecur(id,rec){
  const tx=S.tx.find(t=>t.id===id);if(!tx)return;
  const supL=tx.supplier.toLowerCase();
  if(rec){
    S.fixedSup[supL]=true;
    if(!S.manRec.some(r=>r.supplier===supL)){
      S.manRec.push({label:tx.label.split('|')[0].trim().split(' CARTE')[0].split(' PRLV')[0].trim(),amount:tx.amount,cat:tx.categoryParent,supplier:supL})}
    save();toast('🔄','Ajouté aux charges fixes');
  }else{
    delete S.fixedSup[supL];
    S.manRec=S.manRec.filter(r=>r.supplier!==supL);
    save();toast('⚡','Retiré des charges fixes');
  }
  oRe(id);render();
}
function dRe(id,cat){const tx=S.tx.find(t=>t.id===id);if(!tx)return;const sup=tx.supplier.toLowerCase();if(sup)S.catOv[sup]=cat;S.tx.forEach(t=>{if(t.supplier.toLowerCase()===sup)t.categoryParent=cat});
  S.manRec.forEach(r=>{if(r.supplier===sup)r.cat=cat});
  save();cm('m-re');render();toast('🏷️',S.tx.filter(t=>t.supplier.toLowerCase()===sup).length+' → '+cat)}
function dRule(sup){delete S.catOv[sup];const orig=stx(SR);S.tx.forEach(t=>{if(t.supplier.toLowerCase()===sup.toLowerCase()){const o=orig.find(x=>x.id===t.id);if(o)t.categoryParent=o.categoryParent}});aOv();save();render();toast('🗑️','Règle supprimée')}

/* ── ADD TRANSACTION / RECURRING ── */
function openAdd(forceRec){
  const b=document.getElementById('m-add-b');
  const today=new Date().toISOString().slice(0,10);
  let catO=AC.map(c=>`<option value="${c}">${IC[c]||'📦'} ${c}</option>`).join('');
  b.innerHTML=`
    <div class="fg"><label>Libellé</label><input type="text" id="a-lb" placeholder="Ex: Loyer, Courses..."></div>
    <div class="afg">
      <div class="fg"><label>Montant (€)</label><input type="number" id="a-am" step="0.01" placeholder="0.00"></div>
      <div class="fg"><label>Date</label><input type="date" id="a-dt" value="${today}"></div>
    </div>
    <div class="fg"><label>Catégorie</label><select id="a-cat">${catO}</select></div>
    <div class="fg"><label>Type</label>
      <div class="type-toggle"><button class="dep sel" id="at-dep" onclick="sAT('dep')">📉 Dépense</button><button class="rev" id="at-rev" onclick="sAT('rev')">📈 Revenu</button></div>
    </div>
    <div class="fg"><label>Fréquence</label>
      <div class="type-toggle"><button class="once ${forceRec?'':'sel'}" id="at-once" onclick="sAF('once')">⚡ Ponctuel</button><button class="rec ${forceRec?'sel':''}" id="at-rec" onclick="sAF('rec')">🔄 Récurrent</button></div>
      <div id="a-rec-info" style="margin-top:8px;font-size:12px;color:var(--ts);display:${forceRec?'block':'none'}">Cette opération sera ajoutée comme charge fixe mensuelle.</div>
    </div>
    <button class="btn bp" onclick="doAdd()" style="margin-top:8px">✅ Ajouter</button>`;
  window._aType='dep';window._aFreq=forceRec?'rec':'once';
  document.getElementById('m-add').classList.add('a');
  setTimeout(()=>document.getElementById('a-lb').focus(),200);
}
function sAT(t){window._aType=t;document.getElementById('at-dep').className=`dep ${t==='dep'?'sel':''}`;document.getElementById('at-rev').className=`rev ${t==='rev'?'sel':''}`}
function sAF(f){window._aFreq=f;document.getElementById('at-once').className=`once ${f==='once'?'sel':''}`;document.getElementById('at-rec').className=`rec ${f==='rec'?'sel':''}`;document.getElementById('a-rec-info').style.display=f==='rec'?'block':'none'}
function doAdd(){
  const lb=document.getElementById('a-lb').value.trim(),am=parseFloat(document.getElementById('a-am').value),dt=document.getElementById('a-dt').value,cat=document.getElementById('a-cat').value;
  if(!lb){toast('⚠️','Libellé requis');return}if(isNaN(am)||am<=0){toast('⚠️','Montant invalide');return}if(!dt){toast('⚠️','Date requise');return}
  const fAmt=window._aType==='dep'?-am:am;
  // Add transaction
  S.tx.push({id:Date.now()+Math.floor(Math.random()*1000),date:dt,dateVal:dt,label:lb,category:lb,categoryParent:cat,supplier:lb.toLowerCase(),amount:fAmt});
  // If recurring, also save as manual recurring
  if(window._aFreq==='rec'){
    S.manRec.push({label:lb,amount:fAmt,cat:cat,supplier:lb.toLowerCase()});
  }
  save();cm('m-add');S.mk=dt.slice(0,7);render();
  toast('✅',`${window._aType==='dep'?'Dépense':'Revenu'} ajouté${window._aFreq==='rec'?' (récurrent)':''}!`);
}

function cm(id){document.getElementById(id).classList.remove('a')}

/* ── IMPORT ── */
function pCSV(text){
  const lines=text.trim().split('\n'),out=[];
  for(let i=1;i<lines.length;i++){const row=[];let inQ=false,field='';
    for(let j=0;j<lines[i].length;j++){const c=lines[i][j];if(c==='"'){inQ=!inQ}else if(c===';'&&!inQ){row.push(field.trim());field=''}else{field+=c}}
    row.push(field.trim());if(row.length<7)continue;
    const amt=parseFloat(row[6].replace(',','.'));if(isNaN(amt))continue;
    const d=row[0],parts=d.split('-');if(parts.length<3)continue;
    out.push({id:Date.now()+i+Math.random(),date:d,dateVal:row[1],label:row[2].replace(/^"|"$/g,''),category:row[3].replace(/^"|"$/g,''),categoryParent:row[4].replace(/^"|"$/g,''),supplier:(row[5]||'').toLowerCase().replace(/^"|"$/g,''),amount:amt})}
  return out;
}
function oF(e){const files=e.target.files;if(!files.length)return;let t=0,d=0;
  const ps=Array.from(files).map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>{const n=pCSV(ev.target.result);const k=new Set(S.tx.map(t=>`${t.date}|${t.label}|${t.amount}`));const u=n.filter(t=>!k.has(`${t.date}|${t.label}|${t.amount}`));S.tx.push(...u);aOv();t+=u.length;d+=n.length-u.length;r()};rd.readAsText(f)}));
  Promise.all(ps).then(()=>{save();render();toast('✅',`${t} importées`);if(t>0)setTab('transactions')})}

function rAll(){if(!confirm('Effacer toutes les données ?'))return;localStorage.removeItem('fp5');S.tx=stx(SR);S.fAdj={};S.savOn=false;S.taxOn=false;S.savT=200;S.taxR=0;S.sal=2300;S.catOv={...DEFO};S.fixedSup={};S.manRec=[];aOv();S.mk='all';save();render();toast('🗑️','Reset OK')}

/* ── EVENTS ── */
document.addEventListener('dragover',e=>{const z=document.getElementById('dz');if(z){e.preventDefault();z.classList.add('dg')}});

  const ps=Array.from(files).map(f=>new Promise(r=>{const rd=new FileReader();rd.onload=ev=>{const n=pCSV(ev.target.result);const k=new Set(S.tx.map(t=>`${t.date}|${t.label}|${t.amount}`));const u=n.filter(t=>!k.has(`${t.date}|${t.label}|${t.amount}`));S.tx.push(...u);aOv();t+=u.length;d+=n.length-u.length;r()};rd.readAsText(f)}));
  Promise.all(ps).then(()=>{save();render();toast('✅',`${t} importées`);if(t>0)setTab('transactions')})}});
['m-cat','m-re','m-add'].forEach(id=>{document.getElementById(id).addEventListener('click',e=>{if(e.target.id===id)cm(id)})});
document.addEventListener('keydown',e=>{if(e.key==='Escape')['m-cat','m-re','m-add'].forEach(cm)});

load();const _m=gMks();S.mk=_m.length?_m[_m.length-1]:'all';rNav();render();
