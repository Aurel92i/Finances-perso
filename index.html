<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mes Finances</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--surface3:#222233;--border:#2a2a3d;--text:#e8e8f0;--text2:#8888a8;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00cec9;--green-bg:#00cec915;--red:#ff6b6b;--red-bg:#ff6b6b15;--orange:#fdcb6e;--orange-bg:#fdcb6e15;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}
.app{max-width:1400px;margin:0 auto;padding:16px;padding-bottom:100px}
.header{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--accent2),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .subtitle{color:var(--text2);font-size:12px;font-family:'Space Mono',monospace}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:4px 0;margin-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 6px;border-radius:12px;cursor:pointer;font-size:11px;font-weight:600;color:var(--text2);transition:all .2s;border:none;background:var(--surface);font-family:inherit;text-align:center;white-space:nowrap;border:1px solid var(--border)}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 12px rgba(108,92,231,0.3)}
.grid{display:grid;gap:12px}.grid-2{grid-template-columns:repeat(2,1fr)}
@media(max-width:380px){.grid-2{grid-template-columns:1fr}}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;position:relative;overflow:hidden}
.card:active{transform:scale(0.98)}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text2);font-weight:600}
.card-value{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;margin:4px 0}
.big-number{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;text-align:center;padding:16px 0}
.positive{color:var(--green)}.negative{color:var(--red)}.warning{color:var(--orange)}
.section-title{font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:1.5px;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);margin-left:8px}
.list-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.list-icon{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.list-content{flex:1;min-width:0}
.list-title{font-size:14px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-sub{font-size:12px;color:var(--text2)}
.list-amount{font-family:'Space Mono',monospace;font-size:15px;font-weight:700;flex-shrink:0;text-align:right}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);border:1px solid var(--border)}
.badge-red{background:var(--red-bg);color:var(--red);border-color:var(--red)}.badge-green{background:var(--green-bg);color:var(--green);border-color:var(--green)}.badge-orange{background:var(--orange-bg);color:var(--orange);border-color:var(--orange)}
input,select{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;color:var(--text);font-family:inherit;font-size:16px;width:100%;-webkit-appearance:none}
input:focus,select:focus{outline:none;border-color:var(--accent)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.form-group{margin-bottom:16px}
.form-row{display:flex;gap:12px}.form-row .form-group{flex:1}
.btn{width:100%;padding:16px;border-radius:12px;border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(0.96)}
.btn-primary{background:var(--accent);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid var(--red)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid var(--green)}
.btn-small{padding:8px 12px;font-size:13px;width:auto;display:inline-flex}
.alert-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px;display:flex;align-items:flex-start;gap:12px}
.alert-box.danger{background:var(--red-bg);border-color:var(--red)}
.alert-box.warning{background:var(--orange-bg);border-color:var(--orange)}
.alert-box.success{background:var(--green-bg);border-color:var(--green)}
.alert-icon{font-size:24px;flex-shrink:0}
.alert-content{flex:1}
.alert-title{font-weight:700;margin-bottom:2px;font-size:14px}
.alert-text{font-size:13px;color:var(--text2);line-height:1.4}
.month-selector{display:flex;gap:8px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.month-selector::-webkit-scrollbar{display:none}
.month-btn{padding:10px 20px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;white-space:nowrap;transition:all .2s}
.month-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.progress-container{margin:20px 0}
.progress-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:13px}
.progress-bar{height:12px;background:var(--surface2);border-radius:6px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;border-radius:6px;transition:width 0.5s ease;background:linear-gradient(90deg,var(--accent),var(--green))}
.progress-fill.warning{background:linear-gradient(90deg,var(--orange),var(--red))}
.progress-fill.danger{background:var(--red)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:16px 0}
.stat-item{text-align:center;padding:12px 8px;background:var(--surface2);border-radius:10px;border:1px solid var(--border)}
.stat-value{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;display:block;margin-bottom:2px}
.stat-label{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px}
.daily-budget-card{background:linear-gradient(135deg,var(--surface),var(--surface2));border:2px solid var(--accent);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:20px}
.daily-budget-label{font-size:12px;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.daily-budget-amount{font-family:'Space Mono',monospace;font-size:42px;font-weight:700;color:var(--accent);margin-bottom:4px}
.daily-budget-sub{font-size:13px;color:var(--text2)}
.forecast-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px}
.forecast-row-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.forecast-cat{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
.forecast-dot{width:14px;height:14px;border-radius:50%}
.forecast-amount-wrapper{display:flex;align-items:center;gap:8px}
.forecast-amount{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;padding:6px 12px;border-radius:8px;background:var(--surface2);cursor:pointer;border:1px solid transparent;transition:all .2s}
.forecast-amount:active{background:var(--surface3)}
.forecast-amount.editing{background:var(--bg);border-color:var(--accent);cursor:text}
.forecast-actions{display:flex;gap:8px;align-items:center}
.btn-icon{width:36px;height:36px;border-radius:8px;border:none;background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s}
.btn-icon:active{transform:scale(0.9)}
.btn-icon.confirm{background:var(--green);color:#fff}
.btn-icon.cancel{background:var(--red-bg);color:var(--red)}
.forecast-input{width:100px;text-align:right;font-family:'Space Mono',monospace;font-size:20px;font-weight:700;padding:6px 12px;border:2px solid var(--accent);border-radius:8px;background:var(--bg);color:var(--text)}
.forecast-slider{width:100%;height:6px;-webkit-appearance:none;background:var(--surface3);border-radius:3px;outline:none;margin:8px 0}

.forecast-row-hint{font-size:11px;color:var(--text2);display:flex;justify-content:space-between;margin-top:4px}
.coach-tip{background:var(--surface);border-left:4px solid var(--orange);padding:16px;border-radius:0 var(--radius) var(--radius) 0;margin-bottom:16px}
.coach-tip.danger{border-left-color:var(--red);background:var(--red-bg)}
.coach-tip.success{border-left-color:var(--green);background:var(--green-bg)}
.coach-tip-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;font-weight:700;font-size:14px}
.coach-tip-text{font-size:13px;color:var(--text2);line-height:1.5}
.tx-list{max-height:500px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);background:var(--surface)}

.tx-date{color:var(--text2);font-size:12px;font-family:'Space Mono',monospace;min-width:45px}
.tx-info{flex:1;min-width:0;margin:0 12px}
.tx-label{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;margin-bottom:2px}

.tx-amount{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;min-width:70px;text-align:right}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-icon{font-size:48px;margin-bottom:16px;opacity:0.5}
.hidden{display:none!important}

.toast{position:fixed;bottom:24px;left:16px;right:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.5);display:flex;align-items:center;gap:12px;font-size:14px;z-index:1000;transform:translateY(200%);transition:transform .4s}

.search-box:focus{outline:none;border-color:var(--accent);background-color:var(--surface3)}
.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.cat-btn{padding:16px 12px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
.cat-btn:active{transform:scale(0.95)}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-btn .emoji{font-size:24px}
.cat-btn .amount{font-size:11px;opacity:0.8;font-family:'Space Mono',monospace}
.recurring-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;background:var(--accent);color:#fff;margin-left:8px;font-weight:600;text-transform:uppercase}
.installment-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:2px 8px;border-radius:10px;background:var(--orange);color:#000;margin-left:8px;font-weight:600;text-transform:uppercase}
.type-selector{display:flex;gap:8px;margin-bottom:16px}
.type-option{flex:1;padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .2s}
.type-option.active{border-color:var(--accent);background:var(--surface2)}
.type-option .icon{font-size:20px;margin-bottom:4px;display:block}
.type-option .label{font-size:12px;font-weight:600;color:var(--text2)}
.type-option.active .label{color:var(--text)}
.history-stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.history-stat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.history-stat-title{font-size:16px;font-weight:700}
.history-stat-value{font-family:'Space Mono',monospace;font-size:20px;color:var(--accent)}
.history-list{max-height:300px;overflow-y:auto}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.history-item:last-child{border-bottom:none}
.history-item-date{font-size:12px;color:var(--text2);font-family:'Space Mono',monospace}
.history-item-amount{font-family:'Space Mono',monospace;font-weight:600}
</style>
</head>

function allTx(){return[...SEED.map(r=>({date:r.d,label:r.l,categoryParent:r.c,amount:r.a,type:r.t||'normal',months:r.months||1})),...S.manual,...S.imported]}
function gM(){return[...new Set(allTx().map(d=>d.month))].sort((a,b)=>a-b)}
function gF(){const a=allTx();return S.mo===0?a:a.filter(d=>d.month===S.mo)}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function abs(n){return Math.abs(n)}

function getStatsByCat(cat){
  const all=allTx().filter(x=>x.categoryParent===cat&&x.amount<0);
  const byMonth={};
  all.forEach(x=>{
    if(!byMonth[x.month])byMonth[x.month]=0;
    byMonth[x.month]+=abs(x.amount);
  });
  const months=Object.keys(byMonth).length||1;
  const total=all.reduce((s,x)=>s+abs(x.amount),0);
  const avg=total/months;
  const max=Math.max(...Object.values(byMonth),0);
  const min=Math.min(...Object.values(byMonth).filter(v=>v>0)||[0]);
  return{total,avg,max,min,count:all.length,byMonth};
}

function getRecurringCharges(){
  // Retourne les charges mensuelles détectées ou définies
  const fixed=['Logement','Emprunts (hors immobilier)','Abonnements & téléphonie','Santé'];
  const all=allTx();
  const recurring={};
  
  // Détecte automatiquement les transactions mensuelles
  all.forEach(x=>{
    if(x.type==='mensuel'||(x.amount<-50&&fixed.includes(x.categoryParent))){
      if(!recurring[x.categoryParent])recurring[x.categoryParent]=[];
      recurring[x.categoryParent].push(x);
    }
  });
  
  // Garde la plus récente par catégorie
  const result={};
  Object.entries(recurring).forEach(([cat,items])=>{
    const latest=items.sort((a,b)=>b.date.localeCompare(a.date))[0];
    result[cat]=abs(latest.amount);
  });
  
  return result;
}

function renderDashboard(){
  const d=gF();
  const expenses=d.filter(x=>x.amount<0);
  const income=d.filter(x=>x.amount>0);
  const totalExp=expenses.reduce((s,x)=>s+abs(x.amount),0);
  const totalInc=income.reduce((s,x)=>s+x.amount,0)+(S.mo===0?S.sal*gM().length:S.sal);
  const balance=totalInc-totalExp;
  
  const today=new Date().getDate();
  const daysInMonth=30;
  const daysLeft=Math.max(1,daysInMonth-today);
  const dailyBudget=(balance)/daysLeft;
  
  let html=`<div class="grid grid-2">
    <div class="card">
      <div class="card-header"><span class="card-label">Revenus</span><span class="positive">📈</span></div>
      <div class="card-value positive">${fmt(totalInc)}</div>
    </div>
    <div class="card">
      <div class="card-header"><span class="card-label">Dépenses</span><span class="negative">📉</span></div>
      <div class="card-value negative">${fmt(totalExp)}</div>
    </div>
  </div>
  
  <div class="daily-budget-card">
    <div class="daily-budget-label">💡 Budget quotidien restant</div>
    <div class="daily-budget-amount ${dailyBudget<0?'negative':'positive'}">${fmt(dailyBudget)}</div>
    <div class="daily-budget-sub">par jour jusqu'à fin du mois</div>
  </div>
  
  <div class="card" style="text-align:center;padding:20px">
    <div class="card-label" style="margin-bottom:8px">SOLDE MENSUEL</div>
    <div class="big-number ${balance>=0?'positive':'negative'}" style="font-size:36px">${fmt(balance)}</div>
    <div class="badge ${balance>=0?'badge-green':'badge-red'}" style="margin-top:12px;display:inline-flex">
      ${balance>=0?'✅ Objectif tenu':'🚨 Dépassement'}
    </div>
  </div>`;
  
  return html;
}

function renderForecast(){
  const avg=getAvgByCat();
  const nextMonth=Math.max(...gM())+1;
  const monthName=MN[nextMonth]||'Mois '+nextMonth;
  
  if(!S.forecast.adjusted||Object.keys(S.forecast.adjusted).length===0){
    // Initialise avec les charges récurrentes + moyennes variables
    const recurring=getRecurringCharges();
    S.forecast={month:nextMonth,salary:S.sal,adjusted:{...avg,...recurring},editing:null,tempValue:null};
  }
  
  const f=S.forecast;
  const taxAmount=f.salary*(S.tax/100);
  const saveAmount=S.sMode==='monthly'?S.sGoal:S.sGoal/12;
  const available=f.salary-taxAmount-saveAmount;
  const projected=Object.values(f.adjusted).reduce((a,b)=>a+b,0);
  const remaining=available-projected;
  const usedPct=Math.min(100,(projected/available)*100);
  const dailyBudget=remaining/30;

    html+=`<div class="coach-tip warning">
      <div class="coach-tip-header">⚠️ Budget serré</div>
      <div class="coach-tip-text">Il ne te reste que <strong>${fmt(dailyBudget)}/jour</strong>. Évite les imprévus.</div>

    <div class="progress-container" style="margin:0">
      <div class="progress-header">
        <span>Utilisation budget</span>

      </div>
      <div class="progress-bar">
        <div class="progress-fill ${usedPct>90?'danger':usedPct>75?'warning':''}" style="width:${usedPct}%"></div>
      </div>
      <div class="stat-grid" style="margin-top:16px;margin-bottom:0">
        <div class="stat-item"><span class="stat-value">${fmt(available)}</span><span class="stat-label">Disponible</span></div>
        <div class="stat-item"><span class="stat-value negative">${fmt(projected)}</span><span class="stat-label">Prévu</span></div>
        <div class="stat-item"><span class="stat-value ${remaining>=0?'positive':'negative'}">${fmt(remaining)}</span><span class="stat-label">Reste</span></div>
      </div>

  <div class="section-title">Gérer les charges</div>`;
  
  // Affiche les charges récurrentes en premier
  const recurringCats=Object.keys(getRecurringCharges());
  const otherCats=Object.keys(f.adjusted).filter(c=>!recurringCats.includes(c));
  
  [...recurringCats,...otherCats].forEach(cat=>{
    const currentVal=f.adjusted[cat]||0;
    const isRecurring=recurringCats.includes(cat);

  if(months.length===0)return{};
  const totals={};
  months.forEach(m=>{
    const monthData=allTx().filter(x=>x.month===m&&x.amount<0);
    const cats={};
    monthData.forEach(x=>{cats[x.categoryParent]=(cats[x.categoryParent]||0)+abs(x.amount)});
    Object.entries(cats).forEach(([cat,amt])=>{
      if(!totals[cat])totals[cat]=[];
      totals[cat].push(amt);
    });
  });
  const avg={};
  Object.entries(totals).forEach(([cat,vals])=>{
    avg[cat]=vals.reduce((a,b)=>a+b,0)/vals.length;
  });
  return avg;
}

function renderSearch(){
  let html=`<input type="text" class="search-box" placeholder="Rechercher une dépense..." value="${S.searchQuery}" oninput="S.searchQuery=this.value;render()">`;
  
  if(!S.viewingCat){
    // Vue grille des catégories avec stats
    html+=`<div class="section-title">Clique pour voir l'historique</div><div class="cat-grid">`;
    const cats=Object.keys(CC);
    cats.forEach(cat=>{
      const stats=getStatsByCat(cat);
      if(stats.count>0){
        html+=`<button class="cat-btn ${S.searchCat===cat?'active':''}" onclick="S.viewingCat='${cat}';render()">
          <span class="emoji">${ICONS[cat]||'📦'}</span>
          <span>${cat}</span>
          <span class="amount">${fmt(stats.avg)}/mois</span>
        </button>`;
      }
    });
    html+=`</div>`;
    
    // Résultats de recherche texte
    if(S.searchQuery){
      const results=allTx().filter(x=>x.label.toLowerCase().includes(S.searchQuery.toLowerCase())||x.categoryParent.toLowerCase().includes(S.searchQuery.toLowerCase())).sort((a,b)=>b.date.localeCompare(a.date));
      html+=`<div class="section-title">${results.length} résultat(s)</div><div class="tx-list">`;
      results.slice(0,20).forEach(x=>{
        html+=`<div class="tx-item">
          <div class="tx-date">${x.date.slice(5)}</div>
          <div class="tx-info">
            <span class="tx-label">${x.label}</span>
            <span class="tx-cat">${ICONS[x.categoryParent]||''} ${x.categoryParent}</span>
          </div>
          <div class="tx-amount ${x.amount<0?'negative':'positive'}">${x.amount>0?'+':''}${fmt(abs(x.amount))}</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }else{
    // Vue détail d'une catégorie
    const stats=getStatsByCat(S.viewingCat);
    const history=allTx().filter(x=>x.categoryParent===S.viewingCat).sort((a,b)=>b.date.localeCompare(a.date));
    
    html+=`<button class="btn btn-small btn-secondary" onclick="S.viewingCat=null;render()" style="margin-bottom:16px">← Retour aux catégories</button>
    
    <div class="history-stat-card">
      <div class="history-stat-header">
        <span class="history-stat-title">${ICONS[S.viewingCat]||''} ${S.viewingCat}</span>
        <span class="history-stat-value">${fmt(stats.avg)}</span>
      </div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:12px">En moyenne par mois</div>
      <div class="stat-grid" style="margin:0">
        <div class="stat-item"><span class="stat-value">${fmt(stats.total)}</span><span class="stat-label">Total</span></div>
        <div class="stat-item"><span class="stat-value">${stats.count}</span><span class="stat-label">Opérations</span></div>
        <div class="stat-item"><span class="stat-value">${fmt(stats.max)}</span><span class="stat-label">Max</span></div>
      </div>
    </div>
    
    <div class="section-title">Historique détaillé</div>
    <div class="history-list">`;
    
    history.forEach(x=>{
      html+=`<div class="history-item">
        <div>
          <div style="font-weight:600;font-size:14px">${x.label}</div>
          <div class="history-item-date">${x.date}</div>
        </div>
        <div class="history-item-amount ${x.amount<0?'negative':'positive'}">${x.amount>0?'+':''}${fmt(abs(x.amount))}</div>
      </div>`;
    });
    
    html+=`</div>`;
  }
  
  return html;
}

function renderAdd(){
  const isInstallment=S.addType==='fractionne';
  
  let html=`<div class="type-selector">
    <div class="type-option ${!S.addType||S.addType==='normal'?'active':''}" onclick="S.addType='normal';render()">
      <span class="icon">🛒</span>
      <span class="label">Normal</span>
    </div>
    <div class="type-option ${S.addType==='mensuel'?'active':''}" onclick="S.addType='mensuel';render()">
      <span class="icon">📅</span>
      <span class="label">Mensuel</span>
    </div>
    <div class="type-option ${S.addType==='fractionne'?'active':''}" onclick="S.addType='fractionne';render()">
      <span class="icon">💳</span>
      <span class="label">Fractionné</span>
    </div>
  </div>`;
  
  html+=`<div class="card" style="margin-bottom:16px;border-left:4px solid var(--red)">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--red)">
      ${isInstallment?'💳 Paiement en plusieurs fois':'➖ Nouvelle dépense'}
      ${S.addType==='mensuel'?'<span style="font-size:12px;font-weight:400;color:var(--text2);display:block;margin-top:4px">Abonnement ou charge mensuelle</span>':''}
    </div>
    
    <div class="form-group">
      <label>Libellé</label>
      <input type="text" id="expLabel" placeholder="${isInstallment?'Ex: Achat électroménager':'Ex: Courses Lidl'}" style="font-size:16px">
    </div>
    
    <div class="form-row">
      <div class="form-group">
        <label>${isInstallment?'Total à payer':'Montant'} (€)</label>
        <input type="number" id="expAmt" placeholder="${isInstallment?'Total':'25.00'}" step="0.01" style="font-size:18px;font-weight:700">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="expDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>`;
    
  if(isInstallment){
    html+=`<div class="form-group">
      <label>Nombre de mensualités</label>
      <input type="number" id="expMonths" placeholder="3" value="3" min="2" max="24" style="font-size:16px">
      <div style="font-size:12px;color:var(--text2);margin-top:6px">Le montant sera divisé automatiquement</div>
    </div>`;
  }
    
  html+=`<div class="form-group">
      <label>Catégorie</label>
      <select id="expCat" style="font-size:16px">
        ${Object.keys(CC).map(c=>`<option value="${c}">${c}</option>`).join('')}
      </select>
    </div>
    
    <button class="btn btn-danger" onclick="addExpense()">
      ${isInstallment?'💳 Ajouter le paiement fractionné':'➖ Ajouter la dépense'}
    </button>
  </div>
  
  <div class="card" style="border-left:4px solid var(--green)">
    <div style="font-size:16px;font-weight:700;margin-bottom:16px;color:var(--green)">➕ Revenu exceptionnel</div>
    <div class="form-group">
      <label>Source</label>
      <input type="text" id="incLabel" placeholder="Ex: Prime, Remboursement..." style="font-size:16px">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Montant (€)</label>
        <input type="number" id="incAmt" placeholder="500.00" step="0.01" style="font-size:18px;font-weight:700;color:var(--green)">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="incDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
    </div>
    <button class="btn btn-success" onclick="addIncome()">Ajouter le revenu</button>
  </div>`;
  
  return html;
}

function renderCatDetail(){
  // Redirige vers search avec la catégorie sélectionnée
  return renderSearch();
}

function startEdit(cat,current){
  S.forecast.editing=cat;
  S.forecast.tempValue=current;
  render();
  setTimeout(()=>{
    const inp=document.querySelector('.forecast-input');
    if(inp){inp.focus();inp.select();}
  },50);
}

function confirmEdit(cat,value){
  S.forecast.adjusted[cat]=parseFloat(value)||0;
  S.forecast.editing=null;
  S.forecast.tempValue=null;
  render();
  toast('✅','Montant mis à jour');
}

function cancelEdit(){
  S.forecast.editing=null;
  S.forecast.tempValue=null;
  render();
}

function updateForecastCat(cat,value){
  S.forecast.adjusted[cat]=parseFloat(value);
  render();
}

function resetForecast(){
  const avg=getAvgByCat();
  const recurring=getRecurringCharges();
  S.forecast.adjusted={...avg,...recurring};
  render();
  toast('🔄','Prévision réinitialisée');
}

function addExpense(){
  const l=document.getElementById('expLabel').value.trim();
  let a=parseFloat(document.getElementById('expAmt').value);
  const d=document.getElementById('expDate').value;
  const c=document.getElementById('expCat').value;
  const t=S.addType||'normal';
  
  if(!l||!a){toast('⚠️','Remplis tous les champs');return}
  
  if(t==='fractionne'){
    const months=parseInt(document.getElementById('expMonths').value)||3;
    const monthlyAmt=a/months;
    // Ajoute la première mensualité maintenant
    S.manual.push({date:d,label:l+' (1/'+months+')',categoryParent:c,amount:-monthlyAmt,month:+d.split('-')[1],type:t,months:months,total:a});
    toast('✅',`Paiement échelonné sur ${months} mois créé`);
  }else if(t==='mensuel'){
    S.manual.push({date:d,label:l,categoryParent:c,amount:-a,month:+d.split('-')[1],type:t});
    toast('✅','Charge mensuelle ajoutée');
  }else{
    S.manual.push({date:d,label:l,categoryParent:c,amount:-abs(a),month:+d.split('-')[1],type:'normal'});
    toast('✅','Dépense ajoutée');
  }
  
  save();
  S.tab='dashboard';
  S.addType=null;
  render();
}

function addIncome(){
  const l=document.getElementById('incLabel').value.trim();
  const a=parseFloat(document.getElementById('incAmt').value);
  const d=document.getElementById('incDate').value;
  if(!l||!a){toast('⚠️','Remplis tous les champs');return}
  S.manual.push({date:d,label:l,categoryParent:'Revenu',amount:abs(a),month:+d.split('-')[1],type:'normal'});
  save();
  toast('✅','Revenu ajouté');
  S.tab='dashboard';
  render();
}

load();
render();
</script>
