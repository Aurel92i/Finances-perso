<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finances Pro - Prévision Mensuelle</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;
  --surface:rgba(20,20,30,0.6);
  --surface-solid:#12121a;
  --surface-hover:rgba(30,30,45,0.8);
  --border:rgba(255,255,255,0.08);
  --border-strong:rgba(255,255,255,0.15);
  --text:#f0f0f5;
  --text-secondary:#8888a0;
  --accent:#6c5ce7;
  --accent-light:#a29bfe;
  --accent-glow:rgba(108,92,231,0.4);
  --success:#00cec9;
  --success-bg:rgba(0,206,201,0.15);
  --danger:#ff6b6b;
  --danger-bg:rgba(255,107,107,0.15);
  --warning:#fdcb6e;
  --warning-bg:rgba(253,203,110,0.15);
  --info:#74b9ff;
  --glass:blur(20px) saturate(180%);
  --radius:16px;
  --radius-sm:10px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --shadow-glow:0 0 40px var(--accent-glow);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
  overflow-x:hidden;
  background-image:
    radial-gradient(circle at 20% 50%,rgba(108,92,231,0.15) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(0,206,201,0.1) 0%,transparent 40%);
}

.app{
  max-width:900px;
  margin:0 auto;
  padding:20px;
  padding-bottom:120px;
}

/* Header Premium */
.header{
  margin-bottom:24px;
  position:relative;
}

.header-glow{
  position:absolute;
  top:-50px;
  left:-50px;
  width:200px;
  height:200px;
  background:var(--accent);
  filter:blur(80px);
  opacity:0.3;
  pointer-events:none;
  animation:pulse 4s ease-in-out infinite;
}

@keyframes pulse{
  0%,100%{opacity:0.3;transform:scale(1);}
  50%{opacity:0.5;transform:scale(1.1);}
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
  position:relative;
  z-index:1;
}

.header h1{
  font-size:28px;
  font-weight:700;
  background:linear-gradient(135deg,var(--text) 0%,var(--accent-light) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  letter-spacing:-0.5px;
}

.header-stats{
  display:flex;
  gap:12px;
  font-size:12px;
  color:var(--text-secondary);
  font-family:'JetBrains Mono',monospace;
}

.badge{
  background:var(--surface);
  border:1px solid var(--border);
  padding:6px 12px;
  border-radius:20px;
  font-size:11px;
  font-weight:600;
  color:var(--text-secondary);
  backdrop-filter:var(--glass);
}

.badge-success{background:var(--success-bg);color:var(--success);border-color:var(--success);}
.badge-danger{background:var(--danger-bg);color:var(--danger);border-color:var(--danger);}
.badge-warning{background:var(--warning-bg);color:var(--warning);border-color:var(--warning);}

/* Navigation */
.nav{
  display:flex;
  gap:8px;
  margin-bottom:24px;
  padding:4px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:var(--glass);
  position:sticky;
  top:20px;
  z-index:100;
  box-shadow:var(--shadow);
}

.nav-btn{
  flex:1;
  padding:12px 8px;
  border:none;
  background:transparent;
  color:var(--text-secondary);
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  border-radius:var(--radius-sm);
  transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
  position:relative;
  overflow:hidden;
}

.nav-btn::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  opacity:0;
  transition:opacity 0.3s;
  border-radius:var(--radius-sm);
}

.nav-btn span{
  position:relative;
  z-index:1;
}

.nav-btn.active{
  color:#fff;
  box-shadow:0 4px 12px rgba(108,92,231,0.3);
}

.nav-btn.active::before{
  opacity:1;
}

.nav-btn:not(.active):hover{
  background:var(--surface-hover);
  color:var(--text);
  transform:translateY(-1px);
}

/* Cards */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
  backdrop-filter:var(--glass);
  box-shadow:var(--shadow);
  transition:transform 0.2s,box-shadow 0.2s;
}

.card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow),0 0 0 1px var(--border-strong);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.card-title{
  font-size:14px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
}

.card-value{
  font-family:'JetBrains Mono',monospace;
  font-size:32px;
  font-weight:700;
  color:var(--text);
  margin-top:4px;
}

.card-value.small{font-size:24px;}
.card-value.large{font-size:42px;}

/* Grid Systems */
.grid-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

.grid-3{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}

@media(max-width:600px){
  .grid-2{grid-template-columns:1fr;}
  .grid-3{grid-template-columns:repeat(2,1fr);}
}

/* Month Selector */
.month-scroll{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:4px 0;
  margin-bottom:20px;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  mask-image:linear-gradient(to right,transparent,black 20px,black calc(100% - 20px),transparent);
}

.month-scroll::-webkit-scrollbar{display:none;}

.month-chip{
  padding:10px 20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text-secondary);
  border-radius:24px;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  white-space:nowrap;
  transition:all 0.3s;
  backdrop-filter:var(--glass);
  position:relative;
  overflow:hidden;
}

.month-chip::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  opacity:0;
  transition:opacity 0.3s;
  z-index:-1;
}

.month-chip.active{
  color:#fff;
  border-color:transparent;
  box-shadow:0 4px 16px var(--accent-glow);
}

.month-chip.active::after{
  opacity:1;
}

.month-chip:hover:not(.active){
  border-color:var(--accent-light);
  color:var(--text);
  transform:translateY(-1px);
}

/* Progress Bars */
.progress-container{
  margin:16px 0;
}

.progress-header{
  display:flex;
  justify-content:space-between;
  font-size:12px;
  color:var(--text-secondary);
  margin-bottom:8px;
  font-weight:600;
}

.progress-bar{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:4px;
  overflow:hidden;
  position:relative;
}

.progress-fill{
  height:100%;
  border-radius:4px;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  position:relative;
  overflow:hidden;
}

.progress-fill::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);
  animation:shimmer 2s infinite;
}

@keyframes shimmer{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

.progress-fill.success{background:var(--success);}
.progress-fill.warning{background:var(--warning);}
.progress-fill.danger{background:var(--danger);}
.progress-fill.accent{background:linear-gradient(90deg,var(--accent),var(--accent-light));}

/* Forecast Specific Styles */
.forecast-hero{
  background:linear-gradient(135deg,var(--accent) 0%,#5b4cdb 100%);
  color:#fff;
  border:none;
  position:relative;
  overflow:hidden;
}

.forecast-hero::before{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle,rgba(255,255,255,0.1) 1px,transparent 1px);
  background-size:20px 20px;
  opacity:0.3;
  animation:moveGrid 20s linear infinite;
}

@keyframes moveGrid{
  0%{transform:translate(0,0);}
  100%{transform:translate(20px,20px);}
}

.forecast-hero .card-title{
  color:rgba(255,255,255,0.8);
}

.forecast-hero .card-value{
  color:#fff;
  text-shadow:0 2px 4px rgba(0,0,0,0.2);
}

.forecast-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:16px;
  margin-top:20px;
}

.category-card{
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  padding:16px;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
}

.category-card::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
  background:var(--cat-color,var(--accent));
  opacity:0;
  transition:opacity 0.3s;
}

.category-card:hover{
  transform:translateX(4px);
  border-color:var(--cat-color,var(--accent));
}

.category-card:hover::before{
  opacity:1;
}

.category-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.category-name{
  font-size:14px;
  font-weight:600;
  display:flex;
  align-items:center;
  gap:8px;
}

.category-icon{
  width:32px;
  height:32px;
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  background:var(--cat-color,var(--accent));
  opacity:0.2;
  color:var(--cat-color,var(--accent));
}

.category-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  font-weight:700;
}

.category-slider{
  -webkit-appearance:none;
  width:100%;
  height:6px;
  border-radius:3px;
  background:rgba(255,255,255,0.1);
  outline:none;
  margin:12px 0;
  cursor:pointer;
}

.category-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  appearance:none;
  width:18px;
  height:18px;
  border-radius:50%;
  background:#fff;
  border:3px solid var(--cat-color,var(--accent));
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
  transition:transform 0.2s;
}

.category-slider::-webkit-slider-thumb:hover{
  transform:scale(1.2);
}

.category-stats{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--text-secondary);
}

/* Alerts */
.alert{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:16px;
  border-radius:var(--radius-sm);
  margin-bottom:16px;
  border:1px solid transparent;
  animation:slideIn 0.4s ease;
}

@keyframes slideIn{
  from{
    opacity:0;
    transform:translateY(-10px);
  }
}

.alert-success{
  background:var(--success-bg);
  border-color:var(--success);
  color:var(--success);
}

.alert-danger{
  background:var(--danger-bg);
  border-color:var(--danger);
  color:var(--danger);
}

.alert-warning{
  background:var(--warning-bg);
  border-color:var(--warning);
  color:var(--warning);
}

.alert-icon{
  font-size:20px;
  flex-shrink:0;
}

.alert-content{
  flex:1;
}

.alert-title{
  font-weight:700;
  margin-bottom:4px;
  font-size:14px;
}

.alert-text{
  font-size:13px;
  opacity:0.9;
  line-height:1.4;
}

/* Scenario Cards */
.scenario-card{
  position:relative;
  padding:20px;
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
  background:var(--surface-solid);
  overflow:hidden;
  cursor:pointer;
  transition:all 0.3s;
}

.scenario-card:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
}

.scenario-card.optimist{
  border-color:var(--success);
  background:linear-gradient(135deg,var(--success-bg),transparent);
}

.scenario-card.pessimist{
  border-color:var(--danger);
  background:linear-gradient(135deg,var(--danger-bg),transparent);
}

.scenario-card.realistic{
  border-color:var(--accent);
  background:linear-gradient(135deg,rgba(108,92,231,0.1),transparent);
}

.scenario-label{
  font-size:12px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:1px;
  margin-bottom:8px;
  opacity:0.8;
}

.scenario-value{
  font-family:'JetBrains Mono',monospace;
  font-size:28px;
  font-weight:700;
  margin-bottom:4px;
}

.scenario-desc{
  font-size:12px;
  color:var(--text-secondary);
}

/* Toggle */
.toggle-group{
  display:flex;
  background:rgba(255,255,255,0.05);
  border-radius:var(--radius-sm);
  padding:4px;
  border:1px solid var(--border);
}

.toggle-btn{
  flex:1;
  padding:10px;
  border:none;
  background:transparent;
  color:var(--text-secondary);
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  border-radius:8px;
  transition:all 0.3s;
}

.toggle-btn.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 2px 8px rgba(108,92,231,0.3);
}

/* Inputs */
input,select{
  width:100%;
  padding:14px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  color:var(--text);
  font-family:inherit;
  font-size:15px;
  transition:all 0.3s;
  outline:none;
}

input:focus,select:focus{
  border-color:var(--accent);
  background:rgba(108,92,231,0.05);
  box-shadow:0 0 0 3px rgba(108,92,231,0.1);
}

label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--text-secondary);
  margin-bottom:6px;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

.form-group{
  margin-bottom:16px;
}

/* Buttons */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:var(--radius-sm);
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  position:relative;
  overflow:hidden;
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:#fff;
  box-shadow:0 4px 16px var(--accent-glow);
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px var(--accent-glow);
}

.btn-primary:active{
  transform:translateY(0);
}

.btn-secondary{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
}

.btn-secondary:hover{
  background:var(--surface-hover);
  border-color:var(--border-strong);
}

/* Lists */
.tx-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.tx-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  transition:all 0.2s;
  cursor:pointer;
}

.tx-item:hover{
  background:var(--surface-hover);
  transform:translateX(4px);
  border-color:var(--border-strong);
}

.tx-icon{
  width:40px;
  height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:var(--cat-color,rgba(255,255,255,0.1));
  color:var(--text);
  flex-shrink:0;
}

.tx-content{
  flex:1;
  min-width:0;
}

.tx-label{
  font-weight:600;
  font-size:14px;
  margin-bottom:2px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.tx-meta{
  font-size:12px;
  color:var(--text-secondary);
  display:flex;
  gap:8px;
  align-items:center;
}

.tx-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  font-weight:700;
  text-align:right;
}

.tx-amount.negative{color:var(--danger);}
.tx-amount.positive{color:var(--success);}

/* Animations */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

.animate-float{animation:float 3s ease-in-out infinite;}

.fade-in{
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* Toast */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  border:1px solid var(--border);
  padding:16px 24px;
  border-radius:var(--radius);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
  z-index:1000;
  opacity:0;
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  backdrop-filter:var(--glass);
  min-width:300px;
  justify-content:center;
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

/* Empty State */
.empty{
  text-align:center;
  padding:60px 20px;
  color:var(--text-secondary);
}

.empty-icon{
  font-size:48px;
  margin-bottom:16px;
  opacity:0.5;
}

/* Recurring Badge */
.recurring-badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  padding:3px 8px;
  border-radius:12px;
  background:var(--accent);
  color:#fff;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.5px;
}

/* Tooltip */
[data-tooltip]{
  position:relative;
}

[data-tooltip]::after{
  content:attr(data-tooltip);
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%) translateY(-8px);
  padding:8px 12px;
  background:#000;
  color:#fff;
  font-size:12px;
  border-radius:8px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:all 0.2s;
  z-index:10;
  border:1px solid var(--border);
}

[data-tooltip]:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(-4px);
}

.hidden{display:none !important;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-glow"></div>
    <div class="header-top">
      <h1>💰 Finance Pro</h1>
      <div class="header-stats">
        <span class="badge" id="op-count">0 opérations</span>
      </div>
    </div>
  </div>

  <div class="nav">
    <button class="nav-btn active" onclick="setTab('dashboard')"><span>📊 Vue d'ensemble</span></button>
    <button class="nav-btn" onclick="setTab('forecast')"><span>🔮 Prévision</span></button>
    <button class="nav-btn" onclick="setTab('transactions')"><span>📝 Transactions</span></button>
    <button class="nav-btn" onclick="setTab('add')"><span>➕ Ajouter</span></button>
  </div>

  <div id="content" class="fade-in"></div>
</div>

<div class="toast" id="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-msg">Message</span>
</div>

<script>
// Données initiales (Seed)
const SEED=[
  {"d":"2026-01-30","l":"KEOLIS RENNES","c":"Voyages & Transports","a":-1.7,"t":"normal"},
  {"d":"2026-01-30","l":"SnP*AAL","c":"Non catégorisé","a":-10,"t":"normal"},
  {"d":"2026-01-30","l":"HELLOASSO","c":"Cadeaux et solidarité","a":-5,"t":"normal"},

// Helpers
function getAllTx(){
  const seedTx=SEED.map(t=>({
    ...t,
    month:parseInt(t.d.split('-')[1]),
    date:t.d,
    label:t.l,
    category:t.c,
    amount:t.a,
    type:t.t||'normal',
    months:t.months||1
  }));
  
  const manual=S.manualTx.map(t=>({
    ...t,
    month:parseInt(t.date.split('-')[1]),
    type:t.type||'normal',
    months:t.months||1
  }));
  
  return [...seedTx,...manual];
}

function getMonths(){
  const txs=getAllTx();
  const months=[...new Set(txs.map(t=>t.month))].sort((a,b)=>a-b);
  return months;
}

function getFilteredTx(){
  const all=getAllTx();
  if(S.currentMonth===0)return all;
  return all.filter(t=>t.month===S.currentMonth);
}

function getCategoryStats(){
  const months=getMonths();
  const stats={};
  
  // Initialiser toutes les catégories
  Object.keys(CC).forEach(cat=>{
    stats[cat]={
      total:0,
      months:{},
      count:0,
      fixed:false
    };
  });
  
  // Remplir avec les données
  getAllTx().forEach(tx=>{
    if(tx.amount>=0)return; // Ignorer revenus
    
    const cat=tx.category;
    const month=tx.month;
    const absAmount=Math.abs(tx.amount);
    
    if(!stats[cat]){
      stats[cat]={total:0,months:{},count:0,fixed:false};
    }
    
    // Gestion des paiements fractionnés
    if(tx.type==='fractionne'&&tx.months>1){
      const monthlyAmount=absAmount/tx.months;
      for(let i=0;i<tx.months;i++){
        const targetMonth=month+i;
        if(targetMonth<=12){
          stats[cat].months[targetMonth]=(stats[cat].months[targetMonth]||0)+monthlyAmount;
          stats[cat].total+=monthlyAmount;
        }
      }
    }else{
      stats[cat].months[month]=(stats[cat].months[month]||0)+absAmount;
      stats[cat].total+=absAmount;
    }
    
    stats[cat].count++;
    
    // Détection des charges fixes (type mensuel ou montant >50€ dans catégorie fixe)
    const fixedCategories=['Logement','Emprunts (hors immobilier)','Abonnements & téléphonie','Santé'];
    if(tx.type==='mensuel'||(absAmount>50&&fixedCategories.includes(cat))){
      stats[cat].fixed=true;
    }
  });
  
  // Calculer moyennes
  Object.keys(stats).forEach(cat=>{
    const monthCount=Object.keys(stats[cat].months).length||1;
    stats[cat].average=stats[cat].total/monthCount;
    stats[cat].lastMonth=stats[cat].months[S.currentMonth]||0;
  });
  
  return stats;
}

function formatMoney(n){
  return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n);
}

function formatDate(d){
  return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
}

  // Charges fixes (identifiées automatiquement)

    if(data.total===0)return;
    
    const adjusted=S.forecastAdjustments[cat]!==undefined?S.forecastAdjustments[cat]:data.average;

            <div>
              <div style="font-weight:600;">${cat}</div>
              <div style="font-size:11px;color:var(--text-secondary);">Moy: ${formatMoney(data.average)}</div>
            </div>
          </div>
          <div class="category-amount" style="color:${data.color};">${formatMoney(data.adjusted)}</div>
        </div>
        <input type="range" 
               class="category-slider" 
               min="${min}" 
               max="${max}" 
               step="5" 
               value="${data.adjusted}"
               oninput="adjustForecast('${cat}',this.value)"
               style="--cat-color:${data.color};">
        <div class="category-stats">
          <span>0€</span>
          <span>Max: ${formatMoney(max)}</span>
        </div>
      </div>
    `;
  });
  
  html+=`
      </div>
    </div>
    
    <div style="margin-top:24px;display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveForecast()" style="flex:1;">
        💾 Sauvegarder cette prévision
      </button>
      <button class="btn btn-secondary" onclick="resetForecast()" style="flex:1;">
        🔄 Réinitialiser
      </button>
    </div>
  `;
  
  return html;
}

function renderTransactions(){
  const txs=getFilteredTx().sort((a,b)=>new Date(b.date)-new Date(a.date));
  
  let html=`
    <div class="month-scroll" style="margin-bottom:16px;">
      <button class="month-chip ${S.currentMonth===0?'active':''}" onclick="setMonth(0)">Tout</button>
      ${getMonths().map(m=>`
        <button class="month-chip ${S.currentMonth===m?'active':''}" onclick="setMonth(${m})">${MN_SHORT[m]}</button>
      `).join('')}
    </div>
    
    <div class="tx-list">
  `;
  
  if(txs.length===0){
    html+=`
      <div class="empty">
        <div class="empty-icon">📭</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:8px;">Aucune transaction</div>
        <div style="font-size:14px;">Ajoute des opérations pour commencer</div>
      </div>
    `;
  }else{
    txs.forEach(tx=>{
      const isExp=tx.amount<0;
      const catColor=CC[tx.category]||'#636e72';
      html+=`
        <div class="tx-item">
          <div class="tx-icon" style="--cat-color:${catColor};background:${catColor}20;color:${catColor};">
            ${ICONS[tx.category]||'📦'}
          </div>
          <div class="tx-content">
            <div class="tx-label">${tx.label}</div>
            <div class="tx-meta">
              ${formatDate(tx.date)} • ${tx.category}
              ${tx.type==='mensuel'?'<span class="recurring-badge">Mensuel</span>':''}
              ${tx.type==='fractionne'?'<span class="recurring-badge" style="background:var(--warning);">Fractionné</span>':''}
            </div>
          </div>
          <div class="tx-amount ${isExp?'negative':'positive'}">
            ${isExp?'':'+'}${formatMoney(Math.abs(tx.amount))}
          </div>
        </div>
      `;
    });
  }
  
  if(S.manualTx.length>0){
    html+=`
      <div style="margin-top:24px;text-align:center;">
        <button class="btn btn-secondary" onclick="clearManual()" style="font-size:13px;padding:12px 24px;">
          🗑️ Effacer les ${S.manualTx.length} ajouts manuels
        </button>
      </div>
    `;
  }
  
  html+=`</div>`;
  return html;
}

function renderAdd(){
  return `
    <div class="card" style="border-left:4px solid var(--danger);">
      <div style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--danger);display:flex;align-items:center;gap:8px;">
        <span>➖</span> Nouvelle dépense
      </div>
      
      <div class="form-group">
        <label>Libellé</label>
        <input type="text" id="expLabel" placeholder="Ex: Courses hebdomadaires">
      </div>
      
      <div class="grid-2" style="gap:12px;">
        <div class="form-group">
          <label>Montant (€)</label>
          <input type="number" id="expAmount" placeholder="0.00" step="0.01">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="expDate" value="${new Date().toISOString().split('T')[0]}">
        </div>
      </div>
      
      <div class="form-group">
        <label>Catégorie</label>
        <select id="expCat">
          ${Object.keys(CC).map(c=>`<option value="${c}">${ICONS[c]} ${c}</option>`).join('')}
        </select>
      </div>
      
      <div class="form-group">
        <label>Type</label>
        <div class="toggle-group">
          <button class="toggle-btn active" onclick="setTxType('normal',this)" id="btn-normal">Ponctuel</button>
          <button class="toggle-btn" onclick="setTxType('mensuel',this)" id="btn-mensuel">Mensuel</button>
          <button class="toggle-btn" onclick="setTxType('fractionne',this)" id="btn-fractionne">Fractionné</button>
        </div>
      </div>
      
      <div id="fractionne-options" class="hidden" style="margin-top:12px;">
        <label>Nombre de mensualités</label>
        <input type="number" id="expMonths" value="3" min="2" max="12" style="margin-top:6px;">
      </div>
      
      <button class="btn btn-danger" onclick="addTransaction('expense')" style="margin-top:16px;">
        Ajouter la dépense
      </button>
    </div>
    
    <div class="card" style="border-left:4px solid var(--success);margin-top:16px;">
      <div style="font-size:18px;font-weight:700;margin-bottom:20px;color:var(--success);display:flex;align-items:center;gap:8px;">
        <span>➕</span> Revenu exceptionnel
      </div>
      
      <div class="form-group">
        <label>Libellé</label>
        <input type="text" id="incLabel" placeholder="Ex: Prime, Remboursement">
      </div>
      
      <div class="grid-2" style="gap:12px;">
        <div class="form-group">
          <label>Montant (€)</label>
          <input type="number" id="incAmount" placeholder="0.00" step="0.01" style="color:var(--success);">
        </div>
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="incDate" value="${new Date().toISOString().split('T')[0]}">
        </div>
      </div>
      
      <button class="btn btn-success" onclick="addTransaction('income')" style="margin-top:8px;">
        Ajouter le revenu
      </button>
    </div>
    
    <div class="card" style="margin-top:16px;background:rgba(255,255,255,0.03);">
      <div class="card-title" style="margin-bottom:16px;">⚙️ Paramètres globaux</div>
      
      <div class="form-group">
        <label>Salaire mensuel net</label>
        <input type="number" value="${S.salary}" onchange="S.salary=parseFloat(this.value);save();render();" style="font-family:'JetBrains Mono',monospace;font-size:18px;">
      </div>
      
      <div class="form-group">
        <label>Objectif d'épargne (${S.savingMode==='monthly'?'mensuel':'annuel'})</label>
        <div style="display:flex;gap:8px;">
          <input type="number" value="${S.savingGoal}" onchange="S.savingGoal=parseFloat(this.value);save();" style="flex:1;">
          <select onchange="S.savingMode=this.value;save();render();" style="width:auto;">
            <option value="monthly" ${S.savingMode==='monthly'?'selected':''}>/mois</option>
            <option value="yearly" ${S.savingMode==='yearly'?'selected':''}>/an</option>
          </select>
        </div>
      </div>
    </div>
  `;
}

let currentTxType='normal';

function setTxType(type,btn){
  currentTxType=type;
  document.querySelectorAll('.toggle-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  
  const fracDiv=document.getElementById('fractionne-options');
  if(type==='fractionne'){
    fracDiv.classList.remove('hidden');
  }else{
    fracDiv.classList.add('hidden');
  }
}

function addTransaction(type){
  if(type==='expense'){
    const label=document.getElementById('expLabel').value.trim();
    const amount=parseFloat(document.getElementById('expAmount').value);
    const date=document.getElementById('expDate').value;
    const cat=document.getElementById('expCat').value;
    const months=parseInt(document.getElementById('expMonths')?.value||1);
    
    if(!label||!amount){
      toast('⚠️','Remplis tous les champs');
      return;
    }
    
    S.manualTx.push({
      date:date,
      label:label,
      category:cat,
      amount:-Math.abs(amount),
      type:currentTxType,
      months:months
    });
    
    toast('✅','Dépense ajoutée');
  }else{
    const label=document.getElementById('incLabel').value.trim();
    const amount=parseFloat(document.getElementById('incAmount').value);
    const date=document.getElementById('incDate').value;
    
    if(!label||!amount){
      toast('⚠️','Remplis tous les champs');
      return;
    }
    
    S.manualTx.push({
      date:date,
      label:label,
      category:'Revenu',
      amount:Math.abs(amount),
      type:'normal'
    });
    
    toast('✅','Revenu ajouté');
  }
  
  save();
  setTab('dashboard');
}

function clearManual(){
  if(confirm('Effacer toutes les transactions manuelles ?')){
    S.manualTx=[];
    save();
    render();
    toast('🗑️','Transactions effacées');
  }
}

function applyScenario(factor){
  const stats=getCategoryStats();
  
  Object.entries(stats).forEach(([cat,data])=>{
    if(!data.fixed && data.total>0){
      S.forecastAdjustments[cat]=data.average*factor;
    }
  });
  
  save();
  render();
  toast('✅',`Scénario ${factor<1?'optimiste':'pessimiste'} appliqué`);
}

function saveForecast(){
  save();
  toast('✅','Prévision sauvegardée localement');
}

function resetForecast(){
  S.forecastAdjustments={};
  save();
  render();
  toast('🔄','Prévision réinitialisée');
}

// Init
load();
render();
</script>
</body>
</html>
