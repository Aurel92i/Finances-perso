<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Finances Pro - BoursoBank</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050508;
  --surface:rgba(20,20,30,0.8);
  --surface-solid:#12121a;
  --border:rgba(255,255,255,0.08);
  --text:#f0f0f5;
  --text-secondary:#8888a0;
  --accent:#6c5ce7;
  --accent-light:#a29bfe;
  --success:#00cec9;
  --success-bg:rgba(0,206,201,0.15);
  --danger:#ff6b6b;
  --danger-bg:rgba(255,107,107,0.15);
  --warning:#fdcb6e;
  --warning-bg:rgba(253,203,110,0.15);
  --radius:16px;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

body{
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.5;
  background-image:
    radial-gradient(circle at 20% 50%,rgba(108,92,231,0.15) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(0,206,201,0.1) 0%,transparent 40%);
}

.app{
  max-width:900px;
  margin:0 auto;
  padding:20px;
  padding-bottom:120px;
}

/* Header */
.header{
  margin-bottom:24px;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.header h1{
  font-size:26px;
  font-weight:700;
  background:linear-gradient(135deg,var(--text) 0%,var(--accent-light) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header-stats{
  font-size:12px;
  color:var(--text-secondary);
  font-family:'JetBrains Mono',monospace;
}

/* Navigation */
.nav{
  display:flex;
  gap:8px;
  margin-bottom:24px;
  padding:4px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  position:sticky;
  top:20px;
  z-index:100;
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}

.nav-btn{
  flex:1;
  padding:12px 8px;
  border:none;
  background:transparent;
  color:var(--text-secondary);
  font-family:inherit;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  border-radius:12px;
  transition:all 0.3s;
}

.nav-btn.active{
  background:var(--accent);
  color:#fff;
  box-shadow:0 4px 12px rgba(108,92,231,0.3);
}

/* Cards */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:20px;
  margin-bottom:16px;
  backdrop-filter:blur(20px);
  box-shadow:var(--shadow);
}

.card-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:16px;
}

.card-title{
  font-size:14px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:1px;
}

.card-value{
  font-family:'JetBrains Mono',monospace;
  font-size:32px;
  font-weight:700;
  color:var(--text);
}

.grid-2{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
}

@media(max-width:600px){
  .grid-2{grid-template-columns:1fr;}
}

/* Month Selector */
.month-scroll{
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding:4px 0;
  margin-bottom:20px;
  scrollbar-width:none;
  mask-image:linear-gradient(to right,transparent,black 20px,black calc(100% - 20px),transparent);
}

.month-scroll::-webkit-scrollbar{display:none;}

.month-chip{
  padding:10px 20px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text-secondary);
  border-radius:24px;
  cursor:pointer;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  white-space:nowrap;
  transition:all 0.3s;
  backdrop-filter:blur(10px);
}

.month-chip.active{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  box-shadow:0 4px 16px rgba(108,92,231,0.4);
}

/* Lists */
.tx-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.tx-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px;
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:12px;
  transition:all 0.2s;
  cursor:pointer;
}

.tx-item:hover{
  background:rgba(255,255,255,0.05);
  transform:translateX(4px);
}

.tx-icon{
  width:40px;
  height:40px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  background:var(--cat-color,rgba(255,255,255,0.1));
  color:var(--text);
  flex-shrink:0;
}

.tx-content{
  flex:1;
  min-width:0;
}

.tx-label{
  font-weight:600;
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:2px;
}

.tx-meta{
  font-size:12px;
  color:var(--text-secondary);
}

.tx-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:15px;
  font-weight:700;
  text-align:right;
  flex-shrink:0;
}

.negative{color:var(--danger);}
.positive{color:var(--success);}

/* Category Cards */
.cat-card{
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
  cursor:pointer;
  transition:all 0.3s;
  position:relative;
  overflow:hidden;
}

.cat-card::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
  background:var(--cat-color,var(--accent));
}

.cat-card:hover{
  transform:translateY(-2px);
  border-color:var(--cat-color,var(--accent));
}

.cat-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:8px;
}

.cat-name{
  font-weight:600;
  font-size:15px;
  display:flex;
  align-items:center;
  gap:8px;
}

.cat-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:18px;
  font-weight:700;
}

.cat-bar{
  height:6px;
  background:rgba(255,255,255,0.1);
  border-radius:3px;
  overflow:hidden;
  margin-top:8px;
}

.cat-fill{
  height:100%;
  background:var(--cat-color,var(--accent));
  border-radius:3px;
  transition:width 0.5s;
}

/* Forecast Specific */
.forecast-row{
  background:var(--surface-solid);
  border:1px solid var(--border);
  border-radius:12px;
  padding:16px;
  margin-bottom:10px;
}

.forecast-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

.forecast-cat{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:600;
}

.forecast-dot{
  width:12px;
  height:12px;
  border-radius:50%;
  background:var(--cat-color);
}

.forecast-amount-wrapper{
  display:flex;
  align-items:center;
  gap:8px;
}

.forecast-amount{
  font-family:'JetBrains Mono',monospace;
  font-size:20px;
  font-weight:700;
  padding:6px 12px;
  border-radius:8px;
  background:var(--surface);
  cursor:pointer;
  border:1px solid transparent;
  transition:all 0.2s;
  min-width:80px;
  text-align:right;
}

.forecast-amount:hover{
  border-color:var(--accent);
}

.forecast-amount.editing{
  background:var(--bg);
  border-color:var(--accent);
  cursor:text;
  outline:none;
}

.forecast-actions{
  display:flex;
  gap:6px;
}

.btn-icon{
  width:36px;
  height:36px;
  border-radius:8px;
  border:none;
  background:var(--surface);
  color:var(--text);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  transition:all 0.2s;
}

.btn-icon:hover{
  background:var(--accent);
  color:#fff;
}

.btn-icon.success{
  background:var(--success);
  color:#fff;
}

.btn-icon.danger{
  background:var(--danger-bg);
  color:var(--danger);
}

.forecast-slider{
  width:100%;
  height:6px;
  -webkit-appearance:none;
  background:var(--surface);
  border-radius:3px;
  outline:none;
  margin:12px 0;
}

.forecast-slider::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#fff;
  border:3px solid var(--cat-color,var(--accent));
  cursor:pointer;
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

.forecast-hint{
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--text-secondary);
}

/* Scenarios */
.scenario-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
  margin:16px 0;
}

.scenario-card{
  padding:16px;
  border-radius:12px;
  border:1px solid var(--border);
  text-align:center;
  cursor:pointer;
  transition:all 0.3s;
}

.scenario-card:hover{
  transform:translateY(-2px);
}

.scenario-card.optimist{
  background:var(--success-bg);
  border-color:var(--success);
}

.scenario-card.pessimist{
  background:var(--danger-bg);
  border-color:var(--danger);
}

.scenario-card.neutral{
  background:rgba(108,92,231,0.1);
  border-color:var(--accent);
}

.scenario-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  margin-bottom:8px;
  opacity:0.8;
}

.scenario-value{
  font-family:'JetBrains Mono',monospace;
  font-size:20px;
  font-weight:700;
}

/* Progress */
.progress-container{
  margin:16px 0;
}

.progress-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  color:var(--text-secondary);
}

.progress-bar{
  height:8px;
  background:rgba(255,255,255,0.05);
  border-radius:4px;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  border-radius:4px;
  transition:width 0.5s;
  background:linear-gradient(90deg,var(--accent),var(--accent-light));
}

.progress-fill.danger{background:var(--danger);}
.progress-fill.warning{background:var(--warning);}
.progress-fill.success{background:var(--success);}

/* Inputs */
input,select,textarea{
  width:100%;
  padding:14px 16px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  border-radius:12px;
  color:var(--text);
  font-family:inherit;
  font-size:15px;
  outline:none;
  transition:all 0.3s;
}

input:focus,select:focus,textarea:focus{
  border-color:var(--accent);
  background:rgba(108,92,231,0.05);
}

label{
  display:block;
  font-size:12px;
  font-weight:600;
  color:var(--text-secondary);
  margin-bottom:6px;
  text-transform:uppercase;
}

.form-group{
  margin-bottom:16px;
}

/* Buttons */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:12px;
  font-family:inherit;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:#fff;
  box-shadow:0 4px 16px rgba(108,92,231,0.3);
}

.btn-secondary{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
}

.btn-danger{
  background:var(--danger-bg);
  color:var(--danger);
  border:1px solid var(--danger);
}

/* Upload Zone */
.upload-zone{
  border:2px dashed var(--border);
  border-radius:var(--radius);
  padding:40px;
  text-align:center;
  cursor:pointer;
  transition:all 0.3s;
  margin-bottom:16px;
}

.upload-zone:hover{
  border-color:var(--accent);
  background:rgba(108,92,231,0.05);
}

.upload-zone.dragover{
  border-color:var(--accent);
  background:rgba(108,92,231,0.1);
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  backdrop-filter:blur(10px);
  z-index:1000;
  display:none;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.modal.active{
  display:flex;
}

.modal-content{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  width:100%;
  max-width:600px;
  max-height:90vh;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

.modal-header{
  padding:20px;
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-body{
  padding:20px;
  overflow-y:auto;
  flex:1;
}

.close-btn{
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  background:var(--surface-solid);
  color:var(--text);
  cursor:pointer;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* Alert */
.alert{
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  border:1px solid transparent;
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.alert-success{
  background:var(--success-bg);
  border-color:var(--success);
  color:var(--success);
}

.alert-danger{
  background:var(--danger-bg);
  border-color:var(--danger);
  color:var(--danger);
}

.alert-warning{
  background:var(--warning-bg);
  border-color:var(--warning);
  color:var(--warning);
}

/* Toast */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--surface);
  border:1px solid var(--border);
  padding:16px 24px;
  border-radius:12px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
  z-index:2000;
  opacity:0;
  transition:all 0.4s;
  backdrop-filter:blur(20px);
}

.toast.show{
  transform:translateX(-50%) translateY(0);
  opacity:1;
}

.hidden{display:none !important;}
</style>
</head>

// Parser CSV
function parseCSV(csvText) {
  const lines = csvText.trim().split('\n');
  const headers = lines[0].split(';');
  const result = [];
  
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(';');
    if (values.length < 6) continue;
    
    const amount = parseFloat(values[6].replace(',', '.'));
    const date = values[0];
    const month = parseInt(date.split('-')[1]);
    
    result.push({
      id: Date.now() + i,
      date: date,
      dateVal: values[1],
      label: values[2].replace(/^"|"$/g, '').trim(),
      category: values[3],
      categoryParent: values[4],
      amount: amount,
      month: month,
      year: parseInt(date.split('-')[0])
    });
  }
  return result;
}

// Initialisation
function init() {
  const saved = localStorage.getItem('financeProData');
  if (saved) {
    const parsed = JSON.parse(saved);
    state.transactions = parsed.transactions || [];
    state.salary = parsed.salary || 2300;
    state.forecastAdjustments = parsed.forecastAdjustments || {};
  } else {
    // Charger les données seed
    state.transactions = parseCSV(SEED_DATA);
  }
  
  render();
}

function save() {
  localStorage.setItem('financeProData', JSON.stringify({
    transactions: state.transactions,
    salary: state.salary,
    forecastAdjustments: state.forecastAdjustments
  }));
}

function getMonths() {
  const months = [...new Set(state.transactions.map(t => t.month))].sort((a, b) => a - b);
  return months;
}

function getTransactionsByMonth(month) {
  if (month === 0) return state.transactions;
  return state.transactions.filter(t => t.month === month);
}

function getCategoryStats(month = 0) {
  const txs = month === 0 ? state.transactions : state.transactions.filter(t => t.month === month);
  const stats = {};
  
  txs.forEach(tx => {
    if (tx.amount >= 0) return; // On ne compte que les dépenses
    const cat = tx.categoryParent;
    if (!stats[cat]) {
      stats[cat] = { total: 0, count: 0, transactions: [] };
    }
    stats[cat].total += Math.abs(tx.amount);
    stats[cat].count += 1;
    stats[cat].transactions.push(tx);
  });
  
  return stats;
}

function getAverageByCategory() {
  const months = getMonths();
  if (months.length === 0) return {};
  
  const totals = {};
  const counts = {};
  
  months.forEach(m => {
    const stats = getCategoryStats(m);
    Object.entries(stats).forEach(([cat, data]) => {
      if (!totals[cat]) { totals[cat] = 0; counts[cat] = 0; }
      totals[cat] += data.total;
      counts[cat] += 1;
    });
  });
  
  const avg = {};
  Object.keys(totals).forEach(cat => {
    avg[cat] = totals[cat] / months.length;
  });
  return avg;
}

function formatMoney(n) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(n);
}

function toast(icon, msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-icon').textContent = icon;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function setTab(tab) {
  state.tab = tab;
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(tab === 'dashboard' ? 'Vue' : 
                                                          tab === 'forecast' ? 'Prévoir' : 
                                                          tab === 'transactions' ? 'Opérations' : 
                                                          tab === 'import' ? 'Import' : '⚙️'));
  });
  render();
}

function setMonth(m) {
  state.currentMonth = m;
  render();
}

// Rendu des vues
function render() {
  const content = document.getElementById('content');
  const months = getMonths();
  const currentMonthName = MONTHS[state.currentMonth] || 'Tout';
  
  // Stats header
  document.getElementById('stats-bar').textContent = `${state.transactions.length} opérations · ${months.length} mois`;
  
  let html = '';
  
  if (state.tab === 'dashboard') {
    html = renderDashboard(months);
  } else if (state.tab === 'forecast') {
    html = renderForecast();
  } else if (state.tab === 'transactions') {
    html = renderTransactions(months);
  } else if (state.tab === 'import') {
    html = renderImport();
  } else if (state.tab === 'settings') {
    html = renderSettings();
  }
  
  content.innerHTML = html;
}

function renderDashboard(months) {
  const txs = getTransactionsByMonth(state.currentMonth);
  const expenses = txs.filter(t => t.amount < 0).reduce((s, t) => s + Math.abs(t.amount), 0);
  const incomes = txs.filter(t => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const balance = (state.currentMonth === 0 ? state.salary * months.length : state.salary) - expenses;
  
  const stats = getCategoryStats(state.currentMonth);
  const sortedCats = Object.entries(stats).sort((a, b) => b[1].total - a[1].total);
  
  let html = `
    <div class="month-scroll">
      <button class="month-chip ${state.currentMonth === 0 ? 'active' : ''}" onclick="setMonth(0)">Tout</button>
      ${months.map(m => `
        <button class="month-chip ${state.currentMonth === m ? 'active' : ''}" onclick="setMonth(${m})">${MONTHS[m]}</button>
      `).join('')}
    </div>
    
    <div class="grid-2">
      <div class="card">
        <div class="card-header">
          <span class="card-title">Dépenses</span>
          <span class="negative">📉</span>
        </div>
        <div class="card-value negative">${formatMoney(expenses)}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
          ${txs.filter(t => t.amount < 0).length} transactions
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <span class="card-title">Solde</span>
          <span class="${balance >= 0 ? 'positive' : 'negative'}">${balance >= 0 ? '📈' : '🚨'}</span>
        </div>
        <div class="card-value ${balance >= 0 ? 'positive' : 'negative'}">${formatMoney(balance)}</div>
        <div style="font-size:12px;color:var(--text-secondary);margin-top:4px;">
          après revenus estimés
        </div>
      </div>
    </div>
    
    <div style="margin-top:24px;">
      <div class="card-title" style="margin-bottom:16px;">Répartition ${state.currentMonth > 0 ? MONTHS[state.currentMonth] : 'globale'}</div>
  `;
  
  sortedCats.forEach(([cat, data]) => {
    const percent = (data.total / expenses * 100).toFixed(1);
    const color = COLORS[cat] || '#636e72';
    html += `
      <div class="cat-card" onclick="showCategoryDetail('${cat}')" style="--cat-color:${color}">
        <div class="cat-header">
          <div class="cat-name">
            <span style="font-size:20px;">${ICONS[cat] || '📦'}</span>
            <span>${cat}</span>
            <span style="font-size:12px;color:var(--text-secondary);">(${data.count})</span>
          </div>
          <div class="cat-amount" style="color:${color}">${formatMoney(data.total)}</div>
        </div>
        <div class="cat-bar">
          <div class="cat-fill" style="width:${percent}%;background:${color}"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text-secondary);">
          <span>${percent}% du total</span>
          <span>Cliquez pour voir le détail →</span>
        </div>
      </div>
    `;
  });
  
  html += `</div>`;
  return html;
}

  html += `
    </div>
    <div style="display:flex;gap:12px;margin-top:16px;">
      <button class="btn btn-secondary" onclick="resetForecast()" style="flex:1;">🔄 Réinitialiser</button>
      <button class="btn btn-primary" onclick="saveForecast()" style="flex:1;">💾 Sauvegarder</button>
    </div>
  `;
  
  return html;
}

function renderTransactions(months) {
  const txs = getTransactionsByMonth(state.currentMonth).sort((a, b) => new Date(b.date) - new Date(a.date));
  
  let html = `
    <div class="month-scroll" style="margin-bottom:16px;">
      <button class="month-chip ${state.currentMonth === 0 ? 'active' : ''}" onclick="setMonth(0)">Tout</button>
      ${months.map(m => `
        <button class="month-chip ${state.currentMonth === m ? 'active' : ''}" onclick="setMonth(${m})">${MONTHS[m]}</button>
      `).join('')}
    </div>
    
    <div class="tx-list">
  `;
  
  if (txs.length === 0) {
    html += `
      <div style="text-align:center;padding:40px;color:var(--text-secondary);">
        <div style="font-size:48px;margin-bottom:16px;">📭</div>
        <div>Aucune transaction</div>
      </div>
    `;
  } else {
    txs.forEach(tx => {
      const isExp = tx.amount < 0;
      const catColor = COLORS[tx.categoryParent] || '#636e72';
      html += `
        <div class="tx-item">
          <div class="tx-icon" style="--cat-color:${catColor};background:${catColor}20;color:${catColor};">
            ${ICONS[tx.categoryParent] || '📦'}
          </div>
          <div class="tx-content">
            <div class="tx-label">${tx.label}</div>
            <div class="tx-meta">${tx.date.slice(8,10)}/${tx.date.slice(5,7)} · ${tx.category}</div>
          </div>
          <div class="tx-amount ${isExp ? 'negative' : 'positive'}">
            ${isExp ? '' : '+'}${formatMoney(Math.abs(tx.amount))}
          </div>
        </div>
      `;
    });
  }
  
  html += `</div>`;
  return html;
}

function renderImport() {
  return `
    <div class="card">
      <div class="card-title" style="margin-bottom:16px;">📥 Import CSV BoursoBank</div>
      <p style="color:var(--text-secondary);margin-bottom:20px;font-size:14px;">
        Collez votre export CSV (format: dateOp;dateVal;label;category;categoryParent;...;amount) ou glissez-déposez le fichier.
      </p>
      
      <div class="upload-zone" onclick="document.getElementById('file-input').click()" 
           ondrop="handleDrop(event)" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)">
        <div style="font-size:48px;margin-bottom:16px;">📄</div>
        <div style="font-weight:600;margin-bottom:8px;">Cliquez ou déposez un fichier CSV</div>
        <div style="font-size:13px;color:var(--text-secondary);">Format supporté: export BoursoBank</div>
        <input type="file" id="file-input" style="display:none;" accept=".csv" onchange="handleFileSelect(event)">
      </div>
      
      <div class="form-group">
        <label>Ou collez le contenu CSV ici:</label>
        <textarea id="csv-paste" rows="10" placeholder="dateOp;dateVal;label;category;categoryParent;supplierFound;amount;..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="importFromText()">Importer le texte</button>
    </div>
    
    <div class="card" style="margin-top:16px;">
      <div class="card-title">⚠️ Gestion des données</div>
      <button class="btn btn-danger" onclick="clearAllData()" style="margin-top:12px;">
        🗑️ Effacer toutes les données et recharger l'exemple
      </button>
    </div>
  `;
}

function renderSettings() {
  return `
    <div class="card">
      <div class="card-title">⚙️ Paramètres</div>
      
      <div class="form-group" style="margin-top:16px;">
        <label>Revenu mensuel net estimé</label>
        <input type="number" value="${state.salary}" onchange="state.salary=parseFloat(this.value);save();render();" 
               style="font-family:JetBrains Mono;font-size:18px;">
      </div>
      
      <div class="alert alert-success">
        <div>✅ Données sauvegardées automatiquement dans le navigateur</div>
      </div>
    </div>
  `;
}

// Actions Prévision
function startEdit(cat) {
  state.editingForecast = cat;
  render();
  setTimeout(() => {
    const input = document.getElementById(`edit-${cat}`);
    if (input) { input.focus(); input.select(); }
  }, 50);
}

function confirmEdit(cat) {
  const input = document.getElementById(`edit-${cat}`);
  const val = parseFloat(input.value);
  if (!isNaN(val) && val >= 0) {
    state.forecastAdjustments[cat] = val;
    state.editingForecast = null;
    save();
    render();
    toast('✅', 'Montant mis à jour');
  }
}

function cancelEdit() {
  state.editingForecast = null;
  render();
}

function updateForecast(cat, value) {
  state.forecastAdjustments[cat] = parseFloat(value);
  render();
}

function applyScenario(factor) {
  const avg = getAverageByCategory();
  Object.keys(state.forecastAdjustments).forEach(cat => {
    if (!['Logement', 'Emprunts (hors immobilier)'].includes(cat)) {
      state.forecastAdjustments[cat] = (avg[cat] || 0) * factor;
    }
  });
  render();
  toast('✅', `Scénario ${factor < 1 ? 'optimiste' : factor > 1 ? 'pessimiste' : 'réaliste'} appliqué`);
}

function resetForecast() {
  state.forecastAdjustments = {...getAverageByCategory()};
  render();
  toast('🔄', 'Valeurs réinitialisées aux moyennes');
}

function saveForecast() {
  save();
  toast('💾', 'Prévision sauvegardée');
}

// Détail catégorie (Modal)
function showCategoryDetail(cat) {
  const modal = document.getElementById('cat-modal');
  const title = document.getElementById('modal-title');
  const body = document.getElementById('modal-body');
  
  title.textContent = `${ICONS[cat] || '📦'} ${cat}`;
  
  const txs = state.transactions
    .filter(t => t.categoryParent === cat && t.amount < 0)
    .sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const total = txs.reduce((s, t) => s + Math.abs(t.amount), 0);
  const byMonth = {};
  txs.forEach(t => {
    if (!byMonth[t.month]) byMonth[t.month] = 0;
    byMonth[t.month] += Math.abs(t.amount);
  });
  
  let html = `
    <div style="margin-bottom:20px;">
      <div style="font-size:32px;font-family:JetBrains Mono;font-weight:700;color:${COLORS[cat] || '#fff'};">
        ${formatMoney(total)}
      </div>
      <div style="color:var(--text-secondary);">${txs.length} transactions sur ${Object.keys(byMonth).length} mois</div>
    </div>
    
    <div style="margin-bottom:20px;">
      <div style="font-weight:600;margin-bottom:8px;">Répartition mensuelle:</div>
      ${Object.entries(byMonth).sort((a,b) => a[0]-b[0]).map(([m, amt]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);">
          <span>${MONTHS[m]}</span>
          <span style="font-family:JetBrains Mono;">${formatMoney(amt)}</span>
        </div>
      `).join('')}
    </div>
    
    <div style="max-height:400px;overflow-y:auto;">
      <div style="font-weight:600;margin-bottom:8px;">Dernières opérations:</div>
      ${txs.slice(0, 50).map(t => `
        <div style="display:flex;justify-content:space-between;padding:12px;background:var(--surface-solid);border-radius:8px;margin-bottom:8px;border:1px solid var(--border);">
          <div>
            <div style="font-weight:500;font-size:14px;">${t.label}</div>
            <div style="font-size:12px;color:var(--text-secondary);">${t.date} · ${t.category}</div>
          </div>
          <div style="font-family:JetBrains Mono;color:var(--danger);">
            ${formatMoney(Math.abs(t.amount))}
          </div>
        </div>
      `).join('')}
    </div>
  `;
  
  body.innerHTML = html;
  modal.classList.add('active');
}

function closeModal() {
  document.getElementById('cat-modal').classList.remove('active');
}

// Import CSV
function handleDragOver(e) {
  e.preventDefault();
  e.currentTarget.classList.add('dragover');
}

function handleDragLeave(e) {
  e.currentTarget.classList.remove('dragover');
}

function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('dragover');
  const files = e.dataTransfer.files;
  if (files.length > 0) processFile(files[0]);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const text = e.target.result;
    importCSV(text);
  };
  reader.readAsText(file);
}

function importFromText() {
  const text = document.getElementById('csv-paste').value;
  if (text.trim()) {
    importCSV(text);
  }
}

function importCSV(csvText) {
  try {
    const newTxs = parseCSV(csvText);
    if (newTxs.length === 0) {
      toast('⚠️', 'Aucune transaction trouvée dans le CSV');
      return;
    }
    
    // Fusionner avec existant (éviter doublons par ID implicite: date+label+amount)
    const existingKeys = new Set(state.transactions.map(t => `${t.date}-${t.label}-${t.amount}`));
    const uniqueNew = newTxs.filter(t => !existingKeys.has(`${t.date}-${t.label}-${t.amount}`));
    
    state.transactions = [...state.transactions, ...uniqueNew];
    save();
    render();
    toast('✅', `${uniqueNew.length} transactions importées (${newTxs.length - uniqueNew.length} doublons ignorés)`);
    setTab('transactions');
  } catch (err) {
    toast('❌', 'Erreur lors de l\'import: ' + err.message);
  }
}

function clearAllData() {
  if (confirm('Effacer toutes les données et recharger les 3 mois d\'exemple ?')) {
    localStorage.removeItem('financeProData');
    state.transactions = parseCSV(SEED_DATA);
    state.forecastAdjustments = {};
    save();
    render();
    toast('🗑️', 'Données réinitialisées');
  }
}

// Init
init();

// Fermer modal au clic extérieur
document.getElementById('cat-modal').addEventListener('click', (e) => {
  if (e.target.id === 'cat-modal') closeModal();
});
</script>
</body>
