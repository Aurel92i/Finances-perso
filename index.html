<html lang="fr">
<head>

<title>Finances Pro</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060b;--surface:rgba(16,16,28,0.85);--surface-solid:#0e0e1a;--surface-hover:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.07);--border-active:rgba(255,255,255,0.15);--text:#eeeef5;--text-secondary:#7a7a95;--text-muted:#55556a;--accent:#7c6cf0;--accent-light:#a89eff;--accent-glow:rgba(124,108,240,0.25);--success:#34d9b4;--success-bg:rgba(52,217,180,0.12);--danger:#f06c6c;--danger-bg:rgba(240,108,108,0.12);--warning:#f0c34e;--warning-bg:rgba(240,195,78,0.12);--radius:14px;--radius-sm:10px;--shadow:0 4px 24px rgba(0,0,0,0.35);--font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'JetBrains Mono',monospace}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;line-height:1.55;-webkit-font-smoothing:antialiased;background-image:radial-gradient(ellipse at 15% 15%,rgba(124,108,240,0.12) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(52,217,180,0.06) 0%,transparent 45%);background-attachment:fixed}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.app{max-width:880px;margin:0 auto;padding:24px 20px 140px}
.header{margin-bottom:20px}.header-top{display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:24px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 30%,var(--accent-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-stats{font-size:11px;color:var(--text-muted);font-family:var(--mono);letter-spacing:0.3px}
.nav{display:flex;gap:4px;margin-bottom:24px;padding:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);position:sticky;top:12px;z-index:100;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:var(--shadow)}
.nav-btn{flex:1;padding:11px 6px;border:none;background:transparent;color:var(--text-secondary);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;border-radius:var(--radius-sm);transition:all 0.25s cubic-bezier(0.4,0,0.2,1);white-space:nowrap}
.nav-btn:hover:not(.active){background:var(--surface-hover);color:var(--text)}.nav-btn.active{background:var(--accent);color:#fff;box-shadow:0 4px 16px var(--accent-glow)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--shadow)}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.card-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px}
.card-value{font-family:var(--mono);font-size:30px;font-weight:700;letter-spacing:-1px}
.card-sub{font-size:12px;color:var(--text-secondary);margin-top:4px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.app{padding:16px 14px 120px}}
.month-scroll{display:flex;gap:8px;overflow-x:auto;padding:2px 0;margin-bottom:20px;scrollbar-width:none;mask-image:linear-gradient(to right,transparent,black 12px,black calc(100% - 12px),transparent)}.month-scroll::-webkit-scrollbar{display:none}
.month-chip{padding:9px 20px;border:1px solid var(--border);background:var(--surface);color:var(--text-secondary);border-radius:24px;cursor:pointer;font-family:var(--font);font-size:13px;font-weight:600;white-space:nowrap;transition:all 0.25s;backdrop-filter:blur(10px)}
.month-chip:hover:not(.active){border-color:var(--border-active);color:var(--text)}
.month-chip.active{background:var(--accent);color:#fff;border-color:var(--accent);box-shadow:0 4px 16px var(--accent-glow)}
.cat-card{background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden}
.cat-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cat-color,var(--accent));transition:width 0.2s}
.cat-card:hover{transform:translateY(-1px);border-color:var(--cat-color,var(--accent));background:rgba(255,255,255,0.03)}.cat-card:hover::before{width:5px}.cat-card:active{transform:translateY(0)}
.cat-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cat-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.cat-count{font-size:11px;color:var(--text-muted);background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:6px;font-family:var(--mono)}
.cat-amount{font-family:var(--mono);font-size:17px;font-weight:700}
.cat-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:10px}
.cat-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
.cat-footer{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--text-muted)}
.cat-detail-arrow{opacity:0.5;transition:opacity 0.2s,transform 0.2s}.cat-card:hover .cat-detail-arrow{opacity:1;transform:translateX(2px)}
.tx-list{display:flex;flex-direction:column;gap:6px}
.tx-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius-sm);transition:all 0.15s;cursor:pointer}
.tx-item:hover{background:rgba(255,255,255,0.03);transform:translateX(3px)}
.tx-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tx-content{flex:1;min-width:0}.tx-label{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:1px}
.tx-meta{font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.tx-amount{font-family:var(--mono);font-size:14px;font-weight:700;text-align:right;flex-shrink:0}
.negative{color:var(--danger)}.positive{color:var(--success)}
.forecast-row{background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:10px;transition:border-color 0.2s}.forecast-row:hover{border-color:var(--border-active)}
.forecast-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.forecast-cat{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
.forecast-dot{width:10px;height:10px;border-radius:50%}
.forecast-amount-wrapper{display:flex;align-items:center;gap:6px}
.forecast-amount{font-family:var(--mono);font-size:17px;font-weight:700;padding:4px 10px;border-radius:7px;background:var(--surface);cursor:pointer;border:1px solid transparent;transition:all 0.2s;min-width:75px;text-align:right}
.forecast-amount:hover{border-color:var(--accent)}
.forecast-amount.editing{background:var(--bg);border-color:var(--accent);cursor:text;outline:none;color:var(--text);font-family:var(--mono);font-size:17px;font-weight:700}
.forecast-slider{width:100%;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.08);border-radius:2px;outline:none;margin:10px 0;cursor:pointer}
.forecast-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--cat-color,var(--accent));cursor:grab;box-shadow:0 2px 8px rgba(0,0,0,0.3)}
.forecast-slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:#fff;border:3px solid var(--cat-color,var(--accent));cursor:grab}
.forecast-hint{display:flex;justify-content:space-between;font-size:11px;color:var(--text-muted);font-family:var(--mono)}
.scenario-card{padding:16px;border-radius:var(--radius-sm);border:1px solid var(--border);text-align:center;cursor:pointer;transition:all 0.25s}
.scenario-card:hover{transform:translateY(-2px)}.scenario-card:active{transform:translateY(0)}
.scenario-card.optimist{background:var(--success-bg);border-color:rgba(52,217,180,0.3)}.scenario-card.pessimist{background:var(--danger-bg);border-color:rgba(240,108,108,0.3)}.scenario-card.neutral{background:rgba(124,108,240,0.08);border-color:rgba(124,108,240,0.3)}
.scenario-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.scenario-value{font-family:var(--mono);font-size:18px;font-weight:700}.scenario-sub{font-size:10px;color:var(--text-muted);margin-top:4px}
.progress-container{margin:16px 0}.progress-header{display:flex;justify-content:space-between;margin-bottom:8px;font-size:12px;color:var(--text-secondary)}
.progress-bar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s cubic-bezier(0.4,0,0.2,1)}
.progress-fill.danger{background:var(--danger)}.progress-fill.warning{background:var(--warning)}.progress-fill.success{background:linear-gradient(90deg,var(--success),#5eecd5)}
input,select,textarea{width:100%;padding:13px 16px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font);font-size:15px;outline:none;transition:all 0.2s}
input:focus,select:focus,textarea:focus{border-color:var(--accent);background:rgba(124,108,240,0.05);box-shadow:0 0 0 3px var(--accent-glow)}
input[type="number"]{font-family:var(--mono);font-weight:600}
label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.8px}
.form-group{margin-bottom:20px}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:12px;cursor:pointer;transition:all 0.2s;user-select:none}
.toggle-row:hover{border-color:var(--border-active)}.toggle-row.active{border-color:var(--accent);background:rgba(124,108,240,0.06)}
.toggle-label{font-size:14px;font-weight:600}.toggle-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.toggle-switch{width:44px;height:24px;border-radius:12px;background:rgba(255,255,255,0.1);position:relative;flex-shrink:0;transition:background 0.25s}
.toggle-switch::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform 0.25s cubic-bezier(0.4,0,0.2,1)}
.toggle-row.active .toggle-switch{background:var(--accent)}.toggle-row.active .toggle-switch::after{transform:translateX(20px)}
.btn{width:100%;padding:14px;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px}.btn:active{transform:scale(0.98)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:#fff;box-shadow:0 4px 16px var(--accent-glow)}.btn-primary:hover{box-shadow:0 6px 24px rgba(124,108,240,0.4)}
.btn-secondary{background:var(--surface);border:1px solid var(--border);color:var(--text)}.btn-secondary:hover{border-color:var(--border-active)}
.btn-danger{background:var(--danger-bg);color:var(--danger);border:1px solid rgba(240,108,108,0.3)}.btn-danger:hover{border-color:var(--danger)}
.btn-icon{width:34px;height:34px;border-radius:8px;border:none;background:var(--surface);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all 0.2s;flex-shrink:0}
.btn-icon:hover{background:var(--accent);color:#fff}.btn-icon.confirm-btn{background:var(--success);color:#fff}.btn-icon.cancel-btn{background:var(--danger-bg);color:var(--danger)}
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:40px 20px;text-align:center;cursor:pointer;transition:all 0.3s;margin-bottom:16px}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(124,108,240,0.04)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s}
.modal-overlay.active{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-content{background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:560px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1)}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.modal-header h3{font-size:16px;font-weight:700}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.close-btn{width:30px;height:30px;border-radius:50%;border:none;background:rgba(255,255,255,0.06);color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.15s}.close-btn:hover{background:var(--danger-bg);color:var(--danger)}
.alert{padding:14px 16px;border-radius:var(--radius-sm);margin-bottom:14px;border:1px solid transparent;display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}
.alert-success{background:var(--success-bg);border-color:rgba(52,217,180,0.25);color:var(--success)}
.alert-info{background:rgba(124,108,240,0.08);border-color:rgba(124,108,240,0.25);color:var(--accent-light)}
.alert-warning{background:var(--warning-bg);border-color:rgba(240,195,78,0.25);color:var(--warning)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface-solid);border:1px solid var(--border);padding:14px 24px;border-radius:var(--radius-sm);box-shadow:0 12px 40px rgba(0,0,0,0.5);display:flex;align-items:center;gap:10px;font-size:13px;font-weight:600;z-index:2000;opacity:0;transition:all 0.35s cubic-bezier(0.4,0,0.2,1);pointer-events:none}.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.section-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:14px;margin-top:28px;display:flex;align-items:center;gap:8px}.section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.deduction-card{background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;transition:all 0.2s}.deduction-card.enabled{border-color:var(--accent);background:rgba(124,108,240,0.04)}
.deduction-inline{display:flex;align-items:center;gap:12px}.deduction-inline input[type="number"]{max-width:140px;text-align:right}.deduction-inline .unit{font-size:14px;font-weight:600;color:var(--text-secondary);flex-shrink:0}
/* Category select dropdown in transactions */
.cat-select-btn{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:600;background:rgba(255,255,255,0.06);border:1px solid transparent;color:var(--accent-light);cursor:pointer;transition:all 0.15s;font-family:var(--font)}
.cat-select-btn:hover{border-color:var(--accent);background:rgba(124,108,240,0.1)}
/* Override rules list */
.rule-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:13px}
.rule-item .rule-supplier{font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rule-item .rule-arrow{color:var(--text-muted);margin:0 8px;flex-shrink:0}
.rule-item .rule-cat{color:var(--accent-light);font-weight:600;flex-shrink:0}
.rule-item .rule-del{width:24px;height:24px;border-radius:50%;border:none;background:var(--danger-bg);color:var(--danger);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;margin-left:8px;flex-shrink:0;transition:all 0.15s}.rule-item .rule-del:hover{background:var(--danger);color:#fff}
.hidden{display:none !important}
</style>
</head>

let S={tab:'dashboard',month:3,transactions:[],salary:2300,savingsTarget:200,savingsEnabled:false,taxRate:0,taxEnabled:false,forecastAdj:{},editingCat:null,

};

// Default overrides: fix HLM LES FOYERS
const DEFAULT_OVERRIDES={"hlm les foyers":"Logement"};

function seedToTx(raw){
  return raw.map((r,i)=>{
    const d=r[0],parts=d.split('-');
    return{id:i,date:d,dateVal:r[1],label:r[2],category:r[3],categoryParent:r[4],supplier:r[5],amount:r[6],month:parseInt(parts[1]),year:parseInt(parts[0])};
  });
}

function applyOverrides(){
  S.transactions.forEach(t=>{
    const sup=t.supplier.toLowerCase();
    if(S.catOverrides[sup]){t.categoryParent=S.catOverrides[sup];}
  });
}

function save(){
  localStorage.setItem('finProV3',JSON.stringify({transactions:S.transactions,salary:S.salary,savingsTarget:S.savingsTarget,savingsEnabled:S.savingsEnabled,taxRate:S.taxRate,taxEnabled:S.taxEnabled,forecastAdj:S.forecastAdj,catOverrides:S.catOverrides}));
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('finProV3'));
    if(d&&d.transactions&&d.transactions.length){
      S.transactions=d.transactions;S.salary=d.salary??2300;S.savingsTarget=d.savingsTarget??200;S.savingsEnabled=d.savingsEnabled??false;S.taxRate=d.taxRate??0;S.taxEnabled=d.taxEnabled??false;S.forecastAdj=d.forecastAdj??{};S.catOverrides=d.catOverrides??{...DEFAULT_OVERRIDES};
      applyOverrides();
      return;
    }
  }catch(e){}
  S.transactions=seedToTx(SEED_RAW);
  S.catOverrides={...DEFAULT_OVERRIDES};
  applyOverrides();
}

function getMonths(){return[...new Set(S.transactions.map(t=>t.month))].sort((a,b)=>a-b)}
function txByMonth(m){return m===0?S.transactions:S.transactions.filter(t=>t.month===m)}
function catStats(m){const txs=txByMonth(m).filter(t=>t.amount<0);const o={};txs.forEach(t=>{const c=t.categoryParent;if(!o[c])o[c]={total:0,count:0,txs:[]};o[c].total+=Math.abs(t.amount);o[c].count++;o[c].txs.push(t);});return o;}
function catAverages(){const ms=getMonths();if(!ms.length)return{};const sums={};ms.forEach(m=>{const st=catStats(m);Object.entries(st).forEach(([c,d])=>{sums[c]=(sums[c]||0)+d.total;});});const avg={};Object.keys(sums).forEach(c=>avg[c]=sums[c]/ms.length);return avg;}
function fmt(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n)}
function fmtD(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',minimumFractionDigits:2,maximumFractionDigits:2}).format(n)}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function netAvailable(sal){let n=sal||S.salary;if(S.taxEnabled&&S.taxRate>0)n-=n*(S.taxRate/100);if(S.savingsEnabled&&S.savingsTarget>0)n-=S.savingsTarget;return n}
function toast(i,m){const el=document.getElementById('toast');document.getElementById('toast-icon').textContent=i;document.getElementById('toast-msg').textContent=m;el.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(()=>el.classList.remove('show'),3000)}
function setTab(id){S.tab=id;renderNav();render()}
function setMonth(m){S.month=m;render()}
function renderNav(){document.getElementById('main-nav').innerHTML=TABS.map(t=>`<button class="nav-btn ${S.tab===t.id?'active':''}" onclick="setTab('${t.id}')">${t.l}</button>`).join('')}
function render(){
  const el=document.getElementById('content'),ms=getMonths();
  document.getElementById('stats-bar').textContent=`${S.transactions.length} opérations · ${ms.length} mois`;
  switch(S.tab){
    case'dashboard':el.innerHTML=vDash(ms);break;case'forecast':el.innerHTML=vForecast();break;
    case'transactions':el.innerHTML=vTx(ms);break;case'import':el.innerHTML=vImport();break;case'settings':el.innerHTML=vSettings();break;
  }
}

function vDash(ms){
  const txs=txByMonth(S.month),exp=txs.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0),nb=S.month===0?ms.length:1,avail=netAvailable()*nb,bal=avail-exp;
  const st=catStats(S.month),sorted=Object.entries(st).sort((a,b)=>b[1].total-a[1].total);
  const ded=[];if(S.taxEnabled&&S.taxRate>0)ded.push(`Impôt ${S.taxRate}%`);if(S.savingsEnabled&&S.savingsTarget>0)ded.push(`Épargne ${fmt(S.savingsTarget)}`);
  let h=`<div class="month-scroll"><button class="month-chip ${S.month===0?'active':''}" onclick="setMonth(0)">Tout</button>${ms.map(m=>`<button class="month-chip ${S.month===m?'active':''}" onclick="setMonth(${m})">${MN[m]}</button>`).join('')}</div>

  <div class="card"><div class="card-header"><span class="card-title">Solde estimé</span><span style="font-size:18px">${bal>=0?'📈':'🚨'}</span></div><div class="card-value ${bal>=0?'positive':'negative'}">${fmt(bal)}</div><div class="card-sub">sur ${fmt(avail)} dispo${ded.length?' <span style="opacity:.6">('+ded.join(' · ')+')</span>':''}</div></div></div>`;
  if(S.savingsEnabled||S.taxEnabled){
    h+=`<div class="card" style="padding:14px 18px"><div style="display:flex;gap:16px;flex-wrap:wrap;font-size:12px;font-family:var(--mono)">`;
    if(S.taxEnabled&&S.taxRate>0){const ta=S.salary*(S.taxRate/100)*nb;h+=`<div style="display:flex;align-items:center;gap:6px"><span style="color:var(--warning)">⚡</span> Impôt : <strong style="color:var(--warning)">${fmt(ta)}</strong></div>`}
    if(S.savingsEnabled&&S.savingsTarget>0){const sa=S.savingsTarget*nb;h+=`<div style="display:flex;align-items:center;gap:6px"><span style="color:var(--success)">💎</span> Épargne : <strong style="color:var(--success)">${fmt(sa)}</strong></div>`}
    h+=`</div></div>`}

  sorted.forEach(([cat,data])=>{const pct=exp>0?(data.total/exp*100):0,col=COLORS[cat]||'#6b7080',icon=ICONS[cat]||'📦';

  });
  return h;
}

function vForecast(){
  const avg=catAverages(),ms=getMonths(),nextM=ms.length?Math.max(...ms)+1:1,mName=MN[nextM]||('Mois '+nextM);

    else{h+=`<span class="forecast-amount" style="color:${col}" onclick="startFE('${esc(cat)}')">${fmt(val)}</span>`;if(!isF)h+=`<button class="btn-icon" onclick="startFE('${esc(cat)}')">✎</button>`}
    h+=`</div></div>`;
    if(!isF&&!ed){const mx=Math.max(avgV*3,val*1.5,100),diff=avgV>0?((val/avgV-1)*100):0,dl=diff>1?`↑ +${diff.toFixed(0)}%`:diff<-1?`↓ ${diff.toFixed(0)}%`:'→ Moy';
      h+=`<input type="range" class="forecast-slider" min="0" max="${mx.toFixed(0)}" value="${val.toFixed(0)}" step="5" style="--cat-color:${col}" oninput="updFA('${esc(cat)}',this.value)"><div class="forecast-hint"><span>Moy: ${fmt(avgV)}</span><span>${dl}</span></div>`}
    h+=`</div>`;
  });
  h+=`<div style="display:flex;gap:12px;margin-top:16px"><button class="btn btn-secondary" onclick="resetFC()" style="flex:1">🔄 Réinitialiser</button><button class="btn btn-primary" onclick="saveFC()" style="flex:1">💾 Sauvegarder</button></div>`;
  return h;
}

function vTx(ms){
  const txs=txByMonth(S.month).sort((a,b)=>b.date.localeCompare(a.date));
  let h=`<div class="month-scroll"><button class="month-chip ${S.month===0?'active':''}" onclick="setMonth(0)">Tout</button>${ms.map(m=>`<button class="month-chip ${S.month===m?'active':''}" onclick="setMonth(${m})">${MN[m]}</button>`).join('')}</div><div class="tx-list">`;
  if(!txs.length){h+=`<div style="text-align:center;padding:48px 0;color:var(--text-muted)"><div style="font-size:40px;margin-bottom:12px">📭</div><div>Aucune transaction</div></div>`}
  else{txs.forEach(t=>{const neg=t.amount<0,col=COLORS[t.categoryParent]||'#6b7080';
    h+=`<div class="tx-item" onclick="openReassign(${t.id})"><div class="tx-icon" style="background:${col}18;color:${col}">${ICONS[t.categoryParent]||'📦'}</div><div class="tx-content"><div class="tx-label">${t.label}</div><div class="tx-meta">${t.date.slice(8,10)}/${t.date.slice(5,7)} · ${t.categoryParent} <span class="cat-select-btn">✎ Changer</span></div></div><div class="tx-amount ${neg?'negative':'positive'}">${neg?'':'+'}${fmtD(Math.abs(t.amount))}</div></div>`;
  })}
  h+=`</div>`;return h;
}

function vImport(){
  return`<div class="card"><div class="card-title" style="margin-bottom:14px">📥 Import CSV BoursoBank</div><p style="color:var(--text-secondary);margin-bottom:16px;font-size:13px">Format BoursoBank (11 colonnes avec ; comme séparateur)</p>
  <div class="upload-zone" id="drop-zone" onclick="document.getElementById('file-in').click()"><div style="font-size:40px;margin-bottom:12px">📄</div><div style="font-weight:600;margin-bottom:4px">Cliquez ou déposez un CSV</div><input type="file" id="file-in" accept=".csv,.txt" style="display:none" onchange="onFile(event)"></div>
  <div class="form-group"><label>Ou collez le CSV ici</label><textarea id="csv-text" rows="8" placeholder="dateOp;dateVal;label;..."></textarea></div>
  <button class="btn btn-primary" onclick="importText()">📥 Importer</button></div>
  <div class="card" style="margin-top:14px"><div class="card-title" style="margin-bottom:12px">⚠️ Réinitialisation</div><button class="btn btn-danger" onclick="resetAll()">🗑️ Effacer et recharger l'exemple</button></div>`;
}

function vSettings(){
  const gross=S.salary,taxA=S.taxEnabled?gross*(S.taxRate/100):0,savA=S.savingsEnabled?S.savingsTarget:0,net=gross-taxA-savA;
  const ruleKeys=Object.keys(S.catOverrides);
  let h=`<div class="card"><div class="card-title" style="margin-bottom:20px">⚙️ Paramètres</div>
  <div class="form-group"><label>Revenu mensuel net</label><input type="number" value="${S.salary}" onchange="S.salary=parseFloat(this.value)||0;save();render()" style="font-size:18px"></div>
  <div class="section-title" style="margin-top:24px">Déductions mensuelles</div>
  <div class="deduction-card ${S.savingsEnabled?'enabled':''}"><div class="toggle-row ${S.savingsEnabled?'active':''}" onclick="toggleSav()"><div><div class="toggle-label">💎 Objectif d'épargne</div><div class="toggle-sub">Montant mensuel mis de côté</div></div><div class="toggle-switch"></div></div>${S.savingsEnabled?`<div style="padding:12px 16px 4px"><div class="deduction-inline"><input type="number" value="${S.savingsTarget}" min="0" step="10" onchange="S.savingsTarget=parseFloat(this.value)||0;save();render()"><span class="unit">€ / mois</span></div></div>`:''}</div>
  <div class="deduction-card ${S.taxEnabled?'enabled':''}"><div class="toggle-row ${S.taxEnabled?'active':''}" onclick="toggleTax()"><div><div class="toggle-label">⚡ Prélèvement à la source</div><div class="toggle-sub">Taux d'imposition sur le revenu</div></div><div class="toggle-switch"></div></div>${S.taxEnabled?`<div style="padding:12px 16px 4px"><div class="deduction-inline"><input type="number" value="${S.taxRate}" min="0" max="50" step="0.1" onchange="S.taxRate=parseFloat(this.value)||0;save();render()"><span class="unit">%</span></div></div>`:''}</div>
  <div class="section-title" style="margin-top:24px">Récapitulatif</div>
  <div class="card" style="background:rgba(255,255,255,0.02);margin-bottom:0"><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px"><span>Revenu brut</span><span style="font-family:var(--mono);font-weight:600">${fmt(gross)}</span></div>`;
  if(S.taxEnabled&&S.taxRate>0)h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--warning)"><span>− Impôt (${S.taxRate}%)</span><span style="font-family:var(--mono);font-weight:600">-${fmt(taxA)}</span></div>`;
  if(S.savingsEnabled&&S.savingsTarget>0)h+=`<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:14px;color:var(--success)"><span>− Épargne</span><span style="font-family:var(--mono);font-weight:600">-${fmt(savA)}</span></div>`;
  h+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:10px;display:flex;justify-content:space-between;font-size:16px;font-weight:700"><span>Budget disponible</span><span style="font-family:var(--mono);color:${net>=0?'var(--success)':'var(--danger)'}">${fmt(net)}</span></div></div>
  <div class="alert alert-info" style="margin-top:16px">💾 Tout est sauvegardé automatiquement</div></div>`;

  // Category override rules section
  h+=`<div class="card" style="margin-top:14px"><div class="card-title" style="margin-bottom:14px">🏷️ Règles de catégorisation (${ruleKeys.length})</div>
  <p style="color:var(--text-secondary);font-size:13px;margin-bottom:14px">Quand vous réassignez une transaction, une règle est créée pour que toutes les transactions du même fournisseur soient automatiquement recatégorisées.</p>`;
  if(ruleKeys.length){
    ruleKeys.sort().forEach(sup=>{
      h+=`<div class="rule-item"><span class="rule-supplier">${sup}</span><span class="rule-arrow">→</span><span class="rule-cat">${ICONS[S.catOverrides[sup]]||'📦'} ${S.catOverrides[sup]}</span><button class="rule-del" onclick="delRule('${esc(sup)}')">✕</button></div>`;
    });
  }else{h+=`<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">Aucune règle. Cliquez sur une transaction pour la réassigner.</div>`}
  h+=`</div>`;
  return h;
}

// Actions
function toggleSav(){S.savingsEnabled=!S.savingsEnabled;save();render();toast(S.savingsEnabled?'💎':'⭕',S.savingsEnabled?'Épargne activée':'Épargne désactivée')}
function toggleTax(){S.taxEnabled=!S.taxEnabled;save();render();toast(S.taxEnabled?'⚡':'⭕',S.taxEnabled?'Impôt activé':'Impôt désactivé')}
function startFE(c){S.editingCat=c;render();requestAnimationFrame(()=>{const i=document.getElementById('fedit');if(i){i.focus();i.select()}})}
function confirmFE(c){const i=document.getElementById('fedit'),v=parseFloat(i.value);if(!isNaN(v)&&v>=0){S.forecastAdj[c]=v;S.editingCat=null;save();render();toast('✅','Mis à jour')}}
function cancelFE(){S.editingCat=null;render()}
function updFA(c,v){S.forecastAdj[c]=parseFloat(v);render()}
function applyScenario(f){const avg=catAverages(),fx=['Logement','Emprunts (hors immobilier)'];Object.keys(S.forecastAdj).forEach(c=>{if(!fx.includes(c))S.forecastAdj[c]=(avg[c]||0)*f});render();toast('✅',f<1?'Optimiste':f>1?'Pessimiste':'Réaliste')}
function resetFC(){S.forecastAdj={...catAverages()};render();toast('🔄','Réinitialisé')}
function saveFC(){save();toast('💾','Sauvegardé')}

// Category detail modal
function showCatDetail(cat){
  const modal=document.getElementById('cat-modal'),body=document.getElementById('modal-body');
  document.getElementById('modal-title').innerHTML=`<span style="margin-right:8px">${ICONS[cat]||'📦'}</span>${cat}`;
  let txs=S.month===0?S.transactions.filter(t=>t.categoryParent===cat&&t.amount<0):S.transactions.filter(t=>t.categoryParent===cat&&t.amount<0&&t.month===S.month);
  txs.sort((a,b)=>b.date.localeCompare(a.date));
  const total=txs.reduce((s,t)=>s+Math.abs(t.amount),0),col=COLORS[cat]||'#6b7080';
  const byM={};txs.forEach(t=>{byM[t.month]=(byM[t.month]||0)+Math.abs(t.amount)});
  let h=`<div style="margin-bottom:20px"><div style="font-family:var(--mono);font-size:30px;font-weight:700;color:${col}">${fmt(total)}</div><div style="font-size:13px;color:var(--text-secondary);margin-top:4px">${txs.length} transactions sur ${Object.keys(byM).length} mois</div></div>`;
  if(Object.keys(byM).length>1){
    h+=`<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px">Répartition mensuelle</div>`;
    Object.entries(byM).sort((a,b)=>a[0]-b[0]).forEach(([m,a])=>{h+=`<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)"><span>${MN[m]}</span><span style="font-family:var(--mono);font-weight:600">${fmt(a)}</span></div>`});
    h+=`<div style="margin-bottom:20px"></div>`;
  }
  h+=`<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.8px">Opérations</div>`;
  txs.forEach(t=>{h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--surface);border-radius:8px;margin-bottom:6px;border:1px solid var(--border)"><div style="min-width:0;flex:1;margin-right:12px"><div style="font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.label}</div><div style="font-size:11px;color:var(--text-muted);font-family:var(--mono)">${t.date} · ${t.category}</div></div><div style="font-family:var(--mono);font-weight:700;color:var(--danger);flex-shrink:0;font-size:13px">${fmtD(Math.abs(t.amount))}</div></div>`});
  body.innerHTML=h;modal.classList.add('active');
}
function closeModal(){document.getElementById('cat-modal').classList.remove('active')}

// Reassign category modal
function openReassign(txId){
  const tx=S.transactions.find(t=>t.id===txId);if(!tx)return;
  S.reassignIdx=txId;
  const modal=document.getElementById('reassign-modal'),body=document.getElementById('reassign-body');
  document.getElementById('reassign-title').textContent='Changer la catégorie';
  const sup=tx.supplier;
  const sameSup=sup?S.transactions.filter(t=>t.supplier.toLowerCase()===sup.toLowerCase()):[];
  let h=`<div style="margin-bottom:16px;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border)">
    <div style="font-weight:600;font-size:14px;margin-bottom:4px">${tx.label}</div>
    <div style="font-size:12px;color:var(--text-muted);font-family:var(--mono)">${tx.date} · ${fmtD(Math.abs(tx.amount))}</div>
    <div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Catégorie actuelle: <strong>${tx.categoryParent}</strong></div>
    ${sup?`<div style="font-size:11px;color:var(--text-muted);margin-top:4px">Fournisseur: "${sup}" (${sameSup.length} opérations)</div>`:''}
  </div>
  <div style="font-weight:700;font-size:12px;color:var(--text-muted);text-transform:uppercase;margin-bottom:10px;letter-spacing:.8px">Nouvelle catégorie</div>`;
  ALL_CATS.forEach(cat=>{
    const col=COLORS[cat]||'#6b7080',icon=ICONS[cat]||'📦';
    const active=cat===tx.categoryParent;
    h+=`<div onclick="doReassign(${txId},'${esc(cat)}')" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:8px;cursor:pointer;margin-bottom:4px;border:1px solid ${active?'var(--accent)':'var(--border)'};background:${active?'rgba(124,108,240,0.08)':'transparent'};transition:all 0.15s" onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background='${active?'rgba(124,108,240,0.08)':'transparent'}'">
      <span style="font-size:16px">${icon}</span>
      <span style="font-weight:600;font-size:13px;flex:1">${cat}</span>
      <span style="width:10px;height:10px;border-radius:50%;background:${col}"></span>
    </div>`;
  });
  if(sup){h+=`<div class="alert alert-warning" style="margin-top:14px">⚡ La règle s'appliquera à <strong>toutes les ${sameSup.length} opérations</strong> du fournisseur "${sup}"</div>`}
  body.innerHTML=h;modal.classList.add('active');
}

function doReassign(txId,newCat){
  const tx=S.transactions.find(t=>t.id===txId);if(!tx)return;
  const sup=tx.supplier.toLowerCase();
  // Save override rule
  if(sup){S.catOverrides[sup]=newCat}
  // Apply to all matching transactions
  S.transactions.forEach(t=>{if(t.supplier.toLowerCase()===sup)t.categoryParent=newCat});
  save();closeReassign();render();
  const count=S.transactions.filter(t=>t.supplier.toLowerCase()===sup).length;
  toast('🏷️',`${count} opérations → ${newCat}`);
}

function closeReassign(){document.getElementById('reassign-modal').classList.remove('active')}

function delRule(sup){
  delete S.catOverrides[sup];
  // Reload from seed to restore original categories for this supplier
  const originals=seedToTx(SEED_RAW);
  S.transactions.forEach(t=>{
    if(t.supplier.toLowerCase()===sup.toLowerCase()){
      const orig=originals.find(o=>o.id===t.id);
      if(orig)t.categoryParent=orig.categoryParent;
    }
  });
  // Re-apply remaining overrides
  applyOverrides();save();render();
  toast('🗑️','Règle supprimée');
}

// CSV Import (BoursoBank format)
function parseBourso(text){
  const lines=text.trim().split('\n'),out=[];
  for(let i=1;i<lines.length;i++){
    // Handle quoted fields
    const row=[];let inQ=false,field='';
    for(let j=0;j<lines[i].length;j++){
      const c=lines[i][j];
      if(c==='"'){inQ=!inQ}else if(c===';'&&!inQ){row.push(field.trim());field=''}else{field+=c}
    }
    row.push(field.trim());
    if(row.length<7)continue;
    const amt=parseFloat(row[6].replace(',','.'));if(isNaN(amt))continue;
    const d=row[0],parts=d.split('-');if(parts.length<3)continue;
    out.push({id:Date.now()+i+Math.random(),date:d,dateVal:row[1],label:row[2],category:row[3],categoryParent:row[4],supplier:(row[5]||'').toLowerCase(),amount:amt,month:parseInt(parts[1]),year:parseInt(parts[0])});
  }
  return out;
}
function onFile(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>doImport(ev.target.result);r.readAsText(f)}
function importText(){const t=document.getElementById('csv-text').value.trim();if(t)doImport(t)}
function doImport(csv){
  try{const news=parseBourso(csv);if(!news.length){toast('⚠️','Aucune transaction');return}
  const keys=new Set(S.transactions.map(t=>`${t.date}|${t.label}|${t.amount}`));
  const uniq=news.filter(t=>!keys.has(`${t.date}|${t.label}|${t.amount}`));
  S.transactions.push(...uniq);applyOverrides();save();render();
  toast('✅',`${uniq.length} importées · ${news.length-uniq.length} doublons`);setTab('transactions');
  }catch(err){toast('❌','Erreur: '+err.message)}
}
function resetAll(){
  if(!confirm('Effacer toutes les données ?'))return;
  localStorage.removeItem('finProV3');S.transactions=seedToTx(SEED_RAW);S.forecastAdj={};S.savingsEnabled=false;S.taxEnabled=false;S.savingsTarget=200;S.taxRate=0;S.salary=2300;S.catOverrides={...DEFAULT_OVERRIDES};applyOverrides();save();render();toast('🗑️','Réinitialisé');
}

// Drag & drop
document.addEventListener('dragover',e=>{const z=document.getElementById('drop-zone');if(z){e.preventDefault();z.classList.add('dragover')}});
document.addEventListener('dragleave',e=>{const z=document.getElementById('drop-zone');if(z)z.classList.remove('dragover')});
document.addEventListener('drop',e=>{e.preventDefault();const z=document.getElementById('drop-zone');if(z)z.classList.remove('dragover');if(e.dataTransfer.files.length){const f=e.dataTransfer.files[0],r=new FileReader();r.onload=ev=>doImport(ev.target.result);r.readAsText(f)}});
document.getElementById('cat-modal').addEventListener('click',e=>{if(e.target.id==='cat-modal')closeModal()});
document.getElementById('reassign-modal').addEventListener('click',e=>{if(e.target.id==='reassign-modal')closeReassign()});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeReassign()}});

// INIT
load();renderNav();render();
</script>
